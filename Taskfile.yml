version: "3"

dotenv: ["config/base.env"]

vars:
  ROOT_DIR:
    sh: pwd
  BACKEND_DIR: "{{.ROOT_DIR}}/backend"
  FRONTEND_DIR: "{{.ROOT_DIR}}/frontend"
  WORKTREE_DIR: .worktrees
  WORKTREE_MAIN: .worktrees/main
  WORKTREE_DEVELOP: .worktrees/develop
  SCENARIO_PORTS_SH: .taskfiles/scenario_ports.sh

includes:
  build:
    taskfile: .taskfiles/build.yml
    dir: "{{.ROOT_DIR}}"
  deploy:
    taskfile: .taskfiles/deploy.yml
    dir: "{{.ROOT_DIR}}"
  fly:
    taskfile: .taskfiles/fly.yml
    dir: "{{.ROOT_DIR}}"
  git:
    taskfile: .taskfiles/git.yml
    dir: "{{.ROOT_DIR}}"
  logs:
    taskfile: .taskfiles/logs.yml
    dir: "{{.ROOT_DIR}}"
  release:
    taskfile: .taskfiles/release.yml
    dir: "{{.ROOT_DIR}}"
  open:
    taskfile: .taskfiles/open.yml
    dir: "{{.ROOT_DIR}}"
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
  start:
    taskfile: .taskfiles/start.yml
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
      BACKEND_DIR: "{{.BACKEND_DIR}}"
      FRONTEND_DIR: "{{.FRONTEND_DIR}}"
  stop:
    taskfile: .taskfiles/stop.yml
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
  db:
    taskfile: .taskfiles/db.yml
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
      BACKEND_DIR: "{{.BACKEND_DIR}}"
  test:
    taskfile: .taskfiles/test.yml
    dir: "{{.ROOT_DIR}}"
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
      BACKEND_DIR: "{{.BACKEND_DIR}}"
      FRONTEND_DIR: "{{.FRONTEND_DIR}}"
  perf:
    taskfile: .taskfiles/perf.yml
    dir: "{{.ROOT_DIR}}"
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
  analytics:
    taskfile: .taskfiles/analytics.yml
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
      BACKEND_DIR: "{{.BACKEND_DIR}}"
  notify:
    taskfile: .taskfiles/notify.yml
    dir: "{{.ROOT_DIR}}"
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"
      BACKEND_DIR: "{{.BACKEND_DIR}}"
  secrets:
    taskfile: .taskfiles/secrets.yml
    dir: "{{.ROOT_DIR}}"
    vars:
      ROOT_DIR: "{{.ROOT_DIR}}"

tasks:
  default:
    desc: Show help
    cmds:
      - task: help

  install:
    desc: Install all dependencies (backend + frontend)
    cmds:
      - task: install:backend
      - task: install:frontend

  install:backend:
    desc: Install backend Python dependencies
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - "{{.ROOT_DIR}}/.venv/bin/pip install -r requirements.txt"
    sources:
      - requirements.txt

  install:frontend:
    desc: Install frontend Node dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install
    sources:
      - package.json

  status:
    desc: Show all running containers across all environments
    cmds:
      - |
        echo "═══════════════════════════════════════════════════════════════"
        echo "  Environment Status"
        echo "═══════════════════════════════════════════════════════════════"
        echo ""
        docker ps --filter "name=calendar_" --format 'table {{`{{.Names}}`}}\t{{`{{.Status}}`}}\t{{`{{.Ports}}`}}' 2>/dev/null || echo "  No containers running"
        echo ""

  scenarios:
    desc: List all scenarios with hash-based ports and running status
    cmds:
      - |
        SCENARIOS_DIR="{{.ROOT_DIR}}/scenarios"

        echo "═══════════════════════════════════════════════════════════════"
        echo "  Scenarios"
        echo "═══════════════════════════════════════════════════════════════"
        echo ""
        printf "  %-34s  %6s  %-10s  %-10s  %-10s  %-10s\n" "Name" "Offset" "DB" "API" "WEB" "UMAMI"
        printf "  %-34s  %6s  %-10s  %-10s  %-10s  %-10s\n" "──────────────────────────────────" "──────" "──────────" "──────────" "──────────" "──────────"

        _scenario_status() {
          local NAME=$1 DB=$2 API=$3 WEB=$4 UMAMI=$5
          local DB_CONTAINER UMAMI_CONTAINER UMAMI_PROJECT
          if [ "$NAME" = "default" ]; then
            DB_CONTAINER="calendar_db_scenario"
            UMAMI_PROJECT="movida-scenario-umami"
            UMAMI_CONTAINER="umami_movida-scenario"
          else
            DB_CONTAINER="calendar_db_scenario-${NAME}"
            UMAMI_PROJECT="movida-scenario-${NAME}-umami"
            UMAMI_CONTAINER="umami_movida-scenario-${NAME}"
          fi
          local DB_S="—" API_S="—" WEB_S="—" UMAMI_S="—"
          docker ps --filter "name=^/${DB_CONTAINER}$" --filter "status=running" --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q . && DB_S="🟢"
          lsof -iTCP:$API -sTCP:LISTEN >/dev/null 2>&1 && API_S="🟢"
          lsof -iTCP:$WEB -sTCP:LISTEN >/dev/null 2>&1 && WEB_S="🟢"
          docker ps --filter "name=^/${UMAMI_CONTAINER}$" --filter "status=running" --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q . && UMAMI_S="🟢"
          printf "  %-34s  %6s  %-5s  %-5s  %-5s  %-5s\n" "$NAME" "$OFFSET" "$DB_S db:$DB" "$API_S api:$API" "$WEB_S web:$WEB" "$UMAMI_S :$UMAMI"
        }

        # Default scenario
        OFFSET=0
        _scenario_status "default" 5437 8003 3002 3101

        # Named scenarios from seed directories
        if [ -d "$SCENARIOS_DIR" ]; then
          for DIR in "$SCENARIOS_DIR"/*/; do
            NAME=$(basename "$DIR")
            [ "$NAME" = "default" ] && continue
            OFFSET=$(printf '%s' "$NAME" | cksum | awk '{print ($1 % 9999) + 1}')
            DB=$((5437 + OFFSET))
            API=$((8003 + OFFSET))
            WEB=$((3002 + OFFSET))
            UMAMI=$((3101 + OFFSET))
            _scenario_status "$NAME" $DB $API $WEB $UMAMI
          done
        fi
        echo ""

  help:
    desc: Show quick reference of available commands
    cmds:
      - |
        echo "═══════════════════════════════════════════════════════════════"
        echo "  Movida — Task Commands"
        echo "═══════════════════════════════════════════════════════════════"
        echo ""
        echo "  ── Development ──────────────────────────────────────────"
        echo "  task start:dev              Start full dev (DB + API + Web)"
        echo "  task start:dev:debug        Start with debugger (port 5678)"
        echo "  task start:dev:mock         Start with mock calendar"
        echo "  task start:dev:db           Start database only"
        echo "  task stop:dev               Stop all dev services"
        echo "  task status                 Show running containers"
        echo ""
        echo "  ── Database ─────────────────────────────────────────────"
        echo "  task db:migrate             Run migrations (dev)"
        echo "  task db:seed                Seed database (dev)"
        echo "  task db:reset               Reset database (dev) ⚠️"
        echo "  task db:status:dev          Migration status"
        echo ""
        echo "  ── Performance ──────────────────────────────────────────"
        echo "  task perf:dev               Load test against local dev"
        echo "  task perf:staging           Load test against staging (15 VUs x 5m)"
        echo "  task perf:prod:smoke        Read-only smoke against prod"
        echo "  task perf:report            Open latest HTML summary"
        echo ""
        echo "  ── Testing ──────────────────────────────────────────────"
        echo "  task test                   Quick unit tests"
        echo "  task test:unit:backend      Backend tests only"
        echo "  task test:unit:frontend     Frontend type check + build"
        echo "  task test:all               All tests (unit + integration)"
        echo ""
        echo "  ── Git Workflow ─────────────────────────────────────────"
        echo "  task git:feature -- <name>  Create feature branch"
        echo "  task git:fix -- <name>      Create fix branch"
        echo "  task git:hotfix -- <name>   Create hotfix branch"
        echo "  task git:pr                 Push + create draft PR"
        echo "  task git:pr:ready           Mark PR ready for review"
        echo "  task git:pr:merge           Merge PR (squash)"
        echo ""
        echo "  ── Staging ──────────────────────────────────────────────"
        echo "  task deploy:staging         Build from develop + deploy"
        echo "  task deploy:staging:cwd   Build from working dir + deploy"
        echo "  task stop:staging           Stop staging stack"
        echo ""
        echo "  ── Scenario ─────────────────────────────────────────────"
        echo "  task start:scenario         Local code + Docker DB"
        echo "  task stop:scenario          Stop scenario instance"
        echo "  task scenarios              List all scenario ports"
        echo "  ── Browser ──────────────────────────────────────────────"
        echo "  Add to start:* tasks:  BROWSER=none|shared|isolated   COUNT=N   RESET_BROWSER=1"
        echo "    none      (default for start:*)  servers only, no browser opened"
        echo "    shared    focus existing tab in your default Chrome (shared cookies)"
        echo "    isolated  open COUNT sessions, each with own --user-data-dir;"
        echo "              idempotent (focuses existing). RESET_BROWSER=1 wipes first."
        echo "  task open:shared:<env>               Focus/open one tab in default Chrome"
        echo "  task open:isolated:<env> [COUNT=N]   Open N isolated sessions"
        echo "    <env> = dev | scenario | staging:local | staging:remote | prod"
        echo "    e.g. task open:isolated:scenario SCENARIO=share-im-going COUNT=2"
        echo "    e.g. task open:isolated:scenario SCENARIO=foo RESET_BROWSER=1"
        echo "  task open:clean             Remove all isolated Chrome profile dirs"
        echo "  task open:clean:dev         Remove only dev-* isolated profile dirs"
        echo ""
        echo "  ── Production (per-component releases) ─────────────────"
        echo "  task release:prod:backend  -- v1.2.0   Tag backend-v1.2.0 + deploy"
        echo "  task release:prod:frontend -- v1.2.0   Tag frontend-v1.2.0 + deploy"
        echo "  task release:prod:db       -- v1.2.0   Tag db-v1.2.0 + migrate"
        echo "  task release:prod:backend              Interactive (suggests next patch)"
        echo "  task release:prod                      Aggregate: prompts per component"
        echo "  task deploy:prod:remote:backend  -- backend-v1.2.0  Deploy only"
        echo "  task deploy:prod:status                Released vs deployed (drift)"
        echo "  task deploy:prod:status:diff           All components commits/files vs origin/main"
        echo "  task deploy:prod:status:backend        Status for backend only"
        echo "  task deploy:prod:status:backend:diff   Backend commits/files vs origin/main"
        echo "  task deploy:prod:status:frontend       Status for frontend only"
        echo "  task deploy:prod:status:frontend:diff  Frontend commits/files vs origin/main"
        echo "  task deploy:prod:status:db             Status for DB only"
        echo "  task deploy:prod:status:db:diff        DB commits/files vs origin/main"
        echo "  task deploy:staging:status             Same for staging"
        echo "  task deploy:prod:current               Current prod backend tag"
        echo ""
        echo "  ── Build ────────────────────────────────────────────────"
        echo "  task build:staging          Build images from develop"
        echo "  task build:prod -- v1.0.0   Build images from main"
        echo "  task build:cwd            Build from working directory"
        echo "  task build:list             List Docker images"
        echo ""
        echo "  ── Safety ───────────────────────────────────────────────"
        echo "  DRY_RUN=1 task <cmd>        Preview without executing"
        echo "═══════════════════════════════════════════════════════════════"
