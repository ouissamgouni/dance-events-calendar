[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: unit tests (fast, isolated)
    integration: integration tests (DB-dependent)

addopts = --tb=short -q --timeout=60

# Known deprecation warnings that are triaged and intentionally silenced to
# keep the test output readable. Each entry documents the source so the
# suppression can be revisited after the corresponding upstream / internal
# migration.
filterwarnings =
    # Third-party libraries we don't control:
    ignore:Using `httpx` with `starlette\.testclient` is deprecated.*:DeprecationWarning:starlette\.testclient
    ignore:'asyncio\.iscoroutinefunction' is deprecated.*:DeprecationWarning:slowapi\..*
    # datetime.utcnow() is deprecated in Python 3.12+; our DB models still
    # store naive UTC so a full migration to timezone-aware datetimes is a
    # dedicated task. Silence for now to keep the signal-to-noise ratio high.
    ignore:datetime\.datetime\.utcnow\(\) is deprecated.*:DeprecationWarning
