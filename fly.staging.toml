# Fly.io staging app configuration
# https://fly.io/docs/reference/configuration/
#
# Differences from fly.toml (prod):
#   - Different app name
#   - auto_stop_machines = true  (sleeps when idle → burns no credits)
#   - min_machines_running = 0   (free tier: zero idle cost)
#   - ENV_NAME = "staging"

app = "movida-staging"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PYTHONPATH = "/app"
  PYTHONUNBUFFERED = "1"
  ENV_NAME = "staging"
  CALENDAR_SERVICE = "google"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
