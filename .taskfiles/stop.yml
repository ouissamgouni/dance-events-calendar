version: "3"

vars:
  SCENARIO_PORTS_SH: .taskfiles/scenario_ports.sh

tasks:
  # ════════════════════════════════════════════════════════════════
  # Dev
  # ════════════════════════════════════════════════════════════════

  dev:
    desc: Stop all dev services (DB + backend + frontend)
    deps: [ dev:db, dev:backend, dev:frontend ]
    cmds:
      - echo "✅ All dev services stopped"

  dev:db:
    desc: Stop dev database and Umami analytics
    cmds:
      - |
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.dev.yml down
        echo "✅ Dev database stopped"

  dev:backend:
    desc: Stop dev backend
    cmds:
      - |
        if pkill -f "uvicorn backend.api.main" 2>/dev/null; then
          echo "✅ Backend stopped"
          sleep 1
          if pgrep -f "uvicorn backend.api.main" > /dev/null 2>&1; then
            pkill -9 -f "uvicorn backend.api.main" 2>/dev/null
          fi
        else
          echo "ℹ️  Backend not running"
        fi

  dev:frontend:
    desc: Stop dev frontend
    cmds:
      - |
        if pkill -f "vite" 2>/dev/null; then
          echo "✅ Frontend stopped"
        else
          echo "ℹ️  Frontend not running"
        fi

  dev:volumes:
    desc: "Stop dev and remove volumes (⚠️ destroys data). DRY_RUN=1 to preview."
    vars:
      DRY_RUN: "{{.DRY_RUN | default \"0\"}}"
    cmds:
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          echo "🔍 DRY RUN — would remove:"
          echo "  • calendar_db_dev container + calendar_dev_data volume"
          echo "  • umami_dev container"
          echo "  • umami_db_dev container + umami_dev_data volume"
        fi
      - task: _dev:volumes:exec
        vars: { DRY_RUN: "{{.DRY_RUN}}" }

  _dev:volumes:exec:
    internal: true
    status:
      - "[ \"{{.DRY_RUN}}\" = \"1\" ]"
    prompt: "This will destroy all dev database data. Continue?"
    cmds:
      - docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.dev.yml down
        -v
      - echo "✅ Dev containers and volumes removed"

  # ════════════════════════════════════════════════════════════════
  # Staging
  # ════════════════════════════════════════════════════════════════

  staging:local:
    desc: Stop local staging stack (docker-compose)
    cmds:
      - ENV_NAME=staging docker compose -f
        {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p movida-staging
        down
      - echo "✅ Local staging stopped"

  staging:local:volumes:
    desc: "Stop local staging and remove volumes (⚠️ destroys data). DRY_RUN=1 to
      preview."
    vars:
      DRY_RUN: "{{.DRY_RUN | default \"0\"}}"
    prompt: "This will destroy all local staging data. Continue?"
    cmds:
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          echo "🔍 DRY RUN — would remove local staging containers + volumes"
          exit 0
        fi
      - ENV_NAME=staging docker compose -f
        {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p movida-staging
        down -v
      - echo "✅ Local staging containers and volumes removed"

  # ════════════════════════════════════════════════════════════════
  # Prod
  # ════════════════════════════════════════════════════════════════

  prod:
    desc: Stop prod stack
    cmds:
      - ENV_NAME=prod docker compose -f
        {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p movida-prod
        down
      - echo "✅ Prod stopped"

  prod:volumes:
    desc: "Stop prod and remove volumes (🚨 destroys data). DRY_RUN=1 to preview."
    vars:
      DRY_RUN: "{{.DRY_RUN | default \"0\"}}"
    prompt: "🚨 This will destroy all PRODUCTION data. Are you sure?"
    cmds:
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          echo "🔍 DRY RUN — would remove prod containers + volumes"
          exit 0
        fi
      - ENV_NAME=prod docker compose -f
        {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p movida-prod
        down -v
      - echo "✅ Prod containers and volumes removed"

  # ════════════════════════════════════════════════════════════════
  # Scenario
  # ════════════════════════════════════════════════════════════════

  scenario:
    desc: "Stop a scenario instance (SCENARIO=name). Also closes its isolated Chrome
      sessions (KEEP_BROWSER=1 to opt out)."
    vars:
      SCENARIO: "{{.SCENARIO | default \"default\"}}"
      KEEP_BROWSER: "{{.KEEP_BROWSER | default \"0\"}}"
    prompt: "Stop scenario '{{.SCENARIO}}'?"
    cmds:
      - |
        source {{.SCENARIO_PORTS_SH}} "{{.SCENARIO}}"

        # Use persisted ports if available (overrides may have been used at start time)
        STATE_FILE="{{.ROOT_DIR}}/.taskfiles/.scenario-state/{{.SCENARIO}}.env"
        if [ -f "$STATE_FILE" ]; then
          source "$STATE_FILE"
        fi

        echo "Stopping scenario: $SCENARIO_NAME..."

        # Stop Docker DB
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.scenario-db.yml -p $SC_PROJECT_NAME down -v 2>/dev/null || true

        # Stop Umami (always started with scenario)
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.scenario-umami.yml -p $SC_UMAMI_PROJECT down -v 2>/dev/null || true

        # Also try unified compose (for :ref mode)
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p $SC_PROJECT_NAME down -v 2>/dev/null || true

        # Kill local processes on scenario ports
        lsof -ti:$SC_API_PORT | xargs kill -9 2>/dev/null || true
        lsof -ti:$SC_WEB_PORT | xargs kill -9 2>/dev/null || true

        # Browser cleanup (close + remove isolated profile dirs)
        if [ "{{.KEEP_BROWSER}}" != "1" ]; then
          {{.ROOT_DIR}}/.taskfiles/_browser_cleanup.sh "scenario-{{.SCENARIO}}"
        fi

        rm -f "{{.ROOT_DIR}}/.taskfiles/.scenario-state/{{.SCENARIO}}.env"
        echo "✅ Scenario '$SCENARIO_NAME' stopped"

  scenario:all:
    desc: "Stop ALL running scenario instances. Also closes their isolated Chrome
      sessions (KEEP_BROWSER=1 to opt out)."
    vars:
      KEEP_BROWSER: "{{.KEEP_BROWSER | default \"0\"}}"
    prompt: "Stop ALL scenario instances?"
    cmds:
      - |
        echo "Stopping all scenario instances..."

        _stop_scenario() {
          local SCENARIO_NAME=$1
          source {{.ROOT_DIR}}/.taskfiles/scenario_ports.sh "$SCENARIO_NAME"

          # Use persisted ports if available (overrides may have been used at start time)
          local STATE_FILE="{{.ROOT_DIR}}/.taskfiles/.scenario-state/${SCENARIO_NAME}.env"
          if [ -f "$STATE_FILE" ]; then
            source "$STATE_FILE"
          fi

          # Stop Docker DB
          docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.scenario-db.yml -p $SC_PROJECT_NAME down -v 2>/dev/null || true

          # Stop Umami
          docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.scenario-umami.yml -p $SC_UMAMI_PROJECT down -v 2>/dev/null || true

          docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p $SC_PROJECT_NAME down -v 2>/dev/null || true

          # Kill API and web processes on the exact ports (persisted or computed)
          lsof -ti:$SC_API_PORT 2>/dev/null | xargs kill -9 2>/dev/null || true
          lsof -ti:$SC_WEB_PORT 2>/dev/null | xargs kill -9 2>/dev/null || true

          rm -f "$STATE_FILE"
          echo "  Stopped: $SCENARIO_NAME  (api:$SC_API_PORT web:$SC_WEB_PORT)"
        }

        # Default scenario
        _stop_scenario "default"

        # All named scenarios
        SCENARIOS_DIR="{{.ROOT_DIR}}/scenarios"
        if [ -d "$SCENARIOS_DIR" ]; then
          for DIR in "$SCENARIOS_DIR"/*/; do
            NAME=$(basename "$DIR")
            [ "$NAME" = "default" ] && continue
            _stop_scenario "$NAME"
          done
        fi

        # Browser cleanup: close all scenario-* isolated Chrome sessions
        if [ "{{.KEEP_BROWSER}}" != "1" ]; then
          {{.ROOT_DIR}}/.taskfiles/_browser_cleanup.sh "scenario-"
        fi

        echo "✅ All scenario instances stopped"
