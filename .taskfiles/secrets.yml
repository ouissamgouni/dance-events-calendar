version: "3"

# GitHub Actions secrets management.
tasks:
  push:
    desc: >-
      Push variables from a dotenv-style file to GitHub Actions secrets (via
      `gh secret set`). Required: FILE=path/to/secrets.env. Optional:
      SECRET=NAME (default: push every var in FILE), GH_ENV=environment-name
      (default: repository-level secret), PREFIX=string (default: none —
      prepended to each GitHub secret name, e.g. STAGING_).
    vars:
      FILE: '{{.FILE | default ""}}'
      SECRET: '{{.SECRET | default ""}}'
      GH_ENV: '{{.GH_ENV | default ""}}'
      PREFIX: '{{.PREFIX | default ""}}'
    cmds:
      - "{{.ROOT_DIR}}/.taskfiles/push_gh_secrets.sh '{{.FILE}}' '{{.SECRET}}'
        '{{.GH_ENV}}' '{{.PREFIX}}'"
