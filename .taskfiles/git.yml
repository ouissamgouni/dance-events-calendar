version: "3"

vars:
  WORKTREE_DIR: .worktrees
  WORKTREE_MAIN: .worktrees/main
  WORKTREE_DEVELOP: .worktrees/develop
  SCENARIO_PORTS_SH: .taskfiles/scenario_ports.sh

tasks:
  # ════════════════════════════════════════════════════════════════
  # Branch Creation
  # ════════════════════════════════════════════════════════════════

  feature:
    desc: Create a new feature branch from develop
    vars:
      NAME: "{{.CLI_ARGS}}"
      CURRENT_BRANCH:
        sh: git branch --show-current
    deps: [ _check-clean ]
    prompt: |
      Create feature/{{.NAME}} from develop branch?

      Current branch: {{.CURRENT_BRANCH}}
      This will switch to develop, then create feature/{{.NAME}}

      Continue?
    cmds:
      - task: _create-branch
        vars: { TYPE: feature, NAME: "{{.NAME}}" }

  fix:
    desc: Create a new fix branch from develop
    vars:
      NAME: "{{.CLI_ARGS}}"
      CURRENT_BRANCH:
        sh: git branch --show-current
    deps: [ _check-clean ]
    prompt: |
      Create fix/{{.NAME}} from develop branch?

      Current branch: {{.CURRENT_BRANCH}}
      This will switch to develop, then create fix/{{.NAME}}

      Continue?
    cmds:
      - task: _create-branch
        vars: { TYPE: fix, NAME: "{{.NAME}}" }

  hotfix:
    desc: Create a hotfix branch from main
    vars:
      NAME: "{{.CLI_ARGS}}"
      CURRENT_BRANCH:
        sh: git branch --show-current
    deps: [ _check-clean ]
    prompt: |
      Create hotfix/{{.NAME}} from main branch?

      Current branch: {{.CURRENT_BRANCH}}
      This will switch to main, then create hotfix/{{.NAME}}

      ⚠️  Hotfixes are for urgent production fixes only!

      Continue?
    cmds:
      - |
        NAME="{{.NAME}}"
        if [ -z "$NAME" ]; then
          echo "❌ Usage: task git:hotfix -- <branch-name>"
          exit 1
        fi
        git checkout main
        git pull origin main
        git checkout -b hotfix/$NAME
        echo "✅ Created branch: hotfix/$NAME"

  # ════════════════════════════════════════════════════════════════
  # PR Lifecycle
  # ════════════════════════════════════════════════════════════════

  pr:
    desc: Push and create draft PR (alias for git:pr:draft)
    cmds:
      - task: pr:draft

  pr:draft:
    desc: Push and create draft PR (auto-detects target branch)
    cmds:
      - task: _push-validate
      - |
        BRANCH=$(git branch --show-current)
        TARGET="develop"

        if echo "$BRANCH" | grep -q "^hotfix/"; then
          TARGET="main"
          echo ""
          echo "⚠️  Hotfix detected — PR will target main"
          echo ""
        fi

        gh pr create --draft --base "$TARGET" --fill
        echo "✅ Draft PR created: $BRANCH → $TARGET"

  pr:publish:
    desc: Push and create ready PR (auto-detects target branch)
    cmds:
      - task: _push-validate
      - |
        BRANCH=$(git branch --show-current)
        TARGET="develop"

        if echo "$BRANCH" | grep -q "^hotfix/"; then
          TARGET="main"
          echo ""
          echo "⚠️  Hotfix detected — PR will target main"
          echo ""
        fi

        gh pr create --base "$TARGET" --fill
        echo "✅ PR created (ready for review): $BRANCH → $TARGET"

  pr:ready:
    desc: Mark current draft PR as ready for review
    cmds:
      - gh pr ready
      - echo "✅ PR marked as ready"

  pr:view:
    desc: Open current PR in browser
    cmds:
      - gh pr view --web

  pr:checks:
    desc: Show CI status for current PR
    cmds:
      - gh pr checks

  pr:merge:
    desc: Merge current PR (squash) and show next steps
    cmds:
      - |
        BRANCH=$(git branch --show-current)
        TARGET=$(gh pr view --json baseRefName -q '.baseRefName' 2>/dev/null || echo "develop")

        if [ "$TARGET" = "main" ]; then
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "⚠️  MERGING INTO MAIN"
          echo ""
          echo "   Branch: $BRANCH → main"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          read -p "Are you sure? (y/N) " confirm
          if [ "$confirm" != "y" ] && [ "$confirm" != "Y" ]; then
            echo "Cancelled."
            exit 0
          fi
        fi

        gh pr merge --squash --delete-branch

        echo ""
        echo "✅ Merged $BRANCH → $TARGET"
        echo ""

        if [ "$TARGET" = "main" ]; then
          # Suggest next patch version based on latest tag on main
          LATEST=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo "v0.0.0")
          CORE=$(echo "$LATEST" | sed -E 's/^v//; s/-.*$//')
          MAJ=$(echo "$CORE" | cut -d. -f1); MAJ=${MAJ:-0}
          MIN=$(echo "$CORE" | cut -d. -f2); MIN=${MIN:-0}
          PAT=$(echo "$CORE" | cut -d. -f3); PAT=${PAT:-0}
          NEXT="v${MAJ}.${MIN}.$((PAT+1))"
          echo "Next steps (latest tag: $LATEST):"
          echo "   task git:release:tag -- $NEXT          → Tag the release"
          echo "   task deploy:prod:remote -- $NEXT       → Deploy tagged release to prod"
          echo "   task release:prod -- $NEXT             → Tag + deploy (combined)"
          echo "   task release:prod                      → Interactive: prompts for version"
          echo ""
          echo "⚠️  Don't forget to cherry-pick into develop if needed:"
          echo "   git checkout develop && git cherry-pick <commit>"
        else
          echo "Next steps:"
          echo "   task deploy:staging                 → Deploy to staging"
        fi

  # ════════════════════════════════════════════════════════════════
  # Release Workflow (develop → main → tag)
  # ════════════════════════════════════════════════════════════════

  release:prepare:
    desc: Create release PR (develop → main)
    preconditions:
      - sh: |
          git fetch origin main develop 2>/dev/null
          AHEAD=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          if [ "$AHEAD" = "0" ]; then
            exit 1
          fi
        msg: |
          ❌ develop has no commits ahead of main. Nothing to release.

          Make sure develop has been updated:
            git checkout develop && git pull
    cmds:
      - |
        AHEAD=$(git rev-list --count origin/main..origin/develop)
        echo "📦 $AHEAD commit(s) to release:"
        echo ""
        git log origin/main..origin/develop --oneline
        echo ""
      - |
        gh pr create --base main --head develop \
          --title "Release $(date +%Y-%m-%d)" \
          --body "Release candidate from develop branch"
        echo ""
        echo "✅ Release PR created: develop → main"
        echo ""
        echo "Next steps:"
        echo "   Review the PR in GitHub"
        echo "   task git:release:ready              → Mark ready for review"
        echo "   task git:release:merge              → Merge when approved"

  release:ready:
    desc: Mark release PR as ready for review
    cmds:
      - |
        PR_NUM=$(gh pr list --base main --head develop --json number -q '.[0].number' 2>/dev/null)
        if [ -z "$PR_NUM" ]; then
          echo "❌ No release PR found (develop → main)"
          echo "   Run: task git:release:prepare"
          exit 1
        fi
        gh pr ready "$PR_NUM"
        echo "✅ Release PR #$PR_NUM marked as ready"

  release:merge:
    desc: Merge release PR (develop → main) and show next steps
    cmds:
      - |
        PR_NUM=$(gh pr list --base main --head develop --json number -q '.[0].number' 2>/dev/null)
        if [ -z "$PR_NUM" ]; then
          echo "❌ No release PR found (develop → main)"
          echo "   Run: task git:release:prepare"
          exit 1
        fi

        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "⚠️  MERGING RELEASE INTO MAIN"
        echo ""
        echo "   PR #$PR_NUM: develop → main"
        echo "═══════════════════════════════════════════════════════════════"
        echo ""

        gh pr merge "$PR_NUM" --merge

        echo ""
        echo "✅ Release merged: develop → main"
        echo ""
        # Suggest next patch version based on latest tag on main
        git fetch origin main --tags --quiet 2>/dev/null || true
        LATEST=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo "v0.0.0")
        CORE=$(echo "$LATEST" | sed -E 's/^v//; s/-.*$//')
        MAJ=$(echo "$CORE" | cut -d. -f1); MAJ=${MAJ:-0}
        MIN=$(echo "$CORE" | cut -d. -f2); MIN=${MIN:-0}
        PAT=$(echo "$CORE" | cut -d. -f3); PAT=${PAT:-0}
        NEXT="v${MAJ}.${MIN}.$((PAT+1))"
        echo "Next steps (latest tag: $LATEST):"
        echo "   task git:release:tag -- $NEXT          → Tag the release"
        echo "   task deploy:prod:remote -- $NEXT       → Deploy tagged release to prod"
        echo "   task release:prod -- $NEXT             → Tag + deploy (combined)"
        echo "   task release:prod                      → Interactive: prompts for version"
  release:tag:
    desc: Tag a release on main and push (e.g., task git:release:tag -- v1.2.0)
    vars:
      VERSION: "{{if .VERSION}}{{.VERSION}}{{else}}{{.CLI_ARGS}}{{end}}"
    deps: [ _provision-main-worktree ]
    preconditions:
      - sh: "[ -n \"{{.VERSION}}\" ]"
        msg: |
          ❌ VERSION required

          Usage:
            task git:release:tag -- v1.2.0
            task git:release:tag VERSION=v1.2.0
      - sh: |
          git fetch origin main develop 2>/dev/null
          DEVELOP_HEAD=$(git rev-parse origin/develop)
          if ! git merge-base --is-ancestor "$DEVELOP_HEAD" origin/main; then
            exit 1
          fi
        msg: |
          ❌ main does not contain develop HEAD.
          Merge develop into main first:

            task git:release:prepare
            task git:release:merge
    prompt: |
      Tag release: {{.VERSION}}

      This will:
        • Tag main branch with {{.VERSION}}
        • Push tag to origin

      Continue?
    cmds:
      - |
        VERSION="{{.VERSION}}"
        echo "Updating main worktree..."
        if [ ! -d "{{.WORKTREE_MAIN}}" ]; then
          echo "❌ Missing {{.WORKTREE_MAIN}} after worktree setup."
          echo "   Refusing to use current checkout for release tagging."
          exit 1
        fi
        cd {{.WORKTREE_MAIN}}
        git fetch origin main --quiet
        git merge --ff-only origin/main --quiet
      - |
        VERSION="{{.VERSION}}"
        if [ ! -d "{{.WORKTREE_MAIN}}" ]; then
          echo "❌ Missing {{.WORKTREE_MAIN}} after worktree setup."
          echo "   Refusing to use current checkout for release tagging."
          exit 1
        fi
        cd {{.WORKTREE_MAIN}}
        git tag -a "$VERSION" -m "Release $VERSION"
        git push origin "$VERSION"
        echo ""
        echo "✅ Tagged $VERSION"
        echo ""
        echo "Next steps:"
        echo "   task deploy:prod:remote -- $VERSION         → Deploy to prod (no checkout needed)"
        echo "   task release:prod -- $VERSION               → Tag + deploy (combined)"

  release:tag-component:
    desc: "Tag a per-component release on main and push
      (COMPONENT=db|backend|frontend, VERSION=v1.2.0). REUSE=1 to skip tagging
      if it already exists, FORCE=1 to move the tag to current main HEAD."
    vars:
      COMPONENT: "{{.COMPONENT}}"
      VERSION: "{{.VERSION}}"
      TAG: "{{.COMPONENT}}-{{.VERSION}}"
      REUSE: "{{.REUSE | default \"0\"}}"
      FORCE: "{{.FORCE | default \"0\"}}"
    deps: [ _provision-main-worktree ]
    preconditions:
      - sh: "echo \"{{.COMPONENT}}\" | grep -Eq \"^(db|backend|frontend)$\""
        msg: "COMPONENT must be db, backend, or frontend"
      - sh: "echo \"{{.VERSION}}\" | grep -Eq \"^v[0-9]+\\.[0-9]+\\.[0-9]+$\""
        msg: "VERSION must be vX.Y.Z (got '{{.VERSION}}')"
      - sh: |
          git fetch origin main develop --tags 2>/dev/null
          DEVELOP_HEAD=$(git rev-parse origin/develop)
          git merge-base --is-ancestor "$DEVELOP_HEAD" origin/main
        msg: |
          ❌ main does not contain develop HEAD.
          Merge develop into main first:
            task git:release:prepare
            task git:release:merge
    cmds:
      - |
        set -e
        TAG="{{.TAG}}"
        REUSE="{{.REUSE}}"
        FORCE="{{.FORCE}}"
        # Refresh local tag refs from origin so existence checks are accurate
        git fetch origin --tags --prune --prune-tags --quiet 2>/dev/null || \
          git fetch origin --tags --quiet 2>/dev/null || true

        # Pick working dir
        if [ ! -d "{{.WORKTREE_MAIN}}" ]; then
          echo "❌ Missing {{.WORKTREE_MAIN}} after worktree setup."
          echo "   Refusing to use current checkout for release tagging."
          exit 1
        fi
        cd {{.WORKTREE_MAIN}}
        git fetch origin main --quiet
        git merge --ff-only origin/main --quiet
        MAIN_HEAD=$(git rev-parse HEAD)

        TAG_LOCAL=$(git rev-parse --verify "refs/tags/$TAG" 2>/dev/null || true)
        TAG_REMOTE=$(git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $1}' | head -1)

        if [ -n "$TAG_LOCAL" ] || [ -n "$TAG_REMOTE" ]; then
          # Tag already exists somewhere
          if [ "$REUSE" = "1" ]; then
            # Make sure local matches remote, then proceed without tagging
            if [ -n "$TAG_REMOTE" ] && [ "$TAG_LOCAL" != "$TAG_REMOTE" ]; then
              git fetch origin "refs/tags/$TAG:refs/tags/$TAG" --quiet || true
            fi
            echo "♻️  REUSE=1 → keeping existing tag $TAG (skipping tag + push)"
            echo "   Deploy: task deploy:prod:remote:{{.COMPONENT}} -- $TAG"
            exit 0
          fi
          if [ "$FORCE" = "1" ]; then
            echo "⚠️  FORCE=1 → moving $TAG to current main HEAD ($MAIN_HEAD)"
            # Drop local + remote, recreate, push
            git tag -d "$TAG" 2>/dev/null || true
            if [ -n "$TAG_REMOTE" ]; then
              git push origin ":refs/tags/$TAG" --quiet
            fi
            git tag -a "$TAG" -m "Release {{.COMPONENT}} {{.VERSION}} (forced retag)"
            git push origin "$TAG"
            echo "✅ Re-tagged $TAG → $MAIN_HEAD"
            echo "   Deploy: task deploy:prod:remote:{{.COMPONENT}} -- $TAG"
            exit 0
          fi
          # Interactive prompt
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "  ⚠️  Tag $TAG already exists"
          [ -n "$TAG_LOCAL" ]  && echo "     local : $TAG_LOCAL"
          [ -n "$TAG_REMOTE" ] && echo "     origin: $TAG_REMOTE"
          echo "     main HEAD: $MAIN_HEAD"
          echo ""
          echo "  Choose:"
          echo "    [r] reuse  → keep tag, just (re)deploy it"
          echo "    [f] force  → move tag to current main HEAD, then deploy"
          echo "    [n] new    → enter a different version (cut a new tag)"
          echo "    [a] abort  (default)"
          echo "═══════════════════════════════════════════════════════════════"
          printf "Action [r/f/n/a]: "
          read -r ANS
          case "$ANS" in
            r|R|reuse)
              if [ -n "$TAG_REMOTE" ] && [ "$TAG_LOCAL" != "$TAG_REMOTE" ]; then
                git fetch origin "refs/tags/$TAG:refs/tags/$TAG" --quiet || true
              fi
              echo "♻️  Reusing existing tag $TAG"
              exit 0
              ;;
            f|F|force)
              echo "⚠️  Moving $TAG → $MAIN_HEAD"
              git tag -d "$TAG" 2>/dev/null || true
              if [ -n "$TAG_REMOTE" ]; then
                git push origin ":refs/tags/$TAG" --quiet
              fi
              git tag -a "$TAG" -m "Release {{.COMPONENT}} {{.VERSION}} (forced retag)"
              git push origin "$TAG"
              echo "✅ Re-tagged $TAG → $MAIN_HEAD"
              exit 0
              ;;
            n|N|new)
              printf "New version (vX.Y.Z): "
              read -r NEWVER
              if ! echo "$NEWVER" | grep -Eq "^v[0-9]+\.[0-9]+\.[0-9]+$"; then
                echo "❌ Invalid version '$NEWVER'. Aborting."
                exit 1
              fi
              NEWTAG="{{.COMPONENT}}-${NEWVER}"
              if git rev-parse --verify "refs/tags/$NEWTAG" >/dev/null 2>&1 \
                 || [ -n "$(git ls-remote --tags origin "refs/tags/$NEWTAG" | head -1)" ]; then
                echo "❌ Tag $NEWTAG also exists. Aborting."
                exit 1
              fi
              git tag -a "$NEWTAG" -m "Release {{.COMPONENT}} $NEWVER"
              git push origin "$NEWTAG"
              echo "✅ Tagged $NEWTAG → $MAIN_HEAD"
              echo "   Deploy: task deploy:prod:remote:{{.COMPONENT}} -- $NEWTAG"
              # Caller (release flow) used the original VERSION for the deploy
              # step; signal the new tag so it can adapt.
              echo "$NEWTAG" > .git/.last-release-tag
              exit 0
              ;;
            *)
              echo "Aborted."
              exit 1
              ;;
          esac
        fi

        # Fresh tag
        git tag -a "$TAG" -m "Release {{.COMPONENT}} {{.VERSION}}"
        git push origin "$TAG"
        echo "✅ Tagged $TAG → $MAIN_HEAD"
        echo "   Deploy: task deploy:prod:remote:{{.COMPONENT}} -- $TAG"

  tags:
    desc: List all release tags
    cmds:
      - git tag -l "v*" --sort=-version:refname
      - git tag -l "*-v*" --sort=-version:refname

  # ════════════════════════════════════════════════════════════════
  # Worktree Management
  # ════════════════════════════════════════════════════════════════

  worktree:create:
    desc: "Create a worktree for any branch (e.g., task git:worktree:create -- main,
      or task git:worktree:create -- origin/develop)"
    vars:
      BRANCH: "{{if .BRANCH}}{{.BRANCH}}{{else}}{{.CLI_ARGS}}{{end}}"
    cmds:
      - mkdir -p {{.WORKTREE_DIR}}
      - |
        BRANCH="{{.BRANCH}}"
        if [ -z "$BRANCH" ]; then
          echo "❌ BRANCH required"
          echo "   Usage: task git:worktree:create -- <branch>"
          echo "   Examples:"
          echo "      task git:worktree:create -- main"
          echo "      task git:worktree:create -- origin/develop"
          echo "      task git:worktree:create -- feature/my-feature"
          exit 1
        fi

        if ! git rev-parse HEAD >/dev/null 2>&1; then
          echo "⚠️  No commits yet — cannot create worktree."
          exit 1
        fi

        # Fetch to ensure origin refs are current
        git fetch origin "$BRANCH" --quiet 2>/dev/null || true

        # Determine worktree path and target ref
        case "$BRANCH" in
          origin/*)
            # Detached worktree from remote ref
            REF="$BRANCH"
            SHORT=$(git rev-parse --short=7 "$REF" 2>/dev/null || echo "unknown")
            WORKTREE_PATH="{{.WORKTREE_DIR}}/ref-$SHORT"
            ;;
          *)
            # Named local branch worktree
            REF="$BRANCH"
            WORKTREE_PATH="{{.WORKTREE_DIR}}/$BRANCH"
            ;;
        esac

        if [ -d "$WORKTREE_PATH" ]; then
          echo "✅ Worktree for $BRANCH already exists at $WORKTREE_PATH"
          exit 0
        fi

        # Check if branch is currently checked out in primary worktree
        CUR_BRANCH=$(git branch --show-current)
        if [ "$CUR_BRANCH" = "$BRANCH" ]; then
          echo "⚠️  $BRANCH is checked out in primary worktree."
          echo "   Creating worktree as detached from origin/$BRANCH for reproducibility..."
          git worktree add --detach "$WORKTREE_PATH" "origin/$BRANCH"
          echo "✅ Created $WORKTREE_PATH (detached @ origin/$BRANCH)"
        else
          # Ensure local branch exists; create from origin if needed
          if ! git rev-parse --verify "$REF" >/dev/null 2>&1; then
            if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
              echo "Creating local branch $BRANCH from origin/$BRANCH..."
              git branch "$BRANCH" "origin/$BRANCH"
            else
              echo "❌ Branch $BRANCH not found locally or on origin"
              exit 1
            fi
          fi

          echo "Creating worktree for $BRANCH..."
          git worktree add "$WORKTREE_PATH" "$REF"
          echo "✅ Created $WORKTREE_PATH"
        fi

  worktree:clean:
    desc: Remove all worktrees
    prompt: This will remove ALL worktrees. Any uncommitted changes in worktrees
      will be lost. Continue?
    cmds:
      - |
        if [ -d "{{.WORKTREE_DIR}}" ]; then
          for WT in {{.WORKTREE_DIR}}/*/; do
            [ -d "$WT" ] && git worktree remove --force "$WT" 2>/dev/null || true
          done
          rm -rf {{.WORKTREE_DIR}}
          echo "✅ All worktrees removed"
        else
          echo "No worktrees to clean"
        fi

  worktree:status:
    desc: Show all active worktrees and disk usage
    cmds:
      - |
        echo "Active worktrees:"
        echo ""
        git worktree list
        echo ""

        if [ -d "{{.WORKTREE_DIR}}" ]; then
          echo "Disk usage:"
          du -sh {{.WORKTREE_DIR}}/* 2>/dev/null || echo "  No worktrees"
        fi

  worktree:update:
    desc: Update persistent worktrees (git pull main + develop)
    cmds:
      - |
        echo "Updating worktrees..."

        if [ -d "{{.WORKTREE_MAIN}}" ]; then
          echo "Updating main..."
          cd {{.WORKTREE_MAIN}} && git pull origin main
        else
          echo "⚠️  main worktree not found — create it with:"
          echo "   task git:worktree:create -- main"
        fi

        if [ -d "{{.WORKTREE_DEVELOP}}" ]; then
          echo "Updating develop..."
          cd {{.WORKTREE_DEVELOP}} && git pull origin develop
        else
          echo "⚠️  develop worktree not found — create it with:"
          echo "   task git:worktree:create -- develop"
        fi

        echo "✅ Worktrees updated"

  # ════════════════════════════════════════════════════════════════
  # Internal Helpers
  # ════════════════════════════════════════════════════════════════

  _check-clean:
    internal: true
    preconditions:
      - sh: "[ -z \"$(git status --porcelain)\" ]"
        msg: |
          ❌ Working directory is not clean.
          Commit or stash your changes first.

  _create-branch:
    internal: true
    cmds:
      - |
        NAME="{{.NAME}}"
        TYPE="{{.TYPE}}"
        if [ -z "$NAME" ]; then
          echo "❌ Usage: task git:$TYPE -- <branch-name>"
          exit 1
        fi
        git checkout develop
        git pull origin develop
        git checkout -b $TYPE/$NAME
        echo "✅ Created branch: $TYPE/$NAME"

  _push-validate:
    internal: true
    cmds:
      - |
        BRANCH=$(git branch --show-current)
        if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "develop" ]; then
          echo "❌ Cannot create PR from $BRANCH. Use a feature/fix/hotfix branch."
          exit 1
        fi
        git push -u origin "$BRANCH"

  _provision-main-worktree:
    internal: true
    cmds:
      - task: worktree:create
        vars: { BRANCH: main }

  _provision-develop-worktree:
    internal: true
    cmds:
      - task: worktree:create
        vars: { BRANCH: develop }

  _resolve-ref:
    internal: true
    preconditions:
      - sh: "git rev-parse --verify \"{{.REF}}\" >/dev/null 2>&1 || git fetch origin
          \"{{.REF}}\" 2>/dev/null"
        msg: |
          ❌ Cannot resolve git ref: {{.REF}}
          Make sure the branch/tag exists locally or on origin.
