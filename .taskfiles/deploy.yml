  prod:remote:
    desc: "Full remote prod deploy: DB migrations + backend (secrets+fly) +
      frontend. REF must be an annotated release tag (e.g., task
      deploy:prod:remote -- v1.2.0)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
      DEPLOY_INFO:
        sh: |
          REF="{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
          [ -z "$REF" ] && exit 0
          git fetch origin '+refs/deploys/prod/*:refs/deploys/prod/*' --tags --quiet 2>/dev/null || true
          CUR=$(git rev-parse refs/deploys/prod/backend 2>/dev/null || echo "")
          CUR_NAME="(none)"
          [ -n "$CUR" ] && CUR_NAME=$(git describe --tags --always "$CUR" 2>/dev/null || echo "$CUR")
          DIFF=""
          LOG=""
          if [ -n "$CUR" ] && git rev-parse --verify "$REF" >/dev/null 2>&1; then
            COUNT=$(git rev-list --count "$CUR..$REF^{commit}" 2>/dev/null || echo "?")
            DIFF=" ($COUNT commits)"
            LOG=$(git log --oneline "$CUR..$REF^{commit}" 2>/dev/null | head -20)
