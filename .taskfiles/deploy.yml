version: "3"

# ════════════════════════════════════════════════════════════════════════════
# Deploy tasks
#
# Naming convention:
#   deploy:<env>:<location>:<component>      — atomic single-component deploy
#                                              (worktree-aware, runs git gates)
#   deploy:<env>:<location>                  — full deploy (atomic tasks in order)
#   deploy:<env>:<location>:cwd[:component]   — CWD variant: assumes CWD is the
#                                              pinned checkout (no git gates,
#                                              no worktree). Use from CI runners
#                                              and from inside ./deploy:prod:remote
#                                              after worktree provisioning.
#
# Remote envs (Fly.io + Neon + Cloudflare):
#   staging:remote   — Neon develop branch  + movida-staging.fly.dev
#   prod:remote      — Neon main branch     + movida.fly.dev
#
# Local envs (docker-compose):
#   staging:local    — localhost:5436 / 8002 / 3001
#
# Status / introspection:
#   deploy:<env>:status            — what's currently deployed (per component, per env)
#   deploy:prod:current             — short form: just the prod backend tag
#
# Deployment tracking:
#   After each successful component deploy we push the deployed SHA to
#   refs/deploys/<env>/<component> on origin (best-effort, never blocks).
#   This is the authoritative source of "what's running where" — it works
#   uniformly for backend / frontend / db migrations, survives across
#   developer machines, and gives a free audit log via `git reflog`.
# ════════════════════════════════════════════════════════════════════════════

tasks:
  # ──────────────────────────────────────────────────────────────────────────
  # Internal: ref → worktree provisioner (called as deps by remote deploy tasks)
  #
  # Remote deploys use SHA-pinned worktrees so they NEVER touch the user's
  # working tree. Each deploy resolves REF → SHA, ensures a worktree exists
  # at .worktrees/ref-<sha>, and runs all commands from inside it via the
  # corresponding `:cwd` primitive.
  #
  # Gates:
  #   • REF must be supplied and resolvable (after `git fetch`)
  #   • staging: REF must be reachable from origin/develop
  #   • prod:    REF must be an annotated tag (vX.Y.Z) reachable from origin/main
  #
  # Secrets (config/secrets.*, backend/credentials/) live only in the host
  # repo and are read from there explicitly — they are NOT copied into the
  # worktree (which is a clean checkout of the SHA).
  # ──────────────────────────────────────────────────────────────────────────

  _prepare-ref-staging:
    internal: true
    cmds:
      - |
        REF="{{.REF}}"
        if [ -z "$REF" ]; then
          echo "❌ REF required."
          echo "   Usage:   task deploy:staging:remote -- <branch|sha>"
          echo "   Example: task deploy:staging:remote -- develop"
          exit 1
        fi
        git fetch origin develop --quiet 2>/dev/null || true
        if ! git rev-parse --verify "$REF" >/dev/null 2>&1; then
          echo "❌ Git ref '$REF' not found locally or on origin."
          exit 1
        fi
        REF_SHA=$(git rev-parse "$REF^{commit}")
        if ! git merge-base --is-ancestor "$REF_SHA" origin/develop 2>/dev/null; then
          echo "❌ '$REF' ($REF_SHA) is not reachable from origin/develop."
          echo "   Staging only deploys commits on the develop branch."
          exit 1
        fi
        SHORT=$(git rev-parse --short=7 "$REF_SHA")
        WT=".worktrees/ref-$SHORT"
        if [ -d "$WT" ]; then
          WT_SHA=$(git -C "$WT" rev-parse HEAD 2>/dev/null || echo "")
          if [ "$WT_SHA" != "$REF_SHA" ]; then
            echo "→ Recreating stale worktree $WT (expected $SHORT, found ${WT_SHA:-unknown})..."
            git worktree remove --force "$WT" >/dev/null
          fi
        fi
        if [ ! -d "$WT" ]; then
          echo "→ Creating worktree $WT from $REF ($SHORT)..."
          mkdir -p .worktrees
          git worktree add --detach "$WT" "$REF_SHA" >/dev/null
        fi
        echo "✅ Staging deploy worktree ready: $WT (ref $REF @ $SHORT)"

  _prepare-ref-prod:
    internal: true
    cmds:
      - |
        REF="{{.REF}}"
        if [ -z "$REF" ]; then
          echo "❌ REF required."
          echo "   Usage:   task deploy:prod:remote -- <release-tag>"
          echo "   Example: task deploy:prod:remote -- v1.2.0"
          echo ""
          echo "   Production only deploys annotated release tags (vX.Y.Z) on main."
          echo "   Create one with: task git:release:tag -- v1.2.0"
          exit 1
        fi
        git fetch origin main --tags --quiet 2>/dev/null || true
        OBJ_TYPE=$(git cat-file -t "$REF" 2>/dev/null || echo "")
        if [ "$OBJ_TYPE" != "tag" ]; then
          echo "❌ '$REF' is not an annotated tag."
          echo "   Production only deploys annotated release tags."
          echo "   Create one with: task git:release:tag -- $REF"
          exit 1
        fi
        case "$REF" in
          v[0-9]*) ;;
          db-v[0-9]*|backend-v[0-9]*|frontend-v[0-9]*) ;;
          *)
            echo "❌ Tag '$REF' does not match release pattern."
            echo "   Expected: <component>-vX.Y.Z (e.g. backend-v1.2.0) or vX.Y.Z (legacy)."
            exit 1
            ;;
        esac
        REF_SHA=$(git rev-parse "$REF^{commit}")
        if ! git merge-base --is-ancestor "$REF_SHA" origin/main 2>/dev/null; then
          echo "❌ Tag '$REF' is not reachable from origin/main."
          exit 1
        fi
        SHORT=$(git rev-parse --short=7 "$REF_SHA")
        WT=".worktrees/ref-$SHORT"
        if [ -d "$WT" ]; then
          WT_SHA=$(git -C "$WT" rev-parse HEAD 2>/dev/null || echo "")
          if [ "$WT_SHA" != "$REF_SHA" ]; then
            echo "→ Recreating stale worktree $WT (expected $SHORT, found ${WT_SHA:-unknown})..."
            git worktree remove --force "$WT" >/dev/null
          fi
        fi
        if [ ! -d "$WT" ]; then
          echo "→ Creating worktree $WT from $REF ($SHORT)..."
          mkdir -p .worktrees
          git worktree add --detach "$WT" "$REF_SHA" >/dev/null
        fi
        echo "✅ Prod deploy worktree ready: $WT (tag $REF @ $SHORT)"

  # ──────────────────────────────────────────────────────────────────────────
  # Internal: deployment ref recorder
  #
  # Pushes the deployed SHA to refs/deploys/<env>/<component> on origin.
  # Best-effort: failures are warned but do not fail the deploy (e.g. if the
  # caller lacks push perms or runs without network).
  # ──────────────────────────────────────────────────────────────────────────

  _record-deploy:
    internal: true
    cmds:
      - |
        ENV="{{.ENV}}"
        COMPONENT="{{.COMPONENT}}"
        SHA="{{.SHA}}"
        if [ -z "$ENV" ] || [ -z "$COMPONENT" ] || [ -z "$SHA" ]; then
          echo "⚠️  _record-deploy: missing ENV/COMPONENT/SHA, skipping ref push"
          exit 0
        fi
        REF_PATH="refs/deploys/$ENV/$COMPONENT"
        if git push -f origin "$SHA:$REF_PATH" 2>/dev/null; then
          echo "📌 Recorded deploy: $REF_PATH → $SHA"
        else
          echo "⚠️  Could not push $REF_PATH (no perms or offline) — skipped"
        fi

  # ──────────────────────────────────────────────────────────────────────────
  # Status: what is currently deployed
  # ──────────────────────────────────────────────────────────────────────────

  _status:
    internal: true
    vars:
      ENV: "{{.ENV}}"
      COMPONENT: '{{.COMPONENT | default ""}}'
    cmds:
      - |
        ENV="{{.ENV}}"
        COMPONENT="{{.COMPONENT}}"
        case "$ENV" in
          prod)    BRANCH=main ;;
          staging) BRANCH=develop ;;
          *)
            echo "❌ Internal error: ENV must be prod|staging (got '$ENV')"
            exit 1 ;;
        esac
        case "$COMPONENT" in
          ""|db|backend|frontend) ;;
          *)
            echo "❌ COMPONENT must be db, backend, or frontend (got '$COMPONENT')"
            exit 1 ;;
        esac
        echo "Fetching deployment refs for $ENV..."
        git fetch origin "+refs/deploys/$ENV/*:refs/deploys/$ENV/*" --quiet 2>/dev/null || true
        git fetch origin "$BRANCH" --tags --quiet 2>/dev/null || true
        LATEST=$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo "")
        LATEST_NAME=""
        if [ -n "$LATEST" ]; then
          LATEST_NAME=$(git describe --tags --always "$LATEST" 2>/dev/null || git rev-parse --short=7 "$LATEST")
        fi

        if [ -n "$COMPONENT" ]; then
          COMPONENTS="$COMPONENT"
        else
          COMPONENTS="db backend frontend"
        fi

        printf "\n%-12s %-22s %-22s %-10s %s\n" "Component" "Released (latest tag)" "Deployed" "Drift" "When"
        echo "------------------------------------------------------------------------------------------"
        for COMP in $COMPONENTS; do
          REF_PATH="refs/deploys/$ENV/$COMP"
          # Latest released tag for this component (per-component, fall back to legacy bare vX.Y.Z for prod)
          RELEASED="(none)"
          if [ "$ENV" = "prod" ]; then
            T=$(git tag -l "${COMP}-v*" --sort=-version:refname | head -1)
            if [ -z "$T" ]; then
              T=$(git tag -l "v*" --sort=-version:refname | head -1)
            fi
            if [ -n "$T" ]; then
              RELEASED="$T"
            fi
          else
            RELEASED="(n/a)"
          fi
          if SHA=$(git rev-parse "$REF_PATH" 2>/dev/null); then
            NAME=$(git describe --tags --always "$SHA" 2>/dev/null || git rev-parse --short=7 "$SHA")
            DATE=$(git log -1 --format=%cd --date=short "$SHA" 2>/dev/null || echo "?")
            if [ -n "$LATEST" ] && [ "$SHA" != "$LATEST" ]; then
              AHEAD=$(git rev-list --count "$SHA..$LATEST" 2>/dev/null || echo "?")
              DRIFT="-$AHEAD"
            else
              DRIFT="up-to-date"
            fi
            printf "%-12s %-22s %-22s %-10s %s\n" "$COMP" "$RELEASED" "$NAME" "$DRIFT" "$DATE"
          else
            printf "%-12s %-22s %-22s %-10s %s\n" "$COMP" "$RELEASED" "(never)" "-" "-"
          fi
        done
        echo "------------------------------------------------------------------------------------------"
        if [ -n "$LATEST" ]; then
          printf "Latest origin/%s: %s (%s)\n\n" "$BRANCH" "$LATEST_NAME" "$(echo $LATEST | cut -c1-7)"
        fi

  prod:status:
    desc:
      "Show what is currently deployed to prod per component (released tag vs
      deployed SHA + drift)."
    cmds:
      - task: _status
        vars: { ENV: "prod" }

  prod:status:db:
    desc: "Show status for currently deployed prod DB component."
    cmds:
      - task: _status
        vars: { ENV: "prod", COMPONENT: "db" }

  prod:status:backend:
    desc: "Show status for currently deployed prod backend component."
    cmds:
      - task: _status
        vars: { ENV: "prod", COMPONENT: "backend" }

  prod:status:frontend:
    desc: "Show status for currently deployed prod frontend component."
    cmds:
      - task: _status
        vars: { ENV: "prod", COMPONENT: "frontend" }

  staging:status:
    desc:
      "Show what is currently deployed to staging per component (deployed SHA +
      drift vs origin/develop)."
    cmds:
      - task: _status
        vars: { ENV: "staging" }

  prod:current:
    desc: "Print the currently deployed prod backend tag (one line)."
    cmds:
      - |
        git fetch origin '+refs/deploys/prod/*:refs/deploys/prod/*' --tags --quiet 2>/dev/null || true
        if SHA=$(git rev-parse refs/deploys/prod/backend 2>/dev/null); then
          NAME=$(git describe --tags --always "$SHA" 2>/dev/null || git rev-parse --short=7 "$SHA")
          echo "$NAME"
        else
          echo "(never deployed)"
          exit 1
        fi

  _status-diff-prod:
    internal: true
    vars:
      REF: "{{.REF}}"
      COMPONENT: '{{.COMPONENT | default ""}}'
    cmds:
      - |
        TARGET_REF="{{.REF}}"
        COMPONENT="{{.COMPONENT}}"

        if [ -z "$TARGET_REF" ]; then
          TARGET_REF="origin/main"
        fi

        case "$COMPONENT" in
          ""|db|backend|frontend) ;;
          *)
            echo "❌ COMPONENT must be db, backend, or frontend (got '$COMPONENT')"
            exit 1
            ;;
        esac

        echo "Fetching prod deployment refs..."
        git fetch origin "+refs/deploys/prod/*:refs/deploys/prod/*" --quiet 2>/dev/null || true
        git fetch origin main --tags --quiet 2>/dev/null || true

        if ! git rev-parse --verify "$TARGET_REF^{commit}" >/dev/null 2>&1; then
          echo "❌ Target ref '$TARGET_REF' could not be resolved to a commit."
          echo "   Try REF=origin/main or REF=<tag>."
          exit 1
        fi

        TARGET_SHA=$(git rev-parse "$TARGET_REF^{commit}")
        TARGET_SHORT=$(git rev-parse --short=7 "$TARGET_SHA")

        if [ -n "$COMPONENT" ]; then
          COMPONENTS="$COMPONENT"
        else
          COMPONENTS="db backend frontend"
        fi

        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "  PROD STATUS DIFF"
        echo "  Target: $TARGET_REF ($TARGET_SHORT)"
        echo "═══════════════════════════════════════════════════════════════"

        for COMP in $COMPONENTS; do
          REF_PATH="refs/deploys/prod/$COMP"
          echo ""
          echo "[$COMP]"

          if ! DEPLOYED_SHA=$(git rev-parse "$REF_PATH" 2>/dev/null); then
            echo "  deployed: (never deployed)"
            echo "  target:   $TARGET_REF ($TARGET_SHORT)"
            continue
          fi

          DEPLOYED_SHORT=$(git rev-parse --short=7 "$DEPLOYED_SHA")
          DEPLOYED_NAME=$(git tag -l --points-at "$DEPLOYED_SHA" "${COMP}-v*" --sort=-version:refname | head -1)
          if [ -z "$DEPLOYED_NAME" ]; then
            DEPLOYED_NAME=$(git tag -l --points-at "$DEPLOYED_SHA" "v*" --sort=-version:refname | head -1)
          fi
          if [ -z "$DEPLOYED_NAME" ]; then
            DEPLOYED_NAME="$DEPLOYED_SHORT"
          fi
          TARGET_ONLY=$(git rev-list --count "$DEPLOYED_SHA..$TARGET_SHA" 2>/dev/null || echo "?")
          PROD_ONLY=$(git rev-list --count "$TARGET_SHA..$DEPLOYED_SHA" 2>/dev/null || echo "?")

          if [ "$DEPLOYED_SHA" = "$TARGET_SHA" ]; then
            RELATION="up-to-date"
          elif [ "$PROD_ONLY" = "0" ]; then
            RELATION="prod behind target by $TARGET_ONLY commit(s)"
          elif [ "$TARGET_ONLY" = "0" ]; then
            RELATION="prod ahead of target by $PROD_ONLY commit(s)"
          else
            RELATION="diverged (prod-only: $PROD_ONLY, target-only: $TARGET_ONLY)"
          fi

          echo "  deployed: $DEPLOYED_NAME ($DEPLOYED_SHORT)"
          echo "  target:   $TARGET_REF ($TARGET_SHORT)"
          echo "  relation: $RELATION"

          if [ "$DEPLOYED_SHA" = "$TARGET_SHA" ]; then
            echo "  commits:  none"
            echo "  files:    none"
            continue
          fi

          echo "  commits:"
          COMMITS=$(git log --left-right --cherry-pick --oneline "$DEPLOYED_SHA...$TARGET_SHA" 2>/dev/null || true)
          if [ -n "$COMMITS" ]; then
            printf '%s\n' "$COMMITS" | sed 's/^/    /'
          else
            echo "    (none)"
          fi

          echo "  files:"
          FILES=$(git diff --name-status "$DEPLOYED_SHA" "$TARGET_SHA" 2>/dev/null || true)
          if [ -n "$FILES" ]; then
            printf '%s\n' "$FILES" | sed 's/^/    /'
          else
            echo "    (none)"
          fi
        done
        echo ""

  prod:status:diff:
    desc: "Show git diff report between deployed prod refs and a target ref
      (default: origin/main)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{if
        .CLI_ARGS}}{{.CLI_ARGS}}{{else}}origin/main{{end}}{{end}}"
    cmds:
      - task: _status-diff-prod
        vars: { REF: "{{.REF}}" }

  prod:status:diff:db:
    desc: "Alias of deploy:prod:status:db:diff (backward compatibility)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{if
        .CLI_ARGS}}{{.CLI_ARGS}}{{else}}origin/main{{end}}{{end}}"
    cmds:
      - task: prod:status:db:diff
        vars: { REF: "{{.REF}}" }

  prod:status:diff:backend:
    desc: "Alias of deploy:prod:status:backend:diff (backward compatibility)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{if
        .CLI_ARGS}}{{.CLI_ARGS}}{{else}}origin/main{{end}}{{end}}"
    cmds:
      - task: prod:status:backend:diff
        vars: { REF: "{{.REF}}" }

  prod:status:diff:frontend:
    desc: "Alias of deploy:prod:status:frontend:diff (backward compatibility)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{if
        .CLI_ARGS}}{{.CLI_ARGS}}{{else}}origin/main{{end}}{{end}}"
    cmds:
      - task: prod:status:frontend:diff
        vars: { REF: "{{.REF}}" }

  prod:status:db:diff:
    desc: "Show git diff report between prod DB deploy ref and a target ref
      (default: origin/main)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{if
        .CLI_ARGS}}{{.CLI_ARGS}}{{else}}origin/main{{end}}{{end}}"
    cmds:
      - task: _status-diff-prod
        vars: { REF: "{{.REF}}", COMPONENT: "db" }

  prod:status:backend:diff:
    desc: "Show git diff report between prod backend deploy ref and a target ref
      (default: origin/main)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{if
        .CLI_ARGS}}{{.CLI_ARGS}}{{else}}origin/main{{end}}{{end}}"
    cmds:
      - task: _status-diff-prod
        vars: { REF: "{{.REF}}", COMPONENT: "backend" }

  prod:status:frontend:diff:
    desc:
      "Show git diff report between prod frontend deploy ref and a target ref
      (default: origin/main)."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{if
        .CLI_ARGS}}{{.CLI_ARGS}}{{else}}origin/main{{end}}{{end}}"
    cmds:
      - task: _status-diff-prod
        vars: { REF: "{{.REF}}", COMPONENT: "frontend" }

  # ══════════════════════════════════════════════════════════════════════════
  # PRIMITIVES (`:remote:cwd:*`)
  #
  # These do the actual work. They take two paths as Task vars:
  #   • SOURCE_DIR (default ".")  — the checkout to deploy from. Commands
  #                                  cd into it before running build/fly/wrangler.
  #   • HOST_DIR   (default ".")  — the repo holding gitignored secrets and
  #                                  credentials.
  #
  # In CI both default to "." (current checkout). In interactive worktree
  # mode, the orchestrators below set SOURCE_DIR to the worktree path and
  # HOST_DIR to the user's repo.
  #
  # `dotenv:` paths resolve relative to this Taskfile's directory (the host
  # repo), so secrets are always loaded correctly.
  # ══════════════════════════════════════════════════════════════════════════

  staging:remote:cwd:db:
    desc: "[CWD primitive] Run staging DB migrations from CWD/SOURCE_DIR."
    dotenv:
      [
        "config/base.env",
        "config/staging.remote.env",
        "config/secrets.env",
        "config/secrets.staging.env",
      ]
    vars:
      SOURCE_DIR: '{{.SOURCE_DIR | default "."}}'
      HOST_DIR: '{{.HOST_DIR | default "."}}'
      ALEMBIC: '{{.ALEMBIC | default ".venv/bin/alembic"}}'
    cmds:
      - |
        if [ -z "$DATABASE_URL" ]; then
          echo "❌ DATABASE_URL not set — fill in config/secrets.staging.env"
          exit 1
        fi
        cd "{{.SOURCE_DIR}}"
        # Resolve ALEMBIC: absolute path or path relative to HOST_DIR
        ALEMBIC_BIN="{{.ALEMBIC}}"
        case "$ALEMBIC_BIN" in
          /*) ;;
          *) ALEMBIC_BIN="$(cd "{{.HOST_DIR}}" && pwd)/$ALEMBIC_BIN" ;;
        esac
        echo "Running migrations on Neon staging (develop branch) from $(pwd)..."
        echo "  Host: $(echo $DATABASE_URL | sed 's|.*@||' | cut -d'/' -f1)"
        PYTHONPATH=. "$ALEMBIC_BIN" -c backend/alembic.ini upgrade head
        echo "✅ Migrations applied"
        echo ""
        echo "ℹ️  Schema only — no fixture data was written."
        echo "   To reconcile reference data with scenarios/staging/ run:"
        echo "     task db:seed:staging:remote"
      - task: _record-deploy
        vars: { ENV: staging, COMPONENT: db, SHA: '{{.GIT_SHA | default ""}}' }

  staging:remote:cwd:backend:
    desc: "[CWD primitive] Stage Fly secrets + deploy backend from SOURCE_DIR
      (default CWD)."
    dotenv:
      ["config/base.env", "config/secrets.env", "config/secrets.staging.env"]
    vars:
      SOURCE_DIR: '{{.SOURCE_DIR | default "."}}'
      HOST_DIR: '{{.HOST_DIR | default "."}}'
      LOG_LEVEL: '{{.LOG_LEVEL | default ""}}'
    cmds:
      - |
        if [ ! -f "{{.HOST_DIR}}/config/secrets.staging.env" ]; then
          echo "❌ {{.HOST_DIR}}/config/secrets.staging.env not found"
          exit 1
        fi
        cd "{{.SOURCE_DIR}}"
        HOST_ABS="$(cd "{{.HOST_DIR}}" && pwd)"
        echo "Staging secrets into Fly (applied atomically on deploy)..."
        cat "$HOST_ABS/config/secrets.env" "$HOST_ABS/config/secrets.staging.env" \
          | grep -v '^[[:space:]]*$' \
          | grep -v '^CLOUDFLARE_' \
          | grep -v '^VITE_' \
          | fly secrets import -c config/fly.staging.toml --stage
        if [ -f "$HOST_ABS/backend/credentials/service-account.json" ]; then
          fly secrets set -c config/fly.staging.toml --stage \
            GOOGLE_SERVICE_ACCOUNT_JSON="$(cat $HOST_ABS/backend/credentials/service-account.json)"
          echo "✅ GOOGLE_SERVICE_ACCOUNT_JSON staged"
        else
          echo "⚠️  backend/credentials/service-account.json not found — GOOGLE_SERVICE_ACCOUNT_JSON not staged"
        fi
        if [ -n "{{.LOG_LEVEL}}" ]; then
          fly secrets set -c config/fly.staging.toml --stage LOG_LEVEL="{{.LOG_LEVEL}}"
          echo "✅ LOG_LEVEL staged: {{.LOG_LEVEL}}"
        fi
      - |
        cd "{{.SOURCE_DIR}}"
        echo "Deploying backend to movida-staging.fly.dev (from $(pwd))..."
        fly deploy --remote-only -c config/fly.staging.toml
      - |
        echo "Waiting for machine to be ready..."
        sleep 5
        HEALTH_URL="https://movida-staging.fly.dev/health"
        echo "Smoke test: GET $HEALTH_URL"
        if curl -sf --retry 6 --retry-delay 5 --retry-connrefused "$HEALTH_URL" > /dev/null; then
          echo "✅ Backend health check passed: $HEALTH_URL"
        else
          echo "⚠️  Health check failed or timed out — check: task logs:staging:remote"
        fi
      - task: _record-deploy
        vars:
          { ENV: staging, COMPONENT: backend, SHA: '{{.GIT_SHA | default ""}}' }

  staging:remote:cwd:frontend:
    desc:
      "[CWD primitive] Build + deploy staging frontend to Cloudflare Pages from
      SOURCE_DIR."
    dotenv:
      [
        "config/base.env",
        "config/staging.remote.env",
        "config/secrets.env",
        "config/secrets.staging.env",
      ]
    vars:
      SOURCE_DIR: '{{.SOURCE_DIR | default "."}}'
      HOST_DIR: '{{.HOST_DIR | default "."}}'
      PROJECT_NAME: '{{.PROJECT_NAME | default "movida"}}'
    cmds:
      - |
        if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
          echo "❌ CLOUDFLARE_API_TOKEN not set in config/secrets.env or CLOUDFLARE_ACCOUNT_ID not set in config/base.env"
          exit 1
        fi
        if [ -z "$VITE_API_URL" ]; then
          echo "❌ VITE_API_URL not set in config/staging.remote.env"
          exit 1
        fi
        echo "Validating Cloudflare token..."
        if ! CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID npx --yes wrangler whoami > /dev/null 2>&1; then
          echo "❌ Cloudflare authentication failed — check token in config/secrets.env"
          exit 1
        fi
        cd "{{.SOURCE_DIR}}/frontend"
        echo "Building staging frontend in $(pwd) (VITE_API_URL=$VITE_API_URL)..."
        if [ ! -d node_modules ]; then
          echo "  Installing frontend deps (npm ci)..."
          npm ci --no-audit --no-fund
        fi
        VITE_API_URL=$VITE_API_URL VITE_UMAMI_URL="${VITE_UMAMI_URL:-}" VITE_UMAMI_WEBSITE_ID="${VITE_UMAMI_WEBSITE_ID:-}" npm run build
        echo "Deploying to Cloudflare Pages (branch: develop)..."
        CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN \
        CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID \
        npx --yes wrangler pages deploy \
          --project-name={{.PROJECT_NAME}} \
          --branch=develop
        echo "✅ Staging frontend deployed: https://develop.joinmovida.com (alias: https://develop.movida.pages.dev)"
      - task: _record-deploy
        vars:
          {
            ENV: staging,
            COMPONENT: frontend,
            SHA: '{{.GIT_SHA | default ""}}',
          }

  prod:remote:cwd:db:
    desc: "[CWD primitive] Run prod DB migrations from CWD/SOURCE_DIR."
    dotenv:
      [
        "config/base.env",
        "config/prod.remote.env",
        "config/secrets.env",
        "config/secrets.prod.env",
      ]
    vars:
      SOURCE_DIR: '{{.SOURCE_DIR | default "."}}'
      HOST_DIR: '{{.HOST_DIR | default "."}}'
      ALEMBIC: '{{.ALEMBIC | default ".venv/bin/alembic"}}'
    cmds:
      - |
        if [ -z "$DATABASE_URL" ]; then
          echo "❌ DATABASE_URL not set — fill in config/secrets.prod.env"
          exit 1
        fi
        cd "{{.SOURCE_DIR}}"
        ALEMBIC_BIN="{{.ALEMBIC}}"
        case "$ALEMBIC_BIN" in
          /*) ;;
          *) ALEMBIC_BIN="$(cd "{{.HOST_DIR}}" && pwd)/$ALEMBIC_BIN" ;;
        esac
        echo "Running migrations on Neon prod (main branch) from $(pwd)..."
        echo "  Host: $(echo $DATABASE_URL | sed 's|.*@||' | cut -d'/' -f1)"
        PYTHONPATH=. "$ALEMBIC_BIN" -c backend/alembic.ini upgrade head
        echo "✅ Migrations applied"
        echo ""
        echo "ℹ️  Schema only — no fixture data was written."
        echo "   To reconcile reference data with scenarios/prod/ run:"
        echo "     task db:seed:prod"
      - task: _record-deploy
        vars: { ENV: prod, COMPONENT: db, SHA: '{{.GIT_SHA | default ""}}' }

  prod:remote:cwd:backend:
    desc:
      "[CWD primitive] Stage Fly secrets + deploy backend to movida.fly.dev from
      SOURCE_DIR."
    dotenv: ["config/base.env", "config/secrets.env", "config/secrets.prod.env"]
    vars:
      SOURCE_DIR: '{{.SOURCE_DIR | default "."}}'
      HOST_DIR: '{{.HOST_DIR | default "."}}'
    cmds:
      - |
        if [ ! -f "{{.HOST_DIR}}/config/secrets.prod.env" ]; then
          echo "❌ {{.HOST_DIR}}/config/secrets.prod.env not found"
          exit 1
        fi
        cd "{{.SOURCE_DIR}}"
        HOST_ABS="$(cd "{{.HOST_DIR}}" && pwd)"
        echo "Staging secrets into Fly (applied atomically on deploy)..."
        cat "$HOST_ABS/config/secrets.env" "$HOST_ABS/config/secrets.prod.env" \
          | grep -v '^[[:space:]]*$' \
          | grep -v '^CLOUDFLARE_' \
          | grep -v '^VITE_' \
          | fly secrets import -c config/fly.prod.toml --stage
        if [ -f "$HOST_ABS/backend/credentials/service-account.json" ]; then
          fly secrets set -c config/fly.prod.toml --stage \
            GOOGLE_SERVICE_ACCOUNT_JSON="$(cat $HOST_ABS/backend/credentials/service-account.json)"
          echo "✅ GOOGLE_SERVICE_ACCOUNT_JSON staged"
        else
          echo "⚠️  backend/credentials/service-account.json not found — GOOGLE_SERVICE_ACCOUNT_JSON not staged"
        fi
      - |
        cd "{{.SOURCE_DIR}}"
        echo "Deploying backend to movida.fly.dev (from $(pwd))..."
        fly deploy --remote-only -c config/fly.prod.toml
      - |
        echo "Waiting for machine to be ready..."
        sleep 5
        HEALTH_URL="https://movida.fly.dev/health"
        echo "Smoke test: GET $HEALTH_URL"
        if curl -sf --retry 6 --retry-delay 5 --retry-connrefused "$HEALTH_URL" > /dev/null; then
          echo "✅ Backend health check passed: $HEALTH_URL"
        else
          echo "⚠️  Health check failed or timed out — check: task fly:logs"
        fi
      - task: _record-deploy
        vars:
          { ENV: prod, COMPONENT: backend, SHA: '{{.GIT_SHA | default ""}}' }

  prod:remote:cwd:frontend:
    desc: "[CWD primitive] Build + deploy prod frontend to Cloudflare Pages from
      SOURCE_DIR."
    dotenv:
      [
        "config/base.env",
        "config/prod.remote.env",
        "config/secrets.env",
        "config/secrets.prod.env",
      ]
    vars:
      SOURCE_DIR: '{{.SOURCE_DIR | default "."}}'
      HOST_DIR: '{{.HOST_DIR | default "."}}'
      PROJECT_NAME: '{{.PROJECT_NAME | default "movida"}}'
    cmds:
      - |
        if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
          echo "❌ CLOUDFLARE_API_TOKEN not set in config/secrets.env or CLOUDFLARE_ACCOUNT_ID not set in config/base.env"
          exit 1
        fi
        if [ -z "$VITE_API_URL" ]; then
          echo "❌ VITE_API_URL not set in config/prod.remote.env"
          exit 1
        fi
        echo "Validating Cloudflare token..."
        if ! CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID npx --yes wrangler whoami > /dev/null 2>&1; then
          echo "❌ Cloudflare authentication failed — check token in config/secrets.env"
          exit 1
        fi
        echo "Building prod frontend in {{.SOURCE_DIR}}/frontend (VITE_API_URL=$VITE_API_URL)..."
        cd "{{.SOURCE_DIR}}/frontend"
        if [ ! -d node_modules ]; then
          echo "  Installing frontend deps (npm ci)..."
          npm ci --no-audit --no-fund
        fi
        VITE_API_URL=$VITE_API_URL VITE_UMAMI_URL="${VITE_UMAMI_URL:-}" VITE_UMAMI_WEBSITE_ID="${VITE_UMAMI_WEBSITE_ID:-}" npm run build
        echo "Deploying to Cloudflare Pages (branch: main)..."
        CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN \
        CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID \
        npx --yes wrangler pages deploy \
          --project-name={{.PROJECT_NAME}} \
          --branch=main
        echo "✅ Prod frontend deployed: https://joinmovida.com (alias: https://movida.pages.dev)"
      - task: _record-deploy
        vars:
          { ENV: prod, COMPONENT: frontend, SHA: '{{.GIT_SHA | default ""}}' }

