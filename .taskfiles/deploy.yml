  # ══════════════════════════════════════════════════════════════════════════
  # PROD REMOTE — worktree-aware orchestrators (interactive use)
  #
  # Each prod orchestrator displays "current → next + diff" before prompting.
  # The prompt text is computed at parse time via vars.sh:.
  # ══════════════════════════════════════════════════════════════════════════

  prod:remote:db:
    desc:
      "Run DB migrations on Neon prod (main branch). REF must be an annotated
      release tag."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
      WT_ABS:
        sh: |
          REF="{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
          [ -z "$REF" ] && exit 0
          SHORT=$(git rev-parse --short=7 "$REF^{commit}" 2>/dev/null) || exit 0
          echo "$(pwd)/.worktrees/ref-$SHORT"
      HOST_ABS:
        sh: pwd
      GIT_SHA:
        sh: |
          REF="{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
          [ -z "$REF" ] && exit 0
          git rev-parse "$REF^{commit}" 2>/dev/null || true
      DEPLOY_INFO:
        sh: |
          REF="{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
          [ -z "$REF" ] && exit 0
          git fetch origin '+refs/deploys/prod/db:refs/deploys/prod/db' --quiet 2>/dev/null || true
          CUR=$(git rev-parse refs/deploys/prod/db 2>/dev/null || echo "")
          CUR_NAME="(none)"
          [ -n "$CUR" ] && CUR_NAME=$(git describe --tags --always "$CUR" 2>/dev/null || echo "$CUR")
          echo "current=$CUR_NAME → next=$REF"
    deps:
      - task: _prepare-ref-prod
        vars: { REF: "{{.REF}}" }
    preconditions:
      - sh: |
          REF="{{.REF}}"
          case "$REF" in
            db-v[0-9]*|v[0-9]*) exit 0 ;;
            backend-v[0-9]*|frontend-v[0-9]*)
              echo "❌ Tag '$REF' is for a different component. Use 'task deploy:prod:remote:db -- db-vX.Y.Z'." >&2; exit 1 ;;
          esac
        msg: "REF must be db-vX.Y.Z (or legacy vX.Y.Z)"
    prompt: |
      PROD DB MIGRATION
      {{.DEPLOY_INFO}}
      Continue?
    cmds:
      - task: prod:remote:cwd:db
        vars:
          SOURCE_DIR: "{{.WT_ABS}}"
          HOST_DIR: "{{.HOST_ABS}}"
          GIT_SHA: "{{.GIT_SHA}}"

  prod:remote:backend:
    desc: "Stage Fly secrets + deploy backend to movida.fly.dev. REF must be an
      annotated release tag."
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
      WT_ABS:
        sh: |
          REF="{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
          [ -z "$REF" ] && exit 0
          SHORT=$(git rev-parse --short=7 "$REF^{commit}" 2>/dev/null) || exit 0
          echo "$(pwd)/.worktrees/ref-$SHORT"
      HOST_ABS:
        sh: pwd
      GIT_SHA:
        sh: |
          REF="{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
          [ -z "$REF" ] && exit 0
          git rev-parse "$REF^{commit}" 2>/dev/null || true
      DEPLOY_INFO:
        sh: |
          REF="{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
          [ -z "$REF" ] && exit 0
          git fetch origin '+refs/deploys/prod/backend:refs/deploys/prod/backend' --quiet 2>/dev/null || true
          CUR=$(git rev-parse refs/deploys/prod/backend 2>/dev/null || echo "")
          CUR_NAME="(none)"
          [ -n "$CUR" ] && CUR_NAME=$(git describe --tags --always "$CUR" 2>/dev/null || echo "$CUR")
          DIFF=""
          if [ -n "$CUR" ] && git rev-parse --verify "$REF" >/dev/null 2>&1; then
            COUNT=$(git rev-list --count "$CUR..$REF^{commit}" 2>/dev/null || echo "?")
            DIFF=" ($COUNT commits ahead)"
          fi
          echo "current=$CUR_NAME → next=$REF$DIFF"
    deps:
      - task: _prepare-ref-prod
        vars: { REF: "{{.REF}}" }
    preconditions:
      - sh: |
          REF="{{.REF}}"
          case "$REF" in
            backend-v[0-9]*|v[0-9]*) exit 0 ;;
            db-v[0-9]*|frontend-v[0-9]*)
              echo "❌ Tag '$REF' is for a different component. Use 'task deploy:prod:remote:backend -- backend-vX.Y.Z'." >&2; exit 1 ;;
          esac
        msg: "REF must be backend-vX.Y.Z (or legacy vX.Y.Z)"
    prompt: |
      PROD BACKEND DEPLOY
      {{.DEPLOY_INFO}}
      Continue?
    cmds:
      - task: prod:remote:cwd:backend
        vars:
          SOURCE_DIR: "{{.WT_ABS}}"
          HOST_DIR: "{{.HOST_ABS}}"
          GIT_SHA: "{{.GIT_SHA}}"

