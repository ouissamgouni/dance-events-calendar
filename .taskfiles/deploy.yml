      {{.DEPLOY_INFO}}

      Continue?
    cmds:
      - |
        SHORT=$(git rev-parse --short=7 "{{.REF}}^{commit}")
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  Deploying PRODUCTION"
        echo "  Tag:      {{.REF}} ($SHORT) — from worktree .worktrees/ref-$SHORT"
        echo "  Backend:  https://movida.fly.dev"
        echo "  Frontend: https://joinmovida.com (alias: https://movida.pages.dev)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "━━━━ [1/3] DB migrations ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - task: prod:remote:db
        vars: { REF: "{{.REF}}" }
      - echo "━━━━ [2/3] Backend ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - task: prod:remote:backend
        vars: { REF: "{{.REF}}" }
      - echo "━━━━ [3/3] Frontend ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - task: prod:remote:frontend
        vars: { REF: "{{.REF}}" }
      - |
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Production fully deployed"
        echo "   Backend:  https://movida.fly.dev"
        echo "   Frontend: https://joinmovida.com (alias: https://movida.pages.dev)"
        echo ""
        echo "Verify:"
        echo "   task open:isolated:prod              → Open in isolated browser"
        echo "   task open:isolated:prod COUNT=2      → Multi-user smoke check"
        echo "   task deploy:prod:status  → what is currently deployed"
        echo "   task db:check:prod          → DB migration state"
        echo "   task db:check:tags-drift:prod → reference-tag drift vs scenarios/prod/"
        echo "   task fly:logs               → backend logs"
        echo ""
        echo "If reference data needs to match scenarios/prod/ exactly:"
        echo "   task db:seed:prod"
        echo "═══════════════════════════════════════════════════════════════"

  # ──────────────────────────────────────────────────────────────────────────
  # STAGING LOCAL — docker-compose
  # ──────────────────────────────────────────────────────────────────────────

  staging:local:
    desc:
      "Build from develop + deploy to local staging (docker-compose). DRY_RUN=1
      to preview."
    dotenv:
      [
        "config/base.env",
        "config/staging.local.env",
        "config/secrets.staging.local.env",
      ]
    vars:
      DRY_RUN: '{{.DRY_RUN | default "0"}}'
    cmds:
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          echo "🔍 DRY RUN — would deploy to local STAGING (from develop)"
          echo ""
          echo "Steps:"
          echo "  1. Build images from develop (task build:staging)"
          echo "  2. docker compose down (movida-staging)"
          echo "  3. docker compose up -d"
          echo ""
          echo "Compose config:"
          ENV_NAME=staging IMAGE_TAG=develop docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging config
          exit 0
        fi
      - task: :build:staging
      - ENV_NAME=staging IMAGE_TAG=develop docker compose -f
        infra/docker/docker-compose.unified.yml -p movida-staging down
      - ENV_NAME=staging IMAGE_TAG=develop docker compose -f
        infra/docker/docker-compose.unified.yml -p movida-staging up -d
      - sleep 5
      - |
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Deployed to local STAGING (from develop branch)"
        echo ""
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3001}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8002}"
        echo "   Database: localhost:${POSTGRES_PORT:-5436}"
        echo ""
        echo "Next steps:"
        echo "   task open:isolated:staging:local              → Open in isolated browser"
        echo "   task open:isolated:staging:local COUNT=2      → Multi-user QA"
        echo "   task logs:staging:local   → View logs"
        echo "═══════════════════════════════════════════════════════════════"

  staging:local:ref:
    desc: "Build from any git ref + deploy to local staging. DRY_RUN=1 to preview."
    dotenv:
      [
        "config/base.env",
        "config/staging.local.env",
        "config/secrets.staging.local.env",
      ]
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
      DRY_RUN: '{{.DRY_RUN | default "0"}}'
    cmds:
      - |
        REF="{{.REF}}"
        if [ -z "$REF" ]; then
          echo "❌ Usage: task deploy:staging:local:ref -- feature/my-branch"
          exit 1
        fi
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          REF="{{.REF}}"
          SHA=$(git rev-parse --short=7 "$REF" 2>/dev/null || echo "unknown")
          echo "🔍 DRY RUN — would deploy to local STAGING (from $REF @ $SHA)"
          exit 0
        fi
      - task: :build:ref
        vars: { REF: "{{.REF}}" }
      - |
        REF="{{.REF}}"
        SHA=$(git rev-parse --short=7 "$REF")
        TAG="ref-$SHA"
        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging down
        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging up -d
        sleep 5
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Deployed to local STAGING (from $REF @ $SHA)"
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3001}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8002}"
        echo "═══════════════════════════════════════════════════════════════"

  staging:local:cwd:
    desc: "Build from working directory + deploy to local staging. DRY_RUN=1 to
      preview."
    dotenv:
      [
        "config/base.env",
        "config/staging.local.env",
        "config/secrets.staging.local.env",
      ]
    vars:
      DRY_RUN: '{{.DRY_RUN | default "0"}}'
    cmds:
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          echo "🔍 DRY RUN — would deploy to local STAGING (from working directory)"
          exit 0
        fi
      - task: :build:cwd
      - |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        TAG="dirty-$TIMESTAMP"
        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging down
        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging up -d
        sleep 5
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Deployed to local STAGING (from working directory, tag :$TAG)"
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3001}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8002}"
        echo "═══════════════════════════════════════════════════════════════"

  # ──────────────────────────────────────────────────────────────────────────
  # PROD LOCAL — docker-compose
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # Backward-compat aliases (kept so existing scripts don't break)
  # ──────────────────────────────────────────────────────────────────────────

  cloudflare:pages:staging:
    desc: "Alias → task deploy:staging:remote:frontend"
    cmds:
      - task: staging:remote:frontend

  cloudflare:pages:
    desc: "Alias → task deploy:prod:remote:frontend"
    cmds:
      - task: prod:remote:frontend
