version: "3"

tasks:
  staging:local:
    desc: "Build from develop and deploy to local staging (docker-compose). DRY_RUN=1 to preview."
    dotenv: [.env.staging]
    vars:
      DRY_RUN: '{{.DRY_RUN | default "0"}}'
    cmds:
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          echo "🔍 DRY RUN — would deploy to local STAGING (from develop)"
          echo ""
          echo "Steps:"
          echo "  1. Build images from develop (task build:staging)"
          echo "  2. docker compose down (movida-staging)"
          echo "  3. docker compose up -d"
          echo ""
          echo "Compose config:"
          ENV_NAME=staging IMAGE_TAG=develop docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging config
          exit 0
        fi
      - task: :build:staging
      - ENV_NAME=staging IMAGE_TAG=develop docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging down
      - ENV_NAME=staging IMAGE_TAG=develop docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging up -d
      - sleep 5
      - |
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Deployed to local STAGING (from develop branch)"
        echo ""
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3001}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8002}"
        echo "   Database: localhost:${POSTGRES_PORT:-5436}"
        echo ""
        echo "Next steps:"
        echo "   task logs:staging:local   → View logs"
        echo "═══════════════════════════════════════════════════════════════"

  staging:remote:
    desc: "Migrate Neon develop branch + deploy backend to staging Fly.io app (requires secrets.staging.env)"
    dotenv: ["secrets.env", "secrets.staging.env", ".env.staging"]
    cmds:
      - |
        if [ ! -f secrets.staging.env ]; then
          echo "❌ secrets.staging.env not found — copy secrets.staging.env.example and fill in values"
          exit 1
        fi
        if [ -z "$DATABASE_URL" ]; then
          echo "❌ DATABASE_URL not set — fill in secrets.staging.env"
          exit 1
        fi
      - |
        echo "Running migrations on Neon staging (develop branch)..."
        PYTHONPATH=. .venv/bin/alembic -c backend/alembic.ini upgrade head
      - task: :fly:staging:deploy
      - |
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Remote staging deployed"
        echo "   Backend:  https://salsa-events-calendar-staging.fly.dev"
        echo "   Frontend: auto-deployed by Cloudflare Pages (develop branch)"
        echo "   Logs:     task logs:staging:remote"
        echo "═══════════════════════════════════════════════════════════════"

  staging:local:ref:
    desc: "Build from any git ref and deploy to local staging (docker-compose). DRY_RUN=1 to preview."
    dotenv: [.env.staging]
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
      DRY_RUN: '{{.DRY_RUN | default "0"}}'
    cmds:
      - |
        REF="{{.REF}}"
        if [ -z "$REF" ]; then
          echo "❌ Usage:"
          echo "   task deploy:staging:local:ref -- feature/my-branch"
          exit 1
        fi
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          REF="{{.REF}}"
          SHA=$(git rev-parse --short=7 "$REF" 2>/dev/null || echo "unknown")
          TAG="ref-$SHA"
          echo "🔍 DRY RUN — would deploy to local STAGING (from $REF)"
          echo ""
          echo "Steps:"
          echo "  1. Build images from $REF (task build:ref)"
          echo "  2. docker compose down (movida-staging)"
          echo "  3. docker compose up -d with tag :$TAG"
          exit 0
        fi
      - task: :build:ref
        vars: { REF: "{{.REF}}" }
      - |
        REF="{{.REF}}"
        SHA=$(git rev-parse --short=7 "$REF")
        TAG="ref-$SHA"

        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging down
        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging up -d
        sleep 5

        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Deployed to local STAGING (from $REF)"
        echo ""
        echo "   Git ref:  $REF"
        echo "   SHA:      $SHA"
        echo "   Tag:      :$TAG"
        echo ""
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3001}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8002}"
        echo "═══════════════════════════════════════════════════════════════"

  staging:local:dirty:
    desc: "Build from current working directory and deploy to local staging. DRY_RUN=1 to preview."
    dotenv: [.env.staging]
    vars:
      DRY_RUN: '{{.DRY_RUN | default "0"}}'
    cmds:
      - |
        if [ "{{.DRY_RUN}}" = "1" ]; then
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="dirty-$TIMESTAMP"
          echo "🔍 DRY RUN — would deploy to local STAGING (from working directory)"
          echo ""
          echo "Steps:"
          echo "  1. Build images from current directory (task build:dirty)"
          echo "  2. docker compose down (movida-staging)"
          echo "  3. docker compose up -d with tag :$TAG"
          exit 0
        fi
      - task: :build:dirty
      - |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        TAG="dirty-$TIMESTAMP"

        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging down
        ENV_NAME=staging IMAGE_TAG=$TAG docker compose -f infra/docker/docker-compose.unified.yml -p movida-staging up -d
        sleep 5

        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Deployed to local STAGING (from working directory)"
        echo ""
        echo "   ⚠️  Built from uncommitted changes"
        echo "   Tag: :$TAG"
        echo ""
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3001}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8002}"
        echo "═══════════════════════════════════════════════════════════════"

  cloudflare:pages:
    desc: "Build frontend and deploy to Cloudflare Pages (manual — CI auto-deploys on push to main)"
    dotenv: ["secrets.env", "secrets.prod.env", ".env.prod"]
    vars:
      PROJECT_NAME: '{{.PROJECT_NAME | default "salsa-events-calendar"}}'
    cmds:
      - |
        if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
          echo "❌ Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in secrets.prod.env"
          exit 1
        fi
        if [ -z "$VITE_API_URL" ]; then
          echo "❌ Set VITE_API_URL in secrets.prod.env (e.g. https://api.yourdomain.com)"
          exit 1
        fi
      - |
        echo "Building frontend (VITE_API_URL=$VITE_API_URL)..."
        cd frontend && VITE_API_URL=$VITE_API_URL npm run build
      - |
        echo "Deploying to Cloudflare Pages (project: {{.PROJECT_NAME}})..."
        cd frontend && \
          CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN \
          CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID \
          npx --yes wrangler pages deploy dist \
            --project-name={{.PROJECT_NAME}} \
            --branch=main
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Frontend deployed to Cloudflare Pages"
        echo "═══════════════════════════════════════════════════════════════"

  prod:
    desc: "Deploy to prod. DRY_RUN=1 to preview. (e.g., task deploy:prod -- v1.2.0)"
    prompt: "This will deploy to PRODUCTION. Continue?"
    dotenv: [.env.prod]
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
      DRY_RUN: '{{.DRY_RUN | default "0"}}'
    cmds:
      - |
        REF="{{.REF}}"
        if [ -z "$REF" ]; then
          REF="latest"
        fi

        if [ "{{.DRY_RUN}}" = "1" ]; then
          echo "🔍 DRY RUN — would deploy to PROD: $REF"
          echo ""
          if docker image inspect movida-backend:$REF > /dev/null 2>&1; then
            echo "Image found: movida-backend:$REF"
          else
            echo "No image found for :$REF — would attempt to build from git ref"
          fi
          echo ""
          echo "Steps:"
          echo "  1. docker compose down (movida-prod)"
          echo "  2. docker compose up -d with tag :$REF"
          echo ""
          echo "Compose config:"
          ENV_NAME=prod IMAGE_TAG=$REF docker compose -f infra/docker/docker-compose.unified.yml -p movida-prod config
          exit 0
        fi

        if docker image inspect movida-backend:$REF > /dev/null 2>&1; then
          VERSION="$REF"
          echo "Deploying existing image: $VERSION"
        else
          echo "No image found for :$REF — attempting to build from git ref..."
          task build:ref -- "$REF" || { echo "❌ Failed to build from $REF"; exit 1; }
          SHA=$(git rev-parse --short=7 "$REF")
          VERSION="ref-$SHA"
          echo "Built $REF → :$VERSION"
        fi

        ENV_NAME=prod IMAGE_TAG=$VERSION docker compose -f infra/docker/docker-compose.unified.yml -p movida-prod down
        ENV_NAME=prod IMAGE_TAG=$VERSION docker compose -f infra/docker/docker-compose.unified.yml -p movida-prod up -d
        sleep 5
        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "✅ Deployed to PROD: $VERSION"
        echo ""
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3000}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8080}"
        echo "═══════════════════════════════════════════════════════════════"
