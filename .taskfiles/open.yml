version: "3"

# ════════════════════════════════════════════════════════════════════════════
# open:* — open one or more browser windows pointing at any environment.
#
# Two modes:
#   • shared    → focus an existing Chrome tab matching the URL, else open one
#                 tab in your default Chrome profile. Cookies + localStorage
#                 are SHARED with all your normal browsing and with every
#                 other `shared` invocation. Best for: solo dev loop, quick
#                 smoke check.
#   • isolated  → open COUNT (default 1) Chrome sessions, each with its own
#                 --user-data-dir → independent cookie jar / localStorage.
#                 Better than incognito (which shares state within a Chrome
#                 process). Profile dirs are stable per (env, scenario, index)
#                 under /tmp/chrome-profiles/, so re-running the same task is
#                 idempotent: it focuses the existing window instead of
#                 duplicating it. Pass RESET_BROWSER=1 to wipe the profile
#                 dirs first for a true clean start. Best for: scenario QA,
#                 multi-user share flows.
#
# Examples:
#   task open:shared:dev
#   task open:isolated:dev                                       # 1 isolated session
#   task open:isolated:scenario SCENARIO=share-im-going COUNT=2  # multi-user QA
#   task open:isolated:scenario SCENARIO=foo RESET_BROWSER=1     # wipe state first
#   task open:isolated:staging:remote
#   task open:isolated:prod
#
# Cleanup:
#   task open:clean        nuke all isolated profile dirs
#   task open:clean:dev    nuke only dev-* isolated profile dirs
#
# Note: stop:scenario and stop:scenario:all clean their own isolated profiles
# automatically (pass KEEP_BROWSER=1 to opt out).
# ════════════════════════════════════════════════════════════════════════════

vars:
  SCENARIO_PORTS_SH: .taskfiles/scenario_ports.sh

tasks:
  # ─────────────────────────────────────────────────────────────────────
  # Internal: dispatch to open-browsers.sh with mode + count + label + reset
  # ─────────────────────────────────────────────────────────────────────
  _open:
    internal: true
    cmds:
      - |
        URL="{{.URL}}"
        MODE="{{.MODE | default `isolated`}}"
        COUNT="{{.COUNT | default `1`}}"
        LABEL="{{.LABEL | default `session`}}"
        RESET="{{.RESET_BROWSER | default `0`}}"
        {{.ROOT_DIR}}/.taskfiles/open-browsers.sh "$URL" "$MODE" "$COUNT" "$LABEL" "$RESET"

  # ─────────────────────────────────────────────────────────────────────
  # shared:* — focus existing Chrome tab (or open one) in default profile
  # ─────────────────────────────────────────────────────────────────────

  shared:dev:
    desc: "Focus or open a tab on dev (http://localhost:5173) in your default
      Chrome profile (shared cookies)."
    dotenv: ["config/base.env", "config/dev.env"]
    cmds:
      - task: _open
        vars:
          URL: "http://localhost:${FRONTEND_PORT:-5173}"
          MODE: "shared"
          LABEL: "dev"

  shared:scenario:
    desc: "Focus or open a tab on a scenario (SCENARIO=name) in your default
      Chrome profile (shared cookies)."
    vars:
      SCENARIO: '{{.SCENARIO | default "default"}}'
      SC_WEB_PORT:
        sh: source {{.SCENARIO_PORTS_SH}} "{{.SCENARIO}}" && echo "$SC_WEB_PORT"
    cmds:
      - task: _open
        vars:
          URL: "http://localhost:{{.SC_WEB_PORT}}"
          MODE: "shared"
          LABEL: "scenario-{{.SCENARIO}}"

  shared:staging:local:
    desc: "Focus or open a tab on local staging (http://localhost:3001) in your
      default Chrome profile (shared cookies)."
    dotenv: ["config/base.env", "config/staging.local.env"]
    cmds:
      - task: _open
        vars:
          URL: "http://localhost:${FRONTEND_PORT:-3001}"
          MODE: "shared"
          LABEL: "staging-local"

  shared:staging:remote:
    desc:
      "Focus or open a tab on remote staging (https://develop.joinmovida.com)
      in your default Chrome profile (shared cookies)."
    cmds:
      - task: _open
        vars:
          URL: "https://develop.joinmovida.com"
          MODE: "shared"
          LABEL: "staging-remote"

  shared:prod:
    desc: "Focus or open a tab on production (https://joinmovida.com) in your
      default Chrome profile (shared cookies)."
    cmds:
      - task: _open
        vars:
          URL: "https://joinmovida.com"
          MODE: "shared"
          LABEL: "prod"

  # ─────────────────────────────────────────────────────────────────────
  # isolated:* — open COUNT sessions with own --user-data-dir
  # ─────────────────────────────────────────────────────────────────────

  isolated:dev:
    desc: "Open COUNT=N (default 1) isolated Chrome sessions on dev. Idempotent
      (focuses existing window). RESET_BROWSER=1 to wipe profile first."
    dotenv: ["config/base.env", "config/dev.env"]
    cmds:
      - task: _open
        vars:
          URL: "http://localhost:${FRONTEND_PORT:-5173}"
          MODE: "isolated"
          LABEL: "dev"
          COUNT: '{{.COUNT | default "1"}}'
          RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'

  isolated:scenario:
    desc: "Open COUNT=N (default 1) isolated Chrome sessions on a scenario.
      SCENARIO=name. Idempotent. RESET_BROWSER=1 to wipe profile first."
    vars:
      SCENARIO: '{{.SCENARIO | default "default"}}'
      SC_WEB_PORT:
        sh: source {{.SCENARIO_PORTS_SH}} "{{.SCENARIO}}" && echo "$SC_WEB_PORT"
    cmds:
      - task: _open
        vars:
          URL: "http://localhost:{{.SC_WEB_PORT}}"
          MODE: "isolated"
          LABEL: "scenario-{{.SCENARIO}}"
          COUNT: '{{.COUNT | default "1"}}'
          RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'

  isolated:staging:local:
    desc: "Open COUNT=N (default 1) isolated Chrome sessions on local staging.
      Idempotent. RESET_BROWSER=1 to wipe profile first."
    dotenv: ["config/base.env", "config/staging.local.env"]
    cmds:
      - task: _open
        vars:
          URL: "http://localhost:${FRONTEND_PORT:-3001}"
          MODE: "isolated"
          LABEL: "staging-local"
          COUNT: '{{.COUNT | default "1"}}'
          RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'

  isolated:staging:remote:
    desc: "Open COUNT=N (default 1) isolated Chrome sessions on remote staging.
      Idempotent. RESET_BROWSER=1 to wipe profile first."
    cmds:
      - task: _open
        vars:
          URL: "https://develop.joinmovida.com"
          MODE: "isolated"
          LABEL: "staging-remote"
          COUNT: '{{.COUNT | default "1"}}'
          RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'

  isolated:prod:
    desc: "Open COUNT=N (default 1) isolated Chrome sessions on production.
      Idempotent. RESET_BROWSER=1 to wipe profile first."
    cmds:
      - task: _open
        vars:
          URL: "https://joinmovida.com"
          MODE: "isolated"
          LABEL: "prod"
          COUNT: '{{.COUNT | default "1"}}'
          RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'

  # ─────────────────────────────────────────────────────────────────────
  # Cleanup
  # ─────────────────────────────────────────────────────────────────────

  clean:
    desc: Remove ALL isolated Chrome profile dirs created by open:isolated:*
    cmds:
      - |
        ROOT="/tmp/chrome-profiles"
        LEGACY=$(find /tmp -maxdepth 1 -type d -name 'chrome-*' ! -path "$ROOT" 2>/dev/null)
        NEW=""
        [ -d "$ROOT" ] && NEW=$(find "$ROOT" -mindepth 1 -maxdepth 1 -type d 2>/dev/null)
        if [ -z "$LEGACY" ] && [ -z "$NEW" ]; then
          echo "No isolated Chrome profile dirs found."
          exit 0
        fi
        echo "Removing isolated Chrome profile dirs..."
        [ -n "$NEW" ] && rm -rf "$ROOT"/* 2>/dev/null || true
        [ -n "$LEGACY" ] && find /tmp -maxdepth 1 -type d -name 'chrome-*' ! -path "$ROOT" -exec rm -rf {} + 2>/dev/null || true
        echo "✅ Done."

  clean:dev:
    desc: Remove only dev-* isolated Chrome profile dirs (keeps scenario sessions)
    cmds:
      - |
        ROOT="/tmp/chrome-profiles"
        if [ ! -d "$ROOT" ]; then
          echo "No isolated profile root at $ROOT."
          exit 0
        fi
        MATCHES=$(find "$ROOT" -mindepth 1 -maxdepth 1 -type d -name 'dev-*' 2>/dev/null)
        if [ -z "$MATCHES" ]; then
          echo "No dev-* isolated profile dirs found."
          exit 0
        fi
        echo "$MATCHES" | xargs rm -rf 2>/dev/null || true
        echo "✅ Removed dev-* isolated profile dirs."
