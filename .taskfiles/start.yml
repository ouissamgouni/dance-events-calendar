version: "3"

vars:
  RELOAD_FLAG: '{{if eq (env "DONT_RELOAD") "true"}}{{else}}--reload{{end}}'
  LOG_LEVEL: '{{.LOG_LEVEL | default "info"}}'
  UVICORN_ACCESS_LOG_EXCLUDE_PATHS: '{{.UVICORN_ACCESS_LOG_EXCLUDE_PATHS | default ""}}'
  SCENARIO_PORTS_SH: .taskfiles/scenario_ports.sh

tasks:
  dev:db:
    desc: Start dev database + Umami analytics (RESET=1 to teardown first)
    vars:
      RESET: '{{.RESET | default "0"}}'
    cmds:
      - |
        if [ "{{.RESET}}" = "1" ]; then
          echo "🔄 RESET: tearing down dev database..."
          docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.dev.yml down -v 2>/dev/null || true
        fi
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.dev.yml up -d
      - |
        echo ""
        echo "✅ Dev stack started"
        echo "   Database: localhost:${POSTGRES_PORT:-5434}"
        echo "   Umami:    http://localhost:${UMAMI_PORT:-3100}"

  open:umami:
    desc: "Open Umami analytics dashboard. BROWSER=none|shared|isolated (default
      shared), COUNT=N for isolated, RESET_BROWSER=1 to wipe profile."
    vars:
      BROWSER: '{{.BROWSER | default "shared"}}'
      COUNT: '{{.COUNT | default "1"}}'
      RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'
    cmds:
      - |
        {{.ROOT_DIR}}/.taskfiles/open-browsers.sh "http://localhost:${UMAMI_PORT:-3100}" "{{.BROWSER}}" "{{.COUNT}}" "umami" "{{.RESET_BROWSER}}"

  dev:db:check:
    internal: true
    desc: Check if dev database is running
    preconditions:
      - sh:
          docker ps --filter "name=calendar_db_dev" --filter "status=running" --format
          '{{`{{.Names}}`}}' | grep -q calendar_db_dev
        msg: |
          ❌ Dev database not running. Start it first:
             task start:dev:db

  dev:
    desc: "Start all: DB + backend (reload) + frontend (vite).
      BROWSER=none|shared|isolated, COUNT=N, RESET_BROWSER=1."
    dotenv:
      [
        "{{.ROOT_DIR}}/config/base.env",
        "{{.ROOT_DIR}}/config/dev.env",
        "{{.ROOT_DIR}}/config/secrets.env",
        "{{.ROOT_DIR}}/config/secrets.dev.env",
      ]
    deps: [dev:db]
    vars:
      BROWSER: '{{.BROWSER | default "none"}}'
      COUNT: '{{.COUNT | default "1"}}'
      RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'
    cmds:
      - task: dev:db:check
      - |
        npx concurrently \
          --names "API,WEB,OPEN" \
          --prefix-colors "blue,green,yellow" \
          --kill-others-on-fail \
          "cd {{.BACKEND_DIR}} && PYTHONPATH={{.ROOT_DIR}} LOG_LEVEL={{.LOG_LEVEL}} UVICORN_ACCESS_LOG_EXCLUDE_PATHS={{.UVICORN_ACCESS_LOG_EXCLUDE_PATHS}} {{.ROOT_DIR}}/.venv/bin/uvicorn backend.api.main:app {{.RELOAD_FLAG}} --host 0.0.0.0 --port $BACKEND_PORT" \
          "cd {{.FRONTEND_DIR}} && npm run dev -- --port $FRONTEND_PORT --strictPort" \
          "until curl -sf http://localhost:$FRONTEND_PORT >/dev/null 2>&1; do sleep 1; done && {{.ROOT_DIR}}/.taskfiles/open-browsers.sh http://localhost:$FRONTEND_PORT {{.BROWSER}} {{.COUNT}} dev {{.RESET_BROWSER}}"

  dev:debug:
    desc: "Start all with debugger on port 5678 (attach from VSCode)"
    dotenv:
      [
        "{{.ROOT_DIR}}/config/base.env",
        "{{.ROOT_DIR}}/config/dev.env",
        "{{.ROOT_DIR}}/config/secrets.env",
        "{{.ROOT_DIR}}/config/secrets.dev.env",
      ]
    deps: [dev:db]
    vars:
      BROWSER: '{{.BROWSER | default "none"}}'
      COUNT: '{{.COUNT | default "1"}}'
      RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'
    cmds:
      - task: dev:db:check
      - |
        npx concurrently \
          --names "API,WEB,OPEN" \
          --prefix-colors "blue,green,yellow" \
          --kill-others-on-fail \
          "cd {{.BACKEND_DIR}} && PYTHONPATH={{.ROOT_DIR}} LOG_LEVEL={{.LOG_LEVEL}} UVICORN_ACCESS_LOG_EXCLUDE_PATHS={{.UVICORN_ACCESS_LOG_EXCLUDE_PATHS}} {{.ROOT_DIR}}/.venv/bin/python -m debugpy --listen 127.0.0.1:5678 -m uvicorn backend.api.main:app {{.RELOAD_FLAG}} --host 0.0.0.0 --port $BACKEND_PORT" \
          "cd {{.FRONTEND_DIR}} && npm run dev -- --port $FRONTEND_PORT --strictPort" \
          "until curl -sf http://localhost:$FRONTEND_PORT >/dev/null 2>&1; do sleep 1; done && {{.ROOT_DIR}}/.taskfiles/open-browsers.sh http://localhost:$FRONTEND_PORT {{.BROWSER}} {{.COUNT}} dev {{.RESET_BROWSER}}"

  dev:backend:
    desc: Start backend only (no frontend)
    dotenv:
      [
        "{{.ROOT_DIR}}/config/base.env",
        "{{.ROOT_DIR}}/config/dev.env",
        "{{.ROOT_DIR}}/config/secrets.env",
        "{{.ROOT_DIR}}/config/secrets.dev.env",
      ]
    deps: [dev:db]
    cmds:
      - task: dev:db:check
      - cd {{.BACKEND_DIR}} && PYTHONPATH={{.ROOT_DIR}} LOG_LEVEL={{.LOG_LEVEL}}
        UVICORN_ACCESS_LOG_EXCLUDE_PATHS={{.UVICORN_ACCESS_LOG_EXCLUDE_PATHS}}
        {{.ROOT_DIR}}/.venv/bin/uvicorn backend.api.main:app {{.RELOAD_FLAG}}
        --host 0.0.0.0 --port $BACKEND_PORT

  dev:backend:debug:
    desc: Start backend only with debugger
    dotenv:
      [
        "{{.ROOT_DIR}}/config/base.env",
        "{{.ROOT_DIR}}/config/dev.env",
        "{{.ROOT_DIR}}/config/secrets.env",
        "{{.ROOT_DIR}}/config/secrets.dev.env",
      ]
    deps: [dev:db]
    cmds:
      - task: dev:db:check
      - cd {{.BACKEND_DIR}} && PYTHONPATH={{.ROOT_DIR}} LOG_LEVEL={{.LOG_LEVEL}}
        UVICORN_ACCESS_LOG_EXCLUDE_PATHS={{.UVICORN_ACCESS_LOG_EXCLUDE_PATHS}}
        {{.ROOT_DIR}}/.venv/bin/python -m debugpy --listen 127.0.0.1:5678 -m
        uvicorn backend.api.main:app {{.RELOAD_FLAG}} --host 0.0.0.0 --port
        $BACKEND_PORT

  dev:frontend:
    desc:
      "Start frontend only (no backend). BROWSER=none|shared|isolated, COUNT=N,
      RESET_BROWSER=1."
    dotenv:
      [
        "{{.ROOT_DIR}}/config/base.env",
        "{{.ROOT_DIR}}/config/dev.env",
        "{{.ROOT_DIR}}/config/secrets.env",
        "{{.ROOT_DIR}}/config/secrets.dev.env",
      ]
    vars:
      BROWSER: '{{.BROWSER | default "none"}}'
      COUNT: '{{.COUNT | default "1"}}'
      RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'
    cmds:
      - |
        (until curl -sf http://localhost:$FRONTEND_PORT >/dev/null 2>&1; do sleep 1; done && {{.ROOT_DIR}}/.taskfiles/open-browsers.sh http://localhost:$FRONTEND_PORT {{.BROWSER}} {{.COUNT}} dev {{.RESET_BROWSER}}) &
        cd {{.FRONTEND_DIR}} && npm run dev -- --port $FRONTEND_PORT --strictPort

  dev:mock:
    desc: "Start all with mock calendar service (no Google creds needed)"
    cmds:
      - task: scenario
        vars:
          SCENARIO: dev-mock

  # ════════════════════════════════════════════════════════════════
  # Staging & Prod (start from existing images)
  # ════════════════════════════════════════════════════════════════

  staging:local:
    desc: Start local staging stack (docker-compose). RESET=1 to teardown first.
    dotenv:
      [
        "{{.ROOT_DIR}}/config/base.env",
        "{{.ROOT_DIR}}/config/staging.local.env",
        "{{.ROOT_DIR}}/config/secrets.staging.local.env",
      ]
    vars:
      RESET: '{{.RESET | default "0"}}'
      BROWSER: '{{.BROWSER | default "none"}}'
      COUNT: '{{.COUNT | default "1"}}'
      RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'
    cmds:
      - |
        if [ "{{.RESET}}" = "1" ]; then
          echo "🔄 RESET: tearing down local staging stack..."
          ENV_NAME=staging docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p movida-staging down -v 2>/dev/null || true
        fi
        ENV_NAME=staging IMAGE_TAG=develop docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p movida-staging up -d
      - |
        echo ""
        echo "✅ Local staging started"
        echo "   Frontend: http://localhost:${FRONTEND_PORT:-3001}"
        echo "   Backend:  http://localhost:${BACKEND_PORT:-8002}"
        echo ""
        echo "Open in an isolated browser:"
        echo "   task open:isolated:staging:local            → 1 isolated session"
        echo "   task open:isolated:staging:local COUNT=2    → multi-user QA"
        {{.ROOT_DIR}}/.taskfiles/open-browsers.sh "http://localhost:${FRONTEND_PORT:-3001}" "{{.BROWSER}}" "{{.COUNT}}" "staging-local" "{{.RESET_BROWSER}}"

  # ════════════════════════════════════════════════════════════════
  # Scenario (isolated manual testing)
  # ════════════════════════════════════════════════════════════════

  scenario:
    desc: "Start scenario: local code + Docker DB (SCENARIO=name, RESET=1 to
      teardown first)"
    dotenv:
      [
        "{{.ROOT_DIR}}/config/base.env",
        "{{.ROOT_DIR}}/config/scenario.env",
        "{{.ROOT_DIR}}/config/secrets.env",
        "{{.ROOT_DIR}}/config/secrets.scenario.env",
      ]
    vars:
      SCENARIO: '{{.SCENARIO | default "default"}}'
      SEED_DIR: '{{.SEED_DIR | default ""}}'
      RESET: '{{.RESET | default "0"}}'
      WEB_PORT: '{{.WEB_PORT | default ""}}'
      API_PORT: '{{.API_PORT | default ""}}'
      BROWSER: '{{.BROWSER | default "none"}}'
      COUNT: '{{.COUNT | default "1"}}'
      RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'
    cmds:
      - |
        source {{.SCENARIO_PORTS_SH}} "{{.SCENARIO}}"
        [ -n "{{.WEB_PORT}}" ] && SC_WEB_PORT="{{.WEB_PORT}}"
        [ -n "{{.API_PORT}}" ] && SC_API_PORT="{{.API_PORT}}"

        # ── RESET cleanup ──
        if [ "{{.RESET}}" = "1" ]; then
          echo "🔄 Restarting: stopping existing scenario environment ($ENV_NAME) first..."
          docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.scenario-db.yml -p $SC_PROJECT_NAME down -v 2>/dev/null || true
          pkill -f "uvicorn.*--port $SC_API_PORT" 2>/dev/null || true
          pkill -f "vite.*--port $SC_WEB_PORT" 2>/dev/null || true
          echo "✅ Previous environment cleaned"
        fi

        # Load scenario-specific config.env (CALENDAR_SERVICE, AUTO_SYNC_ENABLED, etc.)
        SCENARIO_DIR="{{.ROOT_DIR}}/scenarios/{{.SCENARIO}}"
        CALENDAR_SVC="mock"
        if [ -f "$SCENARIO_DIR/config.env" ]; then
          set -a
          source "$SCENARIO_DIR/config.env"
          set +a
          CALENDAR_SVC="${CALENDAR_SERVICE:-mock}"
        fi

        # Load per-scenario secrets.env if it exists (overrides root secrets.env)
        if [ -f "$SCENARIO_DIR/secrets.env" ]; then
          set -a
          source "$SCENARIO_DIR/secrets.env"
          set +a
        fi

        # Persist actual ports so stop tasks can find them even if overridden
        STATE_DIR="{{.ROOT_DIR}}/.taskfiles/.scenario-state"
        mkdir -p "$STATE_DIR"
        printf 'SC_API_PORT=%s\nSC_WEB_PORT=%s\nSC_DB_PORT=%s\nSC_PROJECT_NAME=%s\n' \
          "$SC_API_PORT" "$SC_WEB_PORT" "$SC_DB_PORT" "$SC_PROJECT_NAME" \
          > "$STATE_DIR/{{.SCENARIO}}.env"

        echo "═══════════════════════════════════════════════════════════════"
        echo "  Starting scenario: $SCENARIO_NAME"
        echo "  DB:$SC_DB_PORT  API:$SC_API_PORT  WEB:$SC_WEB_PORT"
        echo "  Calendar service: $CALENDAR_SVC"
        echo "═══════════════════════════════════════════════════════════════"
        echo ""

        # Start scenario database
        POSTGRES_USER=${POSTGRES_USER} \
        POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
        POSTGRES_DB=$SC_DB_NAME \
        ENV_NAME=$ENV_NAME \
        SC_DB_PORT=$SC_DB_PORT \
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.scenario-db.yml -p $SC_PROJECT_NAME up -d

        echo "Waiting for database..."
        for i in $(seq 1 30); do
          if {{.ROOT_DIR}}/.venv/bin/python -c \
            "import psycopg2,sys; psycopg2.connect(host='localhost',port=${SC_DB_PORT},user='${POSTGRES_USER}',password='${POSTGRES_PASSWORD}',dbname='postgres',connect_timeout=1).close()" \
            2>/dev/null; then
            break
          fi
          if [ "$i" = "30" ]; then
            echo "❌ Database did not become ready after 30 seconds"
            exit 1
          fi
          sleep 1
        done

        # Run migrations
        DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${SC_DB_PORT}/${SC_DB_NAME}" \
        PYTHONPATH={{.ROOT_DIR}} {{.ROOT_DIR}}/.venv/bin/alembic -c {{.BACKEND_DIR}}/alembic.ini upgrade head

        # Seed data
        SEED_ARG=""
        if [ -n "{{.SEED_DIR}}" ]; then
          SEED_ARG="--scenario {{.SEED_DIR}}"
        elif [ "{{.SCENARIO}}" != "default" ] && [ -d "{{.ROOT_DIR}}/scenarios/{{.SCENARIO}}" ]; then
          SEED_ARG="--scenario {{.SCENARIO}}"
        fi
        DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${SC_DB_PORT}/${SC_DB_NAME}" \
        PYTHONPATH={{.ROOT_DIR}} {{.ROOT_DIR}}/.venv/bin/python -m backend.scripts.seed $SEED_ARG

        # ── Start Umami analytics ──
        echo ""
        echo "Starting Umami analytics..."
        SC_UMAMI_PORT=$SC_UMAMI_PORT \
        SC_PROJECT_NAME=$SC_PROJECT_NAME \
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.scenario-umami.yml -p $SC_UMAMI_PROJECT up -d

        # Wait for Umami HTTP to be ready (up to 60s)
        UMAMI_URL="http://localhost:${SC_UMAMI_PORT}"
        echo "Waiting for Umami at $UMAMI_URL ..."
        for i in $(seq 1 30); do
          if curl -sf "${UMAMI_URL}/api/heartbeat" >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done

        # Bootstrap: login with retry (Umami runs DB migrations after heartbeat is ready,
        # so login can fail for 5-15s even after /api/heartbeat returns OK)
        UMAMI_TOKEN=""
        for attempt in $(seq 1 20); do
          UMAMI_TOKEN=$(curl -sf -X POST "${UMAMI_URL}/api/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"umami"}' 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null \
            || true)
          if [ -n "$UMAMI_TOKEN" ]; then
            break
          fi
          echo "  Umami login attempt $attempt/20 not ready yet, retrying in 2s..."
          sleep 2
        done

        SC_UMAMI_WEBSITE_ID=""
        if [ -z "$UMAMI_TOKEN" ]; then
          echo "⚠️  Umami bootstrap failed: could not log in after 20 attempts"
          echo "   Umami tracking will be disabled for this session"
        else
          SC_UMAMI_WEBSITE_ID=$(curl -sf -X POST "${UMAMI_URL}/api/websites" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${UMAMI_TOKEN}" \
            -d "{\"name\":\"${SCENARIO_NAME}\",\"domain\":\"localhost\"}" 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null \
            || true)
          if [ -z "$SC_UMAMI_WEBSITE_ID" ]; then
            echo "⚠️  Umami bootstrap failed: could not create website (got empty ID)"
            echo "   Umami tracking will be disabled for this session"
          else
            echo "✅ Umami ready — website ID: $SC_UMAMI_WEBSITE_ID"
            echo "   Dashboard: $UMAMI_URL"
          fi
        fi

        # Persist Umami info into state file
        STATE_DIR="{{.ROOT_DIR}}/.taskfiles/.scenario-state"
        echo "SC_UMAMI_PORT=${SC_UMAMI_PORT}" >> "$STATE_DIR/{{.SCENARIO}}.env"
        echo "SC_UMAMI_WEBSITE_ID=${SC_UMAMI_WEBSITE_ID}" >> "$STATE_DIR/{{.SCENARIO}}.env"

        echo ""
        echo "Starting backend + frontend..."
      - |
        source {{.SCENARIO_PORTS_SH}} "{{.SCENARIO}}"
        [ -n "{{.WEB_PORT}}" ] && SC_WEB_PORT="{{.WEB_PORT}}"
        [ -n "{{.API_PORT}}" ] && SC_API_PORT="{{.API_PORT}}"

        # Restore persisted state (picks up SC_UMAMI_PORT + SC_UMAMI_WEBSITE_ID)
        STATE_FILE="{{.ROOT_DIR}}/.taskfiles/.scenario-state/{{.SCENARIO}}.env"
        if [ -f "$STATE_FILE" ]; then
          source "$STATE_FILE"
        fi

        # Load scenario-specific config.env (CALENDAR_SERVICE, AUTO_SYNC_ENABLED, etc.)
        SCENARIO_DIR="{{.ROOT_DIR}}/scenarios/{{.SCENARIO}}"
        CALENDAR_SVC="mock"
        if [ -f "$SCENARIO_DIR/config.env" ]; then
          set -a
          source "$SCENARIO_DIR/config.env"
          set +a
          CALENDAR_SVC="${CALENDAR_SERVICE:-mock}"
        fi

        # Load per-scenario secrets.env if it exists
        if [ -f "$SCENARIO_DIR/secrets.env" ]; then
          set -a
          source "$SCENARIO_DIR/secrets.env"
          set +a
        fi

        npx concurrently \
          --names "API,WEB,OPEN" \
          --prefix-colors "blue,green,yellow" \
          "cd {{.BACKEND_DIR}} && PYTHONPATH={{.ROOT_DIR}} ENV_NAME=$ENV_NAME DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${SC_DB_PORT}/${SC_DB_NAME} CALENDAR_SERVICE=$CALENDAR_SVC SCENARIO_DIR=$SCENARIO_DIR GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-} GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-} ADMIN_EMAIL=${ADMIN_EMAIL:-} SESSION_SECRET=${SESSION_SECRET:-scenario-secret} GOOGLE_SERVICE_ACCOUNT_FILE=${GOOGLE_SERVICE_ACCOUNT_FILE:-} SMTP_HOST=${SMTP_HOST:-} SMTP_PORT=${SMTP_PORT:-} SMTP_USER=${SMTP_USER:-} SMTP_PASSWORD=${SMTP_PASSWORD:-} SMTP_FROM=${SMTP_FROM:-} {{.ROOT_DIR}}/.venv/bin/uvicorn backend.api.main:app --reload --host 0.0.0.0 --port $SC_API_PORT" \
          "cd {{.FRONTEND_DIR}} && VITE_API_URL=http://localhost:$SC_API_PORT VITE_UMAMI_URL=http://localhost:${SC_UMAMI_PORT} VITE_UMAMI_WEBSITE_ID=${SC_UMAMI_WEBSITE_ID} npm run dev -- --port $SC_WEB_PORT --strictPort" \
          "until curl -sf http://localhost:$SC_WEB_PORT >/dev/null 2>&1; do sleep 1; done && {{.ROOT_DIR}}/.taskfiles/open-browsers.sh http://localhost:$SC_WEB_PORT {{.BROWSER}} {{.COUNT}} scenario-{{.SCENARIO}} {{.RESET_BROWSER}}"

  scenario:ref:
    desc:
      "Start scenario from git ref (all Docker). Usage: task start:scenario:ref
      -- <ref> SCENARIO=name"
    dotenv:
      ["{{.ROOT_DIR}}/config/base.env", "{{.ROOT_DIR}}/config/scenario.env"]
    vars:
      REF: "{{if .REF}}{{.REF}}{{else}}{{.CLI_ARGS}}{{end}}"
      SCENARIO: '{{.SCENARIO | default "default"}}'
      BROWSER: '{{.BROWSER | default "none"}}'
      COUNT: '{{.COUNT | default "1"}}'
      RESET_BROWSER: '{{.RESET_BROWSER | default "0"}}'
    cmds:
      - |
        REF="{{.REF}}"
        if [ -z "$REF" ]; then
          echo "❌ Usage: task start:scenario:ref -- feature/my-branch"
          exit 1
        fi
      - task: :build:ref
        vars: { REF: "{{.REF}}" }
      - |
        source {{.SCENARIO_PORTS_SH}} "{{.SCENARIO}}"
        REF="{{.REF}}"
        SHA=$(git rev-parse --short=7 "$REF")
        TAG="ref-$SHA"

        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "  Starting scenario: $SCENARIO_NAME (from $REF)"
        echo "  DB:$SC_DB_PORT  API:$SC_API_PORT  WEB:$SC_WEB_PORT"
        echo "═══════════════════════════════════════════════════════════════"

        POSTGRES_USER=${POSTGRES_USER} \
        POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
        POSTGRES_DB=$SC_DB_NAME \
        ENV_NAME=$ENV_NAME \
        IMAGE_TAG=$TAG \
        SC_DB_PORT=$SC_DB_PORT \
        BACKEND_PORT=$SC_API_PORT \
        FRONTEND_PORT=$SC_WEB_PORT \
        docker compose -f {{.ROOT_DIR}}/infra/docker/docker-compose.unified.yml -p $SC_PROJECT_NAME up -d

        # Wait for backend health check
        echo "Waiting for backend health check on port $SC_API_PORT..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:$SC_API_PORT/api/health > /dev/null 2>&1; then
            echo "✅ Backend is healthy"
            break
          fi
          echo "  Attempt $i/30 — waiting..."
          sleep 2
          if [ "$i" = "30" ]; then
            echo "⚠️  Backend did not become healthy after 30 attempts"
          fi
        done

        echo ""
        echo "✅ Scenario running from $REF"
        echo "   Frontend: http://localhost:$SC_WEB_PORT"
        echo "   Backend:  http://localhost:$SC_API_PORT"
        echo ""
        echo "Open in an isolated browser:"
        echo "   task open:isolated:scenario SCENARIO={{.SCENARIO}}            → 1 isolated session"
        echo "   task open:isolated:scenario SCENARIO={{.SCENARIO}} COUNT=2    → multi-user QA"
        {{.ROOT_DIR}}/.taskfiles/open-browsers.sh "http://localhost:$SC_WEB_PORT" "{{.BROWSER}}" "{{.COUNT}}" "scenario-{{.SCENARIO}}" "{{.RESET_BROWSER}}"
