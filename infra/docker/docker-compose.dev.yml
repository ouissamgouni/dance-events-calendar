services:
  postgres_dev:
    image: postgres:16-alpine
    container_name: calendar_db_dev
    env_file:
      - ../../.env.dev
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - calendar_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_umami_dev:
    image: postgres:16-alpine
    container_name: umami_db_dev
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - umami_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  umami_dev:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami_dev
    environment:
      DATABASE_URL: postgresql://umami:umami@postgres_umami_dev:5432/umami
      APP_SECRET: dev-umami-secret-change-in-prod
    ports:
      - "${UMAMI_PORT:-3100}:3000"
    depends_on:
      postgres_umami_dev:
        condition: service_healthy
    restart: unless-stopped

volumes:
  calendar_dev_data:
    name: calendar_dev_data
  umami_dev_data:
    name: umami_dev_data
