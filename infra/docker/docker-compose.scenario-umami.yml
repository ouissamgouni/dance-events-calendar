services:
  postgres_umami:
    image: postgres:16-alpine
    container_name: umami_db_${SC_PROJECT_NAME}
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami_${SC_PROJECT_NAME}
    environment:
      DATABASE_URL: postgresql://umami:umami@postgres_umami:5432/umami
      APP_SECRET: scenario-umami-secret
    ports:
      - "${SC_UMAMI_PORT}:3000"
    depends_on:
      postgres_umami:
        condition: service_healthy
    restart: unless-stopped
