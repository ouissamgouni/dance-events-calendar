services:
  postgres:
    image: postgres:16-alpine
    container_name: calendar_db_${ENV_NAME}
    env_file:
      - path: ../../config/base.env
        required: false
      - ../../config/${ENV_NAME}.local.env
      - path: ../../config/secrets.${ENV_NAME}.local.env
        required: false
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  backend:
    image: movida-backend:${IMAGE_TAG:-latest}
    container_name: calendar_backend_${ENV_NAME}
    env_file:
      - path: ../../config/base.env
        required: false
      - ../../config/${ENV_NAME}.local.env
      - path: ../../config/secrets.${ENV_NAME}.local.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${BACKEND_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app_network

  frontend:
    image: movida-frontend:${IMAGE_TAG:-latest}
    container_name: calendar_frontend_${ENV_NAME}
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - app_network

  postgres_umami:
    image: postgres:16-alpine
    container_name: umami_db_${ENV_NAME}
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: ${UMAMI_DB_USER:-umami}
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UMAMI_DB_USER:-umami} -d umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami_${ENV_NAME}
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD:-umami}@postgres_umami:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me-in-production}
    ports:
      - "${UMAMI_PORT:-3100}:3000"
    depends_on:
      postgres_umami:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

volumes:
  pgdata:
    name: calendar_${ENV_NAME}_data
  umami_data:
    name: umami_${ENV_NAME}_data

networks:
  app_network:
    name: calendar_${ENV_NAME}_network
