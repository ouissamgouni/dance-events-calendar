<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e11d48" />

  <!-- Security -->
  <!-- Keep CSP static to avoid unresolved env placeholders in builds without Umami vars. -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' https:; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; frame-src https://accounts.google.com; object-src 'none';" />

  <title>Movida — Salsa, Bachata &amp; Dance Events Near You</title>
  <meta name="description"
    content="Discover upcoming salsa classes, socials, workshops, and dance events near you. Browse by date, location, and style." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Movida — Dance Events Calendar" />
  <meta property="og:description"
    content="Discover upcoming salsa classes, socials, workshops, and dance events near you." />
  <meta property="og:image" content="/favicon.svg" />
  <meta property="og:site_name" content="Movida" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Movida — Dance Events Calendar" />
  <meta name="twitter:description"
    content="Discover upcoming salsa classes, socials, workshops, and dance events near you." />

  <script src="https://accounts.google.com/gsi/client" async></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
