# Fly.io staging app configuration
# https://fly.io/docs/reference/configuration/
#
# Differences from fly.prod.toml:
#   - Different app name
#   - auto_stop_machines = true  (sleeps when idle → burns no credits)
#   - min_machines_running = 0   (free tier: zero idle cost)
#   - ENV_NAME = "staging"
#
# Always pass -c config/fly.staging.toml to flyctl commands.

app = "movida-staging"
primary_region = "cdg"

[build]
  # Path is relative to this toml file (config/ → repo root → backend/Dockerfile)
  dockerfile = "../backend/Dockerfile"

[env]
  PYTHONPATH = "/app"
  PYTHONUNBUFFERED = "1"
  LOG_LEVEL = "debug"
  ENV_NAME = "staging"
  CALENDAR_SERVICE = "google"
  PUBLIC_APP_URL = "https://develop.joinmovida.com"
  # Frontend origins. The session cookie is set on api-develop.joinmovida.com
  # (same-site as the frontend), so develop.joinmovida.com is the only origin
  # that needs credentialed CORS. Pages preview URL is kept for ad-hoc testing.
  CORS_ORIGINS = "https://develop.movida.pages.dev,https://develop.joinmovida.com"
  # In-app background dispatch loops. Fly has no native cron, so these flags
  # are the only thing that drives notification delivery and auto-sync.
  NOTIFICATION_SCHEDULER_ENABLED = "true"
  NOTIFICATION_INTERVAL_MINUTES = "1"
  AUTO_SYNC_SCHEDULER_ENABLED = "true"
  WEB_PUSH_ENABLED="true"
  ACTIVITY_DIGEST_EMAIL_ENABLED="true"
  INTEREST_MATCH_NOTIFICATIONS_ENABLED="true"
  # SMTP host/port/from (credentials are fly secrets)
  SMTP_HOST = "smtp-relay.brevo.com"
  SMTP_PORT = "587"
  SMTP_FROM = "noreply@joinmovida.com"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    grace_period = "20s"
    interval = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

swap_size_mb = 512
