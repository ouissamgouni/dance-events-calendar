# Fly.io production app configuration
# https://fly.io/docs/reference/configuration/
#
# Always pass -c config/fly.prod.toml to flyctl commands.

app = "movida"
primary_region = "cdg"

[build]
  # Path is relative to this toml file (config/ → repo root → backend/Dockerfile)
  dockerfile = "../backend/Dockerfile"

[env]
  PYTHONPATH = "/app"
  PYTHONUNBUFFERED = "1"
  ENV_NAME = "production"
  CALENDAR_SERVICE = "google"
  CORS_ORIGINS = "https://movida.pages.dev,https://joinmovida.com"
  # SMTP host/port/from (credentials are fly secrets)
  SMTP_HOST = "smtp-relay.brevo.com"
  SMTP_PORT = "587"
  SMTP_FROM = "noreply@joinmovida.com"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[services.scheduled_jobs]]
  timeout = "1h"
  cron = "0 */15 * * * ?"
  http = {
    method = "POST"
    uri = "/admin/trigger-sync"
  }

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

swap_size_mb = 512
