name: Deploy

on:
    workflow_run:
        workflows: ["CI"]
        branches: [main, develop]
        types: [completed]

jobs:
    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        if: >
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'develop'

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: develop

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: pip
                  cache-dependency-path: backend/requirements.txt

            - name: Install backend dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r backend/requirements.txt

            - name: Run database migrations (Neon develop branch)
              env:
                  DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
                  PYTHONPATH: ${{ github.workspace }}
              run: alembic -c backend/alembic.ini upgrade head

            - name: Set up flyctl
              uses: superfly/flyctl-actions/setup-flyctl@master

            - name: Deploy backend to staging Fly.io app
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
              run: flyctl deploy --remote-only -c fly.staging.toml

    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        if: >
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main'

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: pip
                  cache-dependency-path: backend/requirements.txt

            - name: Install backend dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r backend/requirements.txt

            - name: Run database migrations (Neon main branch)
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  PYTHONPATH: ${{ github.workspace }}
              run: alembic -c backend/alembic.ini upgrade head

            - name: Set up flyctl
              uses: superfly/flyctl-actions/setup-flyctl@master

            - name: Deploy backend to production Fly.io app
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
              run: flyctl deploy --remote-only
