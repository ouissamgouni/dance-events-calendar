# Fly.io app configuration
# https://fly.io/docs/reference/configuration/

app = "salsa-events-calendar"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PYTHONPATH = "/app"
  PYTHONUNBUFFERED = "1"
  ENV_NAME = "production"
  CALENDAR_SERVICE = "google"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
