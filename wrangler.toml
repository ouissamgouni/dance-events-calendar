# Cloudflare Pages configuration for the Movida frontend (React SPA)
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# NOTE: Pages does NOT support the [build] section in wrangler.toml (that is
# Workers-only). Build command, NODE_VERSION, and all VITE_* environment
# variables must be configured in the Cloudflare dashboard:
#
#   Pages → movida → Settings → Builds & deployments
#     • Build command:        cd frontend && npm ci && npm run build
#     • Build output dir:     frontend/dist
#
#   Pages → movida → Settings → Environment variables
#     Production:
#       NODE_VERSION          = 22
#       VITE_API_URL          = https://movida.fly.dev
#       VITE_UMAMI_URL        = https://cloud.umami.is
#       VITE_UMAMI_WEBSITE_ID = <prod-uuid>          (encrypted)
#       Custom domain         = joinmovida.com
#     Preview (staging):
#       NODE_VERSION          = 22
#       VITE_API_URL          = https://movida-staging.fly.dev
#       VITE_UMAMI_URL        = https://cloud.umami.is
#       VITE_UMAMI_WEBSITE_ID = <staging-uuid>       (encrypted)
#       Custom domain         = develop.joinmovida.com

# Legacy Pages hostnames remain available during transition:
#   Production alias: movida.pages.dev
#   Staging alias:    develop.movida.pages.dev

name = "movida"
compatibility_date = "2026-04-30"
pages_build_output_dir = "frontend/dist"
