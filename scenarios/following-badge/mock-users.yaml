#       alice, emma, frank, gina, hugo  (the hero event's "5 going")
#       nia, omar                       (the hero event's "2 saved")
#   * 6 one-way followees (bob → them only, public RSVPs count via the
#     followed-not-friends signal):
#       pablo, quinn, rita, samir, tara, ulysses
#   * carol — pre-existing one-way control (carol → alice, NOT bob's
#     friend); kept so the original minimal events still pass.
#   * 10 strangers going  (s01..s10) and 10 strangers saving (t01..t10).
