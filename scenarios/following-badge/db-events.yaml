# Pre-seeded events for the following-badge scenario.
#
#   evt-fb-001 — Alice (Bob's friend) is going  → badge MUST appear for Bob
#   evt-fb-002 — Alice saved (not going)        → badge MUST appear for Bob
#                                                 (uses saved_count signal)
#   evt-fb-003 — Carol (one-way follower) going → badge MUST NOT appear for Bob
#   evt-fb-004 — Stranger / nobody seeded       → badge MUST NOT appear for Bob
base_week: 0
events:
  - id: evt-fb-001
    calendar_id: salsa-cal-001
    title: Salsa Social Friday
    description: |
      Weekly social. Alice (Bob's friend) is going.
    location: Dance Studio, 10 Rue de Rivoli, Paris, France
    latitude: 48.8566
    longitude: 2.3522
    start: w0 Fri 21:00
    end: w0 Sat 01:00
    price_is_free: true
    tags:
    - format:social
    - dance-style:salsa
    - level:all-levels
    - venue:indoor
    - vibe:social-atmosphere
    - reach:international
  - id: evt-fb-002
    calendar_id: bachata-cal-002
    title: Bachata Workshop
    description: |
      Saved by Alice — badge should still appear via the saves signal.
    location: Tanzhaus, Friedrichstr. 100, Berlin, Germany
    latitude: 52.52
    longitude: 13.405
    start: w0 Sat 14:00
    end: w0 Sat 17:00
    price_is_free: false
    price_min: 25
    price_currency: EUR
    tags:
    - format:workshop
    - dance-style:bachata
    - level:all-levels
    - venue:indoor
    - reach:local
  - id: evt-fb-003
    calendar_id: salsa-cal-001
    title: Cuban Night (one-way follower control)
    description: |
      Carol (one-way follower of Alice, NOT Bob's friend) is going.
      The badge MUST NOT appear for Bob.
    location: Skybar, Av. de la Liberté, Brussels, Belgium
    latitude: 50.8503
    longitude: 4.3517
    start: w1 Sat 20:00
    end: w1 Sun 00:00
    price_is_free: true
    tags:
    - format:social
    - dance-style:salsa
    - level:all-levels
    - venue:indoor
    - vibe:social-atmosphere
    - reach:regional
  - id: evt-fb-004
    calendar_id: bachata-cal-002
    title: Stranger Bachata (no friends seeded)
    description: |
      Nobody Bob follows is going or saved this. Badge MUST NOT appear.
    location: London Dance Academy, 12 Soho Square, London, UK
    latitude: 51.5143
    longitude: -0.1323
    start: w1 Sun 15:00
    end: w1 Sun 18:00
    price_is_free: false
    price_min: 30
    price_currency: GBP

  # --------------------------------------------------------------
  # European spread + hero "rich attendance" event.
  #
  # evt-fb-100 (Madrid hero) — designed to exercise every input that
  # feeds the badge / avatar stack in one place:
  #     5 friends going        (alice, emma, frank, gina, hugo)
  #     2 friends saved        (nia, omar — saved with audience=friends)
  #     6 followed-not-friends going, visibility public
  #        (pablo, quinn, rita, samir, tara, ulysses)
  #    10 strangers going      (s01..s10, share_audience: public)
  #    10 strangers saving     (t01..t10, audience: public)
  # Expected aggregate for Bob's view:
  #   following_friend_count = 5 (friends going) + 6 (public RSVPs from
  #     followed-not-friends) = 11
  #   following_friends_preview includes up to 5 distinct friends
  #     (the friends-going set; saved-only friends fill remaining slots).
  #
  # The other evt-fb-1xx events scatter lighter compositions across
  # Europe so the map view shows realistic pin density.
  # --------------------------------------------------------------
    tags:
    - format:social
    - dance-style:bachata
    - level:all-levels
    - venue:indoor
    - reach:local
  - id: evt-fb-100
    calendar_id: salsa-cal-001
    title: European Salsa Congress (Madrid)
    description: |
      Hero attendance mix: 5 friends going, 2 friends saving, 6
      followed-not-friends going publicly, 10 strangers going,
      10 strangers saving.
    location: Palacio de Vistalegre, Calle de Utebo 1, Madrid, Spain
    latitude: 40.3947
    longitude: -3.7361
    start: w0 Sat 19:00
    end: w0 Sun 03:00
    price_is_free: false
