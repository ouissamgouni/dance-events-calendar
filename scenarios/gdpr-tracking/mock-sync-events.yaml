- id: evt-gdpr-004
  calendar_id: bachata-cal-002
  title: Salsa Congress 2026
  description: |
    Full weekend of workshops and parties. 3 rooms, 20 artists.
    The programme spans multiple days with tracks for beginner, intermediate and advanced dancers.
    Evening parties take place across several rooms, each with its own themed DJ lineup.
    VIP passes include backstage access, a priority show seat, and an exclusive warm-up session.
    Day passes are available for those who can only join for part of the weekend.
    The venue is fully accessible with a dedicated cloakroom and coat-check service.
    An on-site registration desk opens from 9 am on the first day of the event.
    A gala show on Saturday evening features performances by the resident instructors.
    Solo and couples competitions run on Sunday afternoon with prizes for the top finishers.
    A warm-up DJ set kicks off each evening at 9 pm before the main programme begins.
    Healthy food options and a full bar are available on-site throughout the weekend.
    Local accommodation partners offer discounted rates — see the official event website.
    Airport transfer packages can be arranged through the event website; book in advance.
    Participants are encouraged to share highlights using the official event hashtag.
    An after-party follows the gala show and runs until the early hours of the morning.
    Organisers will provide a dedicated event photographer and live social media coverage.
    All levels from complete beginners to professional dancers are warmly welcomed here.
    Emergency medical assistance and a first-aid station are available on site at all times.
    The event team is on hand throughout the weekend to answer questions and assist you.
    Check the event website for the full timetable, artist bios and ticketing information.
    We look forward to sharing the dance floor with you — see you there!
