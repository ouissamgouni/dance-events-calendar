# GDPR Tracking — QA Test Plan
# ================================
# Validates the full GDPR consent + tracking pipeline: cookie banner UX,
# consent-gated analytics, personalization (device_id), admin analytics,
# data deletion, and edge cases around consent changes.

test_plan:
  name: "GDPR Tracking — Consent & Analytics"
  description: >
    End-to-end test of the GDPR-compliant tracking feature: cookie consent
    banner, consent-gated event views/link clicks/exports, personalization
    (device_id), admin analytics views, GDPR data deletion endpoint, and
    edge cases around consent changes. Uses mock calendar service with 5
    events (4 with structured links, 1 with fallback link in description).

  steps:
    # ── Group 1: Consent Banner UX ─────────────────────────────
    - id: 1
      title: "First visit shows consent banner"
      description: >
        Open the home page in a fresh browser or incognito window.
        The cookie consent banner should appear at the bottom of the page.
      expected: >
        Banner visible with title "Nous utilisons des cookies" (or English
        equivalent), three buttons: "Tout accepter", "Refuser tout",
        "Personnaliser". A "Politique de confidentialité" link is present.
      verification: "Banner renders with all 3 buttons and privacy link"

    - id: 2
      title: "Banner does not block the page"
      description: >
        With the banner visible, scroll the page, click between calendar and
        list views, open the map. Verify the app is fully functional.
      expected: >
        All views render correctly. Events are visible. Calendar is clickable.
        The banner stays visible but does not prevent interaction.
      verification: "Can switch views, scroll, and see events behind banner"

    - id: 3
      title: "Customize opens preferences modal"
      description: >
        Click "Personnaliser" (or "Customize") on the consent banner.
      expected: >
        A preferences modal opens showing 3 categories:
        1. "Cookies strictement nécessaires" — toggle locked ON, read-only.
        2. "Cookies d'analyse" — toggle OFF by default.
        3. "Cookies de personnalisation" — toggle OFF by default.
        Buttons: "Tout accepter", "Refuser tout", "Enregistrer".
      verification: "Modal shows 3 categories, necessary is locked on"

    - id: 4
      title: "Accept all sets all categories"
      description: >
        Click "Tout accepter" (Accept all) in the consent banner.
        Open browser DevTools → Application → Cookies.
      expected: >
        Banner disappears. A cookie named "cc_cookie" exists. Its value
        (JSON) contains categories including "necessary", "analytics",
        and "personalization".
      verification: "cc_cookie present with all 3 categories"

    - id: 5
      title: "Reject all sets only necessary"
      description: >
        Clear all cookies (DevTools → Application → Clear site data).
        Reload the page. When the banner appears, click "Refuser tout"
        (Reject all).
      expected: >
        Banner disappears. The "cc_cookie" contains only "necessary".
        No "analytics" or "personalization" in the accepted categories.
      verification: "cc_cookie has only necessary category"

    - id: 6
      title: "Cookie Settings button in status bar"
      description: >
        Look at the bottom status bar. Find the "🔒 Cookies" button.
        Click it.
      expected: >
        The cookie preferences modal reopens, showing the current consent
        state (matching what was previously chosen).
      verification: "Preferences modal opens from status bar button"

    - id: 7
      title: "Privacy page accessible from banner"
      description: >
        Clear cookies, reload to get the banner. Click the "Politique de
        confidentialité" (Privacy Policy) link in the banner description.
      expected: >
        Navigates to /privacy. Page shows bilingual content (French then
        English) with sections: who we are, data collected, no third-party
        services, data retention, GDPR rights, contact. A "Modifier mes
        préférences de cookies" button is present and functional.
      verification: "/privacy page loads with full bilingual content"

    # ── Group 2: Analytics Tracking — Consent Granted ──────────
    - id: 8
      title: "Accept all, click event on calendar"
      description: >
        Clear cookies, reload page. Accept all cookies. Switch to calendar
        view. Click "Friday Salsa Night" on the calendar grid. Open browser
        DevTools → Network tab and filter for "track".
      expected: >
        A POST request to /api/track/event-view is sent with body:
        {"event_id": "evt-gdpr-001", "device_id": "<uuid>", "source": "calendar"}.
        Response: 201.
      verification: "Network shows event-view POST with source=calendar"

    - id: 9
      title: "Open event detail page directly"
      description: >
        Navigate to /event/evt-gdpr-002 by typing in the address bar.
        Check Network tab.
      expected: >
        A POST to /api/track/event-view with event_id "evt-gdpr-002"
        and source "direct". device_id is present (personalization accepted).
      verification: "event-view tracked with source=direct"

    - id: 10
      title: "Click structured link in event modal"
      description: >
        Open "Friday Salsa Night" modal. Click the "Tickets" link
        (https://example.com/salsa-night-tickets). Check Network tab.
      expected: >
        Link opens in a new tab. A POST to /api/track/link-click is sent
        with body containing event_id "evt-gdpr-001" and the clicked URL.
        Response: 201.
      verification: "link-click POST with correct event_id and url"

    - id: 11
      title: "Click fallback link in detail page"
      description: >
        Navigate to /event/evt-gdpr-005 (Rueda de Casino Night). The
        description contains a URL. Click it.
      expected: >
        Link opens in new tab. POST to /api/track/link-click with
        event_id "evt-gdpr-005" and the fallback URL.
      verification: "Fallback link click tracked"

    - id: 12
      title: "Export .ics triggers export tracking"
      description: >
        Save 2 events (e.g. evt-gdpr-001 and evt-gdpr-003). Open the FAB
        dropdown and click "Export .ics". Check Network tab.
      expected: >
        File "my-movida-events.ics" downloads. A POST to /api/track/export
        is sent with {"format": "ics", "event_count": 2, "device_id": "<uuid>"}.
      verification: "export POST with format=ics and event_count=2"

    - id: 13
      title: "Export .xlsx triggers export tracking"
      description: >
        On the My Calendar page, click "📊 Export .xlsx". Check Network tab.
      expected: >
        File downloads. POST to /api/track/export with format "xlsx"
        and event_count matching saved count.
      verification: "export POST with format=xlsx"

    - id: 14
      title: "Save event triggers save tracking"
      description: >
        Click the save heart on "Salsa Congress 2026". Check Network tab.
      expected: >
        POST to /api/track/event-save with event_id "evt-gdpr-004",
        device_id (present because personalization accepted), action "save".
      verification: "event-save POST with action=save and device_id"

    # ── Group 3: Analytics Tracking — Consent Denied ───────────
    - id: 15
      title: "Reject all, click event — no tracking"
      description: >
        Clear cookies, reload. Click "Refuser tout". Click "Friday Salsa
        Night" on the calendar. Check Network tab for /api/track requests.
      expected: >
        NO /api/track/event-view request is sent. The event modal still
        opens normally. All UI functionality works.
      verification: "No tracking requests in Network tab"

    - id: 16
      title: "Reject all, click link — no tracking"
      description: >
        Open "Friday Salsa Night" modal. Click the "Tickets" link.
      expected: >
        Link opens in new tab. NO /api/track/link-click request sent.
      verification: "Link opens but no link-click tracking"

    - id: 17
      title: "Reject all, export — file works, no tracking"
      description: >
        Save 2 events, open FAB, export .ics.
      expected: >
        File downloads successfully (export is functional, not blocked).
        NO /api/track/export request is sent.
      verification: "ICS downloads, no export tracking in Network"

    - id: 18
      title: "Reject all, save event — local only"
      description: >
        Click save heart on "Bachata Sensual Workshop".
      expected: >
        Heart turns red. Event saved in localStorage (check Application →
        Local Storage → movida_saved_events). NO /api/track/event-save
        request sent (server-side save tracking requires analytics consent).
      verification: "localStorage updated, no server tracking"

    # ── Group 4: Personalization Tracking ──────────────────────
    - id: 19
      title: "Analytics only — no device_id sent"
      description: >
        Clear cookies, reload. Click "Personnaliser". Enable ONLY
        "Cookies d'analyse" (analytics). Keep personalization OFF.
        Click "Enregistrer". Click an event on the calendar.
      expected: >
        POST /api/track/event-view is sent. Body has event_id and
        source, but device_id is absent or null.
      verification: "event-view POST has no device_id field"

    - id: 20
      title: "Analytics + personalization — device_id present"
      description: >
        Open cookie preferences (status bar button). Enable both analytics
        AND personalization. Save. Click another event.
      expected: >
        POST /api/track/event-view includes a device_id (UUID format).
        Check localStorage: "movida_device_id" key exists with the same UUID.
      verification: "device_id in POST matches movida_device_id in localStorage"

    - id: 21
      title: "Device ID stays consistent across actions"
      description: >
        Perform several actions: click 2 events, save 1 event, click a link.
        Note the device_id in each Network request.
      expected: >
        All requests use the exact same device_id value.
      verification: "Same UUID in all 4 tracking requests"

    - id: 22
      title: "Revoke personalization — device_id stops being sent"
      description: >
        Open cookie preferences. Turn OFF personalization (keep analytics
        ON). Save. Click another event.
      expected: >
        POST /api/track/event-view is still sent (analytics ON) but
        device_id is absent. The movida_device_id key may still exist
        in localStorage but is not included in the request.
      verification: "event-view POST has no device_id after revocation"

    # ── Group 5: Admin Analytics Views ─────────────────────────
    - id: 23
      title: "Admin sees most-saved events"
      description: >
        Prerequisites: with full consent, save evt-gdpr-001, evt-gdpr-002,
        and evt-gdpr-003. Then log in as admin (dev login). Check the admin
        panel for the "❤️ Most Saved Events" section.
      expected: >
        Section shows 3 events with their titles and save counts (1 each).
      verification: "Most Saved section lists the 3 saved events"

    - id: 24
      title: "Enable show popularity — view counts visible"
      description: >
        In admin, toggle the "Show popularity" feature flag ON. Go back
        to the public home page. Open the modal for an event you previously
        clicked multiple times.
      expected: >
        Event modal shows a "👁 N views" or "🔥 N views" badge with the
        correct count. Events with no views show no badge.
      verification: "View count badges visible on clicked events"

    - id: 25
      title: "Collected data persists after user revokes consent"
      description: >
        As a regular user: open cookie preferences, reject all (revoke
        everything). Then login as admin.
      expected: >
        Admin panel still shows all previously collected data (most saved
        events, view counts). Revoking consent does NOT delete existing data.
      verification: "Admin analytics unchanged after consent revocation"

    # ── Group 6: GDPR Data Deletion ────────────────────────────
    - id: 26
      title: "Delete user data via API"
      description: >
        With personalization accepted, perform several actions to generate
        data. Note the device_id from localStorage (movida_device_id).
        Then call: DELETE /api/user-data/{device_id} (use curl or browser
        console fetch).
      expected: >
        Response 200 with body like:
        {"deleted": {"event_views": 3, "event_saves": 2,
        "event_link_clicks": 1, "event_exports": 1}}.
        Counts reflect the actual tracked data for that device.
      verification: "200 response with accurate deletion counts"

    - id: 27
      title: "Verify deletion completeness"
      description: >
        After deletion, login as admin. Check most-saved events and
        enable show_popularity.
      expected: >
        Admin data reflects reduced counts. The deleted device's
        contributions are gone. Other devices' data (if any) remains.
      verification: "Admin counts reduced by deleted device's data"

    - id: 28
      title: "Delete nonexistent device — no error"
      description: >
        Call DELETE /api/user-data/nonexistent-device-id-12345
      expected: >
        Response 200 with {"deleted": {"event_views": 0, "event_saves": 0,
        "event_link_clicks": 0, "event_exports": 0}}.
        No 404 or 500 error.
      verification: "200 with all zeros, graceful handling"

    - id: 29
      title: "Privacy page preferences button works"
      description: >
        Navigate to /privacy. Click "Modifier mes préférences de cookies"
        (or English equivalent).
      expected: >
        Cookie preferences modal opens. User can change consent settings.
      verification: "Preferences modal opens from privacy page"

    # ── Group 7: Edge Cases & Consent Changes ──────────────────
    - id: 30
      title: "Change consent mid-session"
      description: >
        Accept all cookies. Click 3 different events (tracked). Then open
        cookie preferences and revoke analytics. Click 2 more events.
      expected: >
        First 3 events generate /api/track/event-view requests. After
        revoking analytics, the next 2 clicks produce NO tracking requests.
        Total views for this session: 3.
      verification: "3 tracking requests before revocation, 0 after"

    - id: 31
      title: "Reload preserves consent"
      description: >
        Accept all cookies. Reload the page (F5 or Cmd+R).
      expected: >
        Consent banner does NOT reappear. Clicking an event triggers
        tracking (analytics consent still active). cc_cookie persists.
      verification: "No banner on reload, tracking still works"

    - id: 32
      title: "Rate limiting on tracking endpoints"
      description: >
        Accept all cookies. Rapidly click 31+ different events within
        1 minute (or use browser console to fire 31 fetch calls to
        /api/track/event-view in quick succession).
      expected: >
        First 30 requests return 201. The 31st request returns 429
        (Too Many Requests). App handles the 429 gracefully (no error
        shown to user, fire-and-forget pattern swallows the error).
      verification: "429 on 31st request, no user-visible error"
