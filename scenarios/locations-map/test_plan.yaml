test_plan:
  name: "Locations Map — Explorer Map, Mobile Selection & Geocoding"
  description: >
    Verify that the Explorer and Calendar maps render seeded event locations
    correctly, that mobile/tablet marker taps use a selected-event card over the
    bottom of the map instead of unstable Leaflet popups, and that admin
    location edits or sync geocoding make missing-coordinate events appear on
    the map. Scenario uses mock calendar data with 31 events across 3 calendars.
  steps:
    # ── Explorer Map ────────────────────────────────────────────
    - id: 1
      title: "Explorer loads with geolocated events on the map"
      description: >
        Open the Explorer home page at a desktop width. The map should be in the
        main map column and the event list should be in the left column. Use the
        default date range and area filter.
      expected: >
        The event list loads, the map auto-fits to the seeded geolocated events
        in the active/default area, and markers appear across multiple European
        cities instead of staying on the fallback Europe view.

    - id: 2
      title: "Desktop marker popup still works"
      description: >
        At desktop width, click a visible marker such as "Salsa Social Night –
        Paris". Then click a different event in the Explorer list, such as a
        Madrid or Barcelona event.
      expected: >
        The marker opens a Leaflet popup with the event title, date, location,
        tags, and action buttons. Clicking another event in the Explorer list
        navigates to that event detail URL with the explorer-list source. The
        original map popup does not leave stale UI behind.

    - id: 3
      title: "Mobile marker tap shows selected event card over map"
      description: >
        Resize to a phone width. In Explorer, tap a map marker. Do not tap the
        event card yet.
      expected: >
        No Leaflet popup appears on top of the small map. The page does not jump
        sharply up or down. A white selected-event card appears over the bottom
        of the map, like a compact popup replacement. The same event remains in
        the mobile event list and is highlighted there when the user scrolls
        down.

    - id: 4
      title: "Tablet stacked layout stays stable on marker taps"
      description: >
        Resize to a tablet width below the desktop breakpoint where the list is
        stacked under the map. Tap several different map markers and pan the map
        slightly between taps.
      expected: >
        Each tap replaces the selected-event card over the map. The map remains
        visible and clipped to its container, the page does not auto-scroll into
        the event list, and the list may reorder by on-map/off-map status without
        forcing the viewport to jump.

    - id: 5
      title: "Selected mobile map card opens event details"
      description: >
        With a selected-event card visible over the map on phone or tablet,
        click the card.
      expected: >
        The app opens the event detail page for that event with the
        explorer-map source in the URL. Returning to Explorer should not restore
        a stale Leaflet popup.

    - id: 6
      title: "Explorer filters refit beyond current map viewport"
      description: >
        In Explorer, pan/zoom tightly around Paris so only the Paris cluster is
        visible. Click a dance-style tag pill that has matches in other seeded
        European cities, such as Salsa or Bachata.
      expected: >
        The map refits to all matching events within the active/default area,
        not just events already visible in the Paris viewport. The event list
        still includes matching events, with currently visible map events first
        and off-viewport events labelled as off map until the refit brings them
        into view.

    - id: 7
      title: "Events without usable coordinates do not render map markers"
      description: >
        Check the map and event list for events that have no coordinates or
        unusable placeholder coordinates: Online Bachata Styling Workshop,
        Salsa Social @ Dave's Place, Kizomba Jam — TBA, Bachata Brunch, and
        Mystery Salsa Night at latitude/longitude 0,0.
      expected: >
        These events can appear in the event list for their date range, but they
        do not render as map markers. The 0,0 Mystery Salsa Night is treated as
        missing/unusable coordinates, matching the fixture note.

    # ── Calendar Map ────────────────────────────────────────────
    - id: 8
      title: "Calendar date navigation filters the map"
      description: >
        Switch to Calendar mode. Navigate through the calendar date range and
        observe the map markers for the visible calendar window.
      expected: >
        The map markers update to match the calendar's visible date range.
        Events outside the range disappear from the map while still existing in
        the broader seeded scenario data.

    - id: 9
      title: "All-day multi-day event appears correctly"
      description: >
        Find "Lyon Salsa Summer Camp" (evt-allday-001) in Calendar mode. It is
        a 3-day all-day event from Friday through Sunday.
      expected: >
        The event spans multiple calendar days with no specific time shown, and
        its marker appears on the map at the Lyon coordinates.

    # ── Admin Location Editing & Geocoding ──────────────────────
    - id: 10
      title: "Dev admin login works"
      description: >
        Navigate to /login. In DEV_AUTH mode, click "Sign in as Dev Admin" if it
        is shown; otherwise type admin@example.com or the configured ADMIN_EMAIL
        value into the email input and submit.
      expected: >
        The app redirects to /admin and shows the user as a logged-in admin.

    - id: 11
      title: "Edit missing event location with address autocomplete"
      description: >
        In the admin events list, open "Kizomba Jam — TBA" (evt-vague-002). In
        the edit form, replace the location with "Salle Wagram Paris". Wait for
        address suggestions, then select a matching suggestion.
      expected: >
        The autocomplete dropdown shows address suggestions. Selecting one fills
        the location field and populates latitude/longitude fields.

    - id: 12
      title: "Saved edited location appears on Explorer map"
      description: >
        Save the edited evt-vague-002 event. Return to Explorer and use a date
        range that includes the event.
      expected: >
        The event appears in the Explorer list with the updated location and now
        has a marker on the map near Paris.

    - id: 13
      title: "Editing non-location fields preserves coordinates"
      description: >
        In admin, open a geolocated event such as "Salsa Social Night – Paris"
        (evt-apr-paris). Change only the description and save.
      expected: >
        The event saves successfully, its original latitude/longitude remain
        unchanged, and the marker stays in the same map position.

    - id: 14
      title: "Sync geocodes real address without coordinates"
      description: >
        Run a manual sync from admin, then check "Kizomba by the River"
        (evt-geocode-me), which has a real address but no coordinates in the
        fixture.
      expected: >
        Sync completes successfully. The event gains coordinates from geocoding
        and appears on the Explorer map near Pont Alexandre III in Paris.
