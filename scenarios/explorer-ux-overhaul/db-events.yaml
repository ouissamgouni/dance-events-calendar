# Seeded events for the Explorer UX overhaul scenario.
#
# Goals of this seed (one event ID per row, kept dense on purpose):
#
#   • ≥ 21 events fall inside the default explorer window (next 3 months
#     from base_week) so the EventListPanel ShowMore CTA appears (cap is
#     20). They span ~10 distinct days so the sticky day-group header
#     (Phase 2) actually has multiple sections to render.
#
#   • A second cluster of events sits in months 4–6 so when the user
#     clicks "Show next available events" / "Find next events" the list
#     grows visibly. These also feed the empty-state recovery path when
#     the user narrows tags hard enough to empty the first window.
#
#   • A handful of events all share the same day so day-grouping with
#     count tail "(N)" can be eyeballed.
#
# All events are price-free and tagged with the default explorer tags
# so the default landing (no tag filter applied) shows them all.
base_week: 0
events:
  # ── Week 0 — same-day cluster for day-grouping QA ─────────────────
  - id: evt-ux-001
    calendar_id: salsa-cal-001
    title: Salsa Social Friday
    description: |
      Kick off the weekend with a friendly Paris social featuring a short warm-up set, mixed salsa floors, and enough room for both casual dancers and regulars.
      Expect a relaxed crowd, easy partner rotation, and a final DJ block that keeps the energy high through the last hour.
    location: Studio A, 10 Rue de Rivoli, Paris, France
    latitude: 48.8566
    longitude: 2.3522
    start: w0 Fri 20:00
    end: w0 Fri 23:00
    price_is_free: true
    tags: ["format:social", "dance-style:salsa", "level:all-levels"]
  - id: evt-ux-002
    calendar_id: bachata-cal-002
    title: Berlin Bachata Sensual Night
    description: |
      A late-start Berlin bachata night with sensual-focused music, dim studio lighting, and a progressive build from mellow warm-up tracks into a packed social floor.
      Organizers usually keep a welcoming host at the door, so solo attendees can settle in quickly before the main set begins.
    location: Hackescher Markt, Berlin, Germany
    latitude: 52.5226
    longitude: 13.4019
    start: w0 Fri 21:00
    end: w0 Sat 01:00
    price_is_free: true
    tags: ["format:social", "dance-style:bachata", "level:all-levels"]
  - id: evt-ux-003
    calendar_id: salsa-cal-001
    title: Madrid Salsa Beginner Class
    description: |
      Beginner-friendly partnerwork class covering basic timing, right turns, and simple social-floor transitions in a small central Madrid studio.
      The pace is intentionally gentle, with recap time built in so first-timers can stay comfortable through the full session.
    location: Calle de Atocha 34, Madrid, Spain
    latitude: 40.4140
