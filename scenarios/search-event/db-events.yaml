# Seeded events for validating the explorer event-title search.
#
# The fixture is designed to prove three things:
#   1. Search matches upcoming event titles only.
#   2. Hidden and past title matches are excluded.
#   3. Search is global across future events, not limited to the current
#      explorer date window, so one matching result sits well beyond the
#      default next-3-month range.
base_week: 0
events:
  - id: evt-se-001
    calendar_id: salsa-cal-001
    title: Moonrise Salsa Social Paris
    description: |
      Primary visible match for the Moonrise query. Use this event to verify
      the search dropdown shows title, date, and location, then navigates to
      the event detail page from the explorer finder.
    location: Studio Lumiere, 10 Rue de Rivoli, Paris, France
    latitude: 48.8566
    longitude: 2.3522
    start: w0 Fri 20:00
    end: w0 Fri 23:30
    price_is_free: true
    tags: ["format:social", "dance-style:salsa", "level:all-levels"]

  - id: evt-se-002
    calendar_id: bachata-cal-002
    title: Moonrise Bachata Workshop Berlin
    description: |
      Second visible Moonrise result. Provides another city and another dance
      style so the dropdown rows are easy to distinguish.
    location: Kulturbrauerei, Berlin, Germany
    latitude: 52.5424
    longitude: 13.4131
    start: w2 Sat 14:00
    end: w2 Sat 17:00
    price_is_free: false
    price_min: 20
    price_max: 30
    price_currency: EUR
    tags: ["format:workshop", "dance-style:bachata", "level:intermediate"]

  - id: evt-se-003
    calendar_id: salsa-cal-001
    title: Moonrise Rooftop Salsa Marathon Lisbon
    description: |
      Far-future visible match. This event sits beyond the default explorer
      next-3-month window so the scenario can verify search is not constrained
      by the current explorer filters or visible list.
    location: Miradouro de Santa Catarina, Lisbon, Portugal
    latitude: 38.7091
    longitude: -9.1486
    start: w16 Sat 18:00
    end: w16 Sat 23:30
