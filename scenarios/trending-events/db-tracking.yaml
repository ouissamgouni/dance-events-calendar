    country: UK
  - event_id: evt-trend-003
    device_id: seed-trend-view-16
    source: shared-link
    country: UK
  # evt-trend-004 — view-bait: many views, zero going, zero saved
  - event_id: evt-trend-004
    device_id: seed-trend-view-17
    source: explorer-list
    country: UK
  - event_id: evt-trend-004
    device_id: seed-trend-view-18
    source: explorer-list
    country: UK
  - event_id: evt-trend-004
