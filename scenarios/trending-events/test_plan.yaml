test_plan:
  name: "Trending Events — filtered compact banner"
  description: >
    Verify the commitment-weighted popularity score end-to-end and the
    Explorer compact trending banner. The score is
    `raw / (hours_age + 24)^0.4`, where
    `raw = 5*going + 1*saved + 0.05*view`, gated by
    `trending_floor_going` and suppressed for past events. This scenario
    seeds enough eligible events for more than one banner card, and it
    verifies that the banner is scoped to the user's active filters.

  preconditions:
    - "Run with: task start:scenario SCENARIO=trending-events"
    - >
      settings.yaml enables `show_popularity`, `trending_enabled`, and
      `trending_banner_enabled`, with `trending_top_n: 5` and
      `trending_top_percent: 100` so the banner starts with multiple
      horizontal cards.
    - >
      The scenario pre-seeds future events, attendances, saves, and views
      calibrated so the expected global ranking starts with:
      evt-trend-001 Headliner Salsa Saturday, evt-trend-002 Bachata
      Workshop with Carlos & Maria, then the next eligible lower-scoring
      events.

  steps:
    - id: 1
      title: "Compact trending banner renders before the map and collapses"
      description: >
        Open / in Explorer with the default scenario settings. The viewer
        may be signed out; popularity is global.
      expected: >
        A compact horizontal banner appears directly above the Explorer map.
        Its only header is a small clickable "Trending" row with the same
        `/trending.png` icon used by trending map pins and compact blue text. There is no "scoped" count and no
        explanatory subtext. Clicking the Trending header collapses the
        event rail; clicking it again expands the rail.
        Each card shows a title truncated to 20 characters max, date,
        right-aligned attendance stats on the date row as icons plus counts
        (the same raised-hand icon used by Going, and the same bookmark icon
        used by Save), and an address truncated to 20 characters max. Tag
        pills do not render inside the banner cards.

    - id: 1a
      title: "Hovering a banner card highlights the matching map pin"
      description: >
        Hover the first card in the compact Trending banner, then move the
        pointer away. Repeat with keyboard focus by tabbing onto the card.
      expected: >
        While hovered or focused, the matching map pin switches to the same
        highlighted pin treatment used when hovering that event from the main
        event list. Moving away or blurring the card clears the pin highlight.

    - id: 2
      title: "Scenario starts with more than one trending banner card"
      description: >
        With the default filters unchanged, inspect the banner and the
        GET /api/events response.
      expected: >
        The banner shows multiple horizontally scrollable cards. The first
        card is evt-trend-001 (Headliner Salsa Saturday), and evt-trend-002
        (Bachata Workshop with Carlos & Maria) is also present. Both events
        have non-zero `popularity_score`, visible `going_count`, and visible
        `saved_count` values in the API payload. evt-trend-004
        (View-Bait — Free Bachata Crash Course) is absent from the banner
        because its score is 0 under the going floor.

    - id: 3
      title: "Popular sort still ranks by the same score"
      description: >
        In the event list panel, click the "Popular" sort chip.
      expected: >
        The list sorts by `popularity_score` descending. evt-trend-001 is
        first and evt-trend-002 is above lower-scoring events. The banner
        keeps the same top scoped events, proving the card rail and list
        sort use the same server-provided score.

    - id: 4
      title: "Bachata filter scopes the banner away from the salsa headliner"
      description: >
        Open Filters and select the Bachata dance-style tag. Leave the date
        and area filters unchanged.
      expected: >
        The banner recomputes from the filtered Explorer result set. The
        salsa-only Headliner Salsa Saturday (evt-trend-001) disappears from
        the banner. Bachata candidates such as evt-trend-002 (Bachata
        Workshop with Carlos & Maria), evt-trend-011 (Rome Bachata Rooftop),
        evt-trend-013 (Lisbon Kizomba & Bachata Night), evt-trend-016
        (Copenhagen Latin Friday), evt-trend-019 (Warsaw Bachata Sensual
        Festival kickoff night), or evt-trend-022 (Berlin Sensual Bachata
        Pop-up) can appear depending on the effective cap. This proves the
        rail is trending within the active filters, not globally trending.

    - id: 5
      title: "Salsa filter restores the salsa trend set"
      description: >
        Clear the Bachata filter and select the Salsa dance-style tag.
      expected: >
        The banner updates again. evt-trend-001 returns because it matches
        the Salsa filter. Bachata-only events such as evt-trend-002 are no
        longer shown. Multi-style events that include Salsa may still appear
        if their score is high enough for the scoped cap.

    - id: 6
      title: "Committed area filter scopes the banner; casual map pan does not"
      description: >
        Pan the map without clicking "Search this area," then inspect the
        banner. Next, pan/zoom to Berlin and click "Search this area."
      expected: >
        Casual panning alone does not change the banner contents. After
        clicking "Search this area," the area becomes an active Explorer
        filter and the banner recomputes from that area-scoped result set.
        Berlin events such as evt-trend-002 or evt-trend-022 can remain;
        Paris-only events such as evt-trend-001 disappear if outside the
        committed area.

    - id: 7
      title: "Admin toggle controls the banner independently"
      description: >
        Sign in as admin@example.com, open /admin/configuration, and inspect
        the Trending section.
      expected: >
        The main Trending toggle is ON. A separate "Trending banner" toggle
        is visible under the Trending section and is ON from settings.yaml.
        Turning "Trending banner" OFF hides the Explorer banner after reload
        while the list/map Trending chips and rings remain enabled. Turning
        the main Trending toggle OFF hides the banner and the other trending
        surfaces.

    - id: 8
      title: "Cap controls change banner card count"
      description: >
        In /admin/configuration, change Trending top N from 5 to 1 and reload
        /. Then restore top N to 5 and change Trending top % from 100 to 10.
      expected: >
        With top N = 1, the banner shows exactly one card: evt-trend-001 in
        the unfiltered scope. Restoring top N to 5 and setting top % to 10
        reduces the effective cap, so the banner shows fewer cards than the
        seeded baseline. Restore top N = 5 and top % = 100 before continuing.

    - id: 9
      title: "Anti-view-bait floor blocks evt-trend-004"
      description: >
        Locate evt-trend-004 (View-Bait — Free Bachata Crash Course) in the
        list or API response.
      expected: >
        evt-trend-004 has `popularity_score == 0.0` despite its seeded views.
        It does not appear in the compact banner, does not get the card
        Trending chip, and does not get a map ring. This proves views alone
        cannot trend.

    - id: 10
      title: "Raising trending_floor_going suppresses boundary events"
      description: >
        In /admin/configuration, change Trending floor (going) from 1 to 2
        and reload /.
      expected: >
        PUT /api/settings returns 200 with `trending_floor_going: 2`.
        One-going events such as evt-trend-003 lose their non-zero score and
        drop out of the banner/chip/ring surfaces. Lower the floor back to 1
        and reload to restore the seeded baseline.

    - id: 11
      title: "Past-event guard suppresses evt-trend-005"
      description: >
        Expand the date range to include last week and locate evt-trend-005
        (Last Week's Salsa Tuesday).
      expected: >
        Even with seeded going and saved signals, the past event has
        `popularity_score == 0.0` and never appears in the banner or receives
        a Trending chip/ring.
