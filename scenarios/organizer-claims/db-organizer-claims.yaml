# Pre-seeded organizer claims for the Organizer Claims scenario.
#
# Two-flow model:
#   - kind: "badge"  → account-level verified-organizer request.
#                       Admin approval flips ``is_verified_organizer``.
#   - kind: "events" → per-event organizer attribution. Only available
#                       to already-verified organizers. Admin approval
#                       attributes the event AND auto-marks the
#                       organizer as Going (public) on each event.
#
# Seeded:
#   1. Olive — approved badge claim (grants verified-organizer status)
#      plus an approved events claim covering evt-organizer-001. The
#      event detail page should show "Organized by @olive ✓" from boot
#      and Olive's profile shows that event as Going (public).
#   2. Carl — pending badge claim awaiting admin review. After admins
#      approve the badge, Carl can submit an events claim from /account
#      using the event-search picker.
organizer_claims:
  # Olive — verified-organizer status (badge approved).
  - submitter_email: organizer@example.com
    kind: badge
    grant_badge: true
    status: approved
    admin_notes: Verified via instagram bio link.

  # Olive — events claim approved for evt-organizer-001.
  - submitter_email: organizer@example.com
    kind: events
    status: approved
    admin_notes: Confirmed organizer of the Friday social series.
    events:
      - event_id: evt-organizer-001
        decision: approved

  # Carl — pending badge claim. Admin approves this in the scenario.
  - submitter_email: claimant@example.com
    kind: badge
    grant_badge: true
    status: pending
