base_week: 0

# Events across 3 calendars, each with different default-tag configurations.
#
# Design:
#   - salsa-cal-dt-001 "Salsa Events"    → default: dance-style:salsa
#   - bachata-cal-dt-002 "Bachata Events" → default: dance-style:bachata
#   - afro-cal-dt-003 "Kizomba & Afro"  → default: dance-style:kizomba + dance-style:semba
#
# Groups of events intentionally show two states:
#   A) Already tagged with the calendar's default tag (simulates events synced
#      after the default was configured).
#   B) Missing the calendar's default tag (simulates older events synced before
#      the feature was set up — used to test the bulk-assign flow).
#
# See test_plan.yaml for full walkthrough.

