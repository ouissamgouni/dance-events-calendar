attendances:
  # Alice receives self-reminders for events she is going to.
  - event_id: ev-remind
    email: alice@example.com
    share_publicly: true
    share_audience: public

  # Bob follows Alice; this Going should produce friend/activity notifications.
  - event_id: ev-friend
    email: alice@example.com
    share_publicly: true
    share_audience: public
