base_week: 0
# Events deliberately span four geographic clusters so the bbox filter is
# observable end-to-end:
#   • Inside DEFAULT_AREA_BBOX (20,-25,71,60) — Europe & Mediterranean basin:
#       Paris, Madrid, Berlin, Rome, Athens, Istanbul, Casablanca
#   • Outside on the west:  New York   (lng -74)
#   • Outside on the east:  Tokyo      (lng 139)
#   • Outside on the south: Buenos Aires (lat -34)
# Tag mix covers salsa / bachata / kizomba / zouk so preferred-tag filtering
# is observable without any single tag dominating the result list.
events:
  # ── Inside default bbox ────────────────────────────────────────
  - id: evt-pref-001
    calendar_id: salsa-cal-001
    title: Friday Salsa Social Paris
    description: |
      Weekly Cuban salsa social with DJ Mambo. Beginners welcome.
      All levels, no partner needed. Smooth-soled shoes recommended.
    location: Dance Studio, 10 Rue de Rivoli, Paris, France
    latitude: 48.8566
    longitude: 2.3522
    start: w0 Fri 21:00
    end: w0 Sat 01:00
    price_is_free: true
    tags:
      - format:social
      - dance-style:salsa

  - id: evt-pref-002
    calendar_id: bachata-cal-002
    title: Bachata Sensual Workshop Berlin
    description: |
      Intermediate sensual bachata workshop with rotation.
      Comfortable dance shoes essential. Limited spaces.
    location: Tanzhaus, Friedrichstr. 100, Berlin, Germany
    latitude: 52.52
    longitude: 13.405
    start: w0 Sat 14:00
    end: w0 Sat 17:00
    price_is_free: false
    price_min: 25
    price_max: 35
    price_currency: EUR
    tags:
      - format:workshop
      - dance-style:bachata

  - id: evt-pref-003
