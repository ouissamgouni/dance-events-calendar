# Taxonomy used by the user-preferences scenario. The Settings Preferences
# editor exposes ALL enabled tag groups as chip multi-selects, so all groups
# defined below (`format`, `reach`, and `dance-style`) appear in Settings and
# contribute to the user's saved `preferred_tag_ids`.
tag_groups:
  - slug: format
    label: Format
    ordinal: 10
    allow_multiple: true
    color: "#f472b6"
    tags:
      - slug: social
        label: Social
        is_hero_filter: true
        hero_ordinal: 0
      - slug: workshop
        label: Workshop
      - slug: festival
        label: Festival

  - slug: reach
    label: Reach
    ordinal: 30
    allow_multiple: true
    onboarding_eligible: true
    color: "#a78bfa"
    tags:
      - slug: local
        label: Local
      - slug: regional
        label: Regional
      - slug: international
        label: International

  - slug: dance-style
    label: Dance Style
    ordinal: 50
    allow_multiple: true
    onboarding_eligible: true
    color: "#fb923c"
    tags:
      - slug: salsa
        label: Salsa
        is_hero_filter: true
        hero_ordinal: 1
      - slug: bachata
        label: Bachata
        is_hero_filter: true
        hero_ordinal: 2
      - slug: kizomba
        label: Kizomba
      - slug: zouk
        label: Zouk
