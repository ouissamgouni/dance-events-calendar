# Phase E (E3) — onboarding follow scenario.
#
# Cast covers the onboarding suggestion ranking contract:
#   1. verified organizers first,
#   2. admin-managed curators next, sorted by handle,
#   3. most-followed accounts last, sorted by follower count desc then handle.
#
# `account_visibility` and `show_in_suggestions` are deliberately separate:
# friends-only profiles may still be suggested, while an explicit suggestion
# opt-out must be hidden from onboarding, Discover, and network suggestions.
#
# It also includes representable exclusions: self, already-followed targets,
# pending follow requests, and users without handles. Soft-deleted users are
# excluded by the API too, but the scenario user seeder does not support
# deleted_at, so that rule is documented in test_plan.yaml instead.

# Phase G — this scenario exercises the onboarding flow itself, so mock
# users must start with onboarded_at=null. Individual entries can still
# opt back in with an explicit onboarded_at value.
auto_onboard: false

users:
  - email: newbie@example.com
    name: Nora Newbie
    handle: newbie
  - email: verifiedorg1@example.com
    name: Salsa Hub
    handle: salsahub
    is_verified_organizer: true
  - email: verifiedorg2@example.com
    name: Bachata Co
    handle: bachataco
    is_verified_organizer: true
  - email: verifiedcurator@example.com
    name: Verified Curator
    handle: verifiedcurator
    is_verified_organizer: true
    is_admin_managed: true
    managed_label: Verified curator account
  - email: curatoralpha@example.com
    name: Curator Alpha
    handle: curatoralpha
    is_admin_managed: true
    managed_label: Alpha test curator
  - email: curatorbeta@example.com
    name: Curator Beta
    handle: curatorbeta
    is_admin_managed: true
    managed_label: Beta test curator
  - email: popular1@example.com
    name: Popular One
    handle: pop1
  - email: popular2@example.com
    name: Popular Two
    handle: pop2
    account_visibility: friends
  - email: popular3@example.com
    name: Popular Three
    handle: pop3
    show_in_suggestions: false
  - email: already-followed@example.com
    name: Already Followed
    handle: alreadyfollowed
  - email: pending-target@example.com
    name: Pending Target
    handle: pendingtarget
  - email: nohandle@example.com
    name: No Handle Candidate
  - email: admin@example.com
    name: Dev Admin
    handle: admin
