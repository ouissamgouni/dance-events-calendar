- id: evt-share-001
  calendar_id: salsa-cal-001
  title: Salsa Social Friday
  description: |
    Weekly social with DJ Mambo. Beginners welcome.
    The dance floor is open from the first beat to the last.
    All skill levels are welcome — no partner or prior experience needed.
    Expect a warm, inclusive crowd of local and visiting dancers.
    The venue features a full bar, cloakroom, and water stations throughout.
    Dress smart-casual; smooth-soled dance shoes strongly recommended.
    Follow the organiser's social pages for last-minute updates and playlists.
  location: Dance Studio, 10 Rue de Rivoli, Paris, France
  latitude: 48.8566
  longitude: 2.3522
  start: w0 Fri 21:00
  end: w0 Sat 01:00
  price_is_free: true
- id: evt-share-002
  calendar_id: bachata-cal-002
  title: Bachata Workshop
  description: |
    Sensual workshop with Carlos & Maria. Intermediate level.
    Each session is broken into clear, manageable steps with individual feedback.
    The instructor will address both leading and following roles equally.
    Comfortable dance shoes with a smooth, non-rubber sole are essential.
    No prior partner is required — participants rotate throughout the session.
    Water and light refreshments are provided during breaks.
    Spaces are strictly limited to maintain a high quality of teaching.
    Video recording of the technique segments is encouraged for personal review.
    A brief Q&A with the instructor follows each teaching block.
    Check the event page for warm-up videos and preparation tips in advance.
    Book early — this event has sold out in previous editions.
  location: Tanzhaus, Friedrichstr. 100, Berlin, Germany
  latitude: 52.52
  longitude: 13.405
  start: w0 Sat 14:00
  end: w0 Sat 17:00
  price_is_free: false
  price_min: 25
  price_max: 35
  price_currency: EUR
