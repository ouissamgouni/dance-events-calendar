  - id: evt-share-001
    calendar_id: salsa-cal-001
    title: Salsa Social Friday
    description: |
      Weekly social with DJ Mambo. Beginners welcome.
      The dance floor is open from the first beat to the last.
      All skill levels are welcome — no partner or prior experience needed.
      Expect a warm, inclusive crowd of local and visiting dancers.
      The venue features a full bar, cloakroom, and water stations throughout.
      Dress smart-casual; smooth-soled dance shoes strongly recommended.
      Follow the organiser's social pages for last-minute updates and playlists.
