test_plan:
  name: "Share I'm Going — Attendee Visibility & Privacy"
  description: >
    Verify the privacy-respecting "Who's Going" feature. Logged-out users see
    only the total going count. Any signed-in user can see the attendee list,
    but only attendees who explicitly share at the Public or Friends tier appear
    by name (Friends-tier reveals names only to mutual followers). Anonymous
    device attendances (logged-out clicks) are counted but never named.
    Verifies the per-event 3-tier audience picker (🌐 Public / 👥 Friends /
    🔒 Private), the account-level default audience, and that GDPR deletion
    wipes attendance data.
  preconditions:
    - "Run with: task start:scenario SCENARIO=share-im-going"
    - >
      In every browser session you use, accept the cookie banner with the
      "Personalization" category enabled — otherwise the frontend skips POST
      /api/track/event-attendance and the scenario has nothing to verify.
    - "Use a fresh browser profile or incognito window per device-side test."
    - >
      The scenario pre-seeds three users (Alice, Bob, Carol) plus Dev Admin via
      mock-users.yaml. No attendance is pre-seeded — each step below creates the
      state through the UI it tests.

  steps:
    # ── Anonymous baseline ───────────────────────────────────────
    - id: 1
      title: "Anonymous: only total count is shown, never names"
      description: >
        Open the home page in a fresh profile (Browser A, no sign-in). Open the
        "Salsa Social Friday" event detail. Look at the "Who's going" section
        above the action bar.
      expected: >
        The section reads "0 going" (no one has marked yet) or, if previous
        steps have already run, "<N> people are going. Sign in to see who." No
        avatars and no names are shown. There is no breakdown of
        public-vs-private (the breakdown is hidden for anonymous viewers).

    - id: 2
      title: "Anonymous: mark going stays anonymous, count goes up"
      description: >
        On the same anonymous browser, click the "I'm going" pill in the action
        bar. The button should toggle to "Going ✓" without opening any popover
        (the share-confirmation popover is logged-in only). Reload the page.
      expected: >
        The pill remains "Going ✓" after reload. The "Who's going" section now
        reads "1 person is going. Sign in to see who." The viewer is never
        offered a share toggle and is never named anywhere — they are a
        device-only attendee (user_id IS NULL).

    # ── Carol private path ──────────────────────────────────────
    - id: 3
      title: "Carol signs in and views the attendee list (no breakdown yet)"
      description: >
        Open Browser B (fresh profile). Sign in as Carol via /login → "Sign in
        as Carol". Open "Salsa Social Friday" event detail.
      expected: >
        The Who's going section now shows "1 going" (the private/anonymous count
        includes the anonymous device from step 2). The attendee list shows the
        empty-state hint "No one has shared their name yet — be the first by
        marking yourself going publicly." Carol does NOT yet appear because she
        hasn't marked herself going.

    - id: 4
      title: "Carol marks going PRIVATELY — counted but not named"
      description: >
        Carol clicks the "I'm going" pill. The audience picker popover opens
        showing three icon segments (🌐 Public / 👥 Friends / 🔒 Private)
        with 🔒 Private pre-selected (Carol's account default). Carol leaves it
        on Private and clicks "I'm going".
      expected: >
        Pill becomes "Going ✓" with a small lock (🔒) icon next to it,
        matching the tier she just selected. The Who's going section
        updates to "2 going". The attendee list still shows the empty-state
        — Carol is counted but not named. Reloading the page preserves
        all of the above.

    - id: 5
      title: "Carol switches to PUBLIC via the per-event audience picker"
      description: >
        Carol clicks the small lock icon next to the "Going ✓" pill. The
        "Edit visibility" popover opens with the audience picker on 🔒 Private
        and a "Not going" action in the bottom-left. She taps 🌐 Public
        and clicks "Save".
      expected: >
        The icon next to the pill changes to a globe (🌐) icon
        reflecting the new tier. The Who's going section becomes "2 going".
        Carol now appears in the attendee list with her avatar/initial +
        display name "Carol".

    # ── Bob public-by-default path ──────────────────────────────
    - id: 6
      title: "Bob sets default audience to Public in account settings"
      description: >
        Open Browser C (fresh profile). Sign in as Bob via /login. Navigate to
        /account → "Privacy & visibility" section. In the "When I RSVP" block,
        change "Default audience for new RSVPs" from 🔒 Private to 🌐 Public.
      expected: >
        The 🌐 Public segment becomes the active selection after the network
        call (no error toast). Reloading /account shows it still selected — the
        preference is persisted server-side via PATCH /api/social/me/visibility
        as ``share_attendance_default_audience``.

    - id: 7
      title: "Bob marks going — auto-public, no popover"
      description: >
        Bob navigates to "Salsa Social Friday" and clicks "I'm going".
      expected: >
        Because Bob's account default is Public, NO confirmation popover
        opens. The pill immediately becomes "Going ✓" with a globe (🌐)
        icon. The Who's going section becomes "3 going" and the attendee list
        shows both "Carol" and "Bob" as horizontal chips (ordered by
        attending_since — Carol first since she joined earlier).

    # ── Cross-viewer verification ────────────────────────────────
    - id: 8
      title: "Carol (Browser B) sees the same breakdown and Bob's name"
      description: >
        Switch back to Browser B (still signed in as Carol). Reload the Salsa
        Social Friday detail page.
      expected: >
        Carol sees "3 going" and an attendee list with "Carol" and "Bob". She
        does NOT see anything that identifies the anonymous device from step 2.

    - id: 9
      title: "Anonymous viewer (Browser A) still sees only the count"
      description: >
        Reload "Salsa Social Friday" in Browser A (still signed out, but already
        marked going as a device).
      expected: >
        The Who's going section reads "3 people are going. Sign in to see who."
        No names, no avatars, no public/private breakdown. The pill on the page
        is still "Going ✓" (own anonymous attendance preserved).

    # ── Browse without attending ────────────────────────────────
    - id: 10
      title: "Admin can view the attendee list without being going"
      description: >
        Open Browser D (fresh profile). Sign in as Dev Admin → /login → "Sign in
        as Dev Admin". Navigate to "Salsa Social Friday" event detail. Do NOT
        click "I'm going".
      expected: >
        Admin sees the full attendee list with Carol and Bob, plus the "3 going"
        breakdown — viewing requires only authentication, not reciprocal
        sharing. The admin's own pill is "I'm going" (not toggled).

    # ── Edit visibility from public back to private ─────────────
    - id: 11
      title: "Bob switches BACK to private from the action bar link"
      description: >
        On Browser C, on "Salsa Social Friday", click the globe icon next to
        Bob's "Going ✓" pill. The Edit visibility popover opens on 🌐 Public.
        Tap 🔒 Private and click "Save".
      expected: >
        The icon toggles to a lock (🔒) icon. The Who's going section becomes
        "3 going". Bob's name disappears from the attendee list (visible to
        other authed viewers — verify by reloading Browser B, where only "Carol"
        remains in the list).

    # ── Default preference change does NOT affect existing rows ─
    - id: 12
      title: "Toggling account default does not change existing attendances"
      description: >
        On Browser C, go back to /account → Privacy and switch the default
        audience back to 🔒 Private. Then navigate back to "Salsa Social Friday".
      expected: >
        Bob's pill is still "Going ✓" with the lock icon — his existing
        per-event choice is unchanged. The default preference only affects the
        prefilled value of the picker for FUTURE events. Verify by opening
        "Bachata Workshop" and clicking "I'm going" — the audience picker now
        opens with 🔒 Private pre-selected (reflects the new default).

    # ── Persistence across reload + sign-out/in ─────────────────
    - id: 13
      title: "Visibility state survives sign-out and sign-in"
      description: >
        On Browser B (Carol), go to /account → "Sign out". Then sign back in as
        Carol. Navigate to "Salsa Social Friday".
      expected: >
        Carol's pill is "Going ✓" with a globe (🌐) icon (her per-event
        share_publicly=true was reloaded from the server via
        /api/auth/attending-events). She still appears in the attendee list
        shown to all signed-in viewers.

    # ── GDPR deletion wipes attendance ──────────────────────────
    - id: 14
      title: "Carol deletes her account — name + private rows are wiped"
      description: >
        On Browser B, /account → "Delete my account" → confirm. Then on Browser
        D (admin), reload "Salsa Social Friday".
      expected: >
        Browser B is redirected to "/" with the nav showing "Sign in". On
        Browser D, the attendee list no longer contains "Carol" and the Who's
        going section drops by 1 ("2 going" — Bob is private, the anonymous
        device remains). No UserEventAttendance rows linked to Carol's user_id
        remain in the database.

    # ── Anonymous device GDPR ───────────────────────────────────
    - id: 15
      title: "Anonymous device deletion wipes the anonymous attendance"
      description: >
        On Browser A, open the cookie banner / privacy controls and trigger
        device-data deletion: DELETE /api/user-data/{device_id}.
      expected: >
        Response JSON includes "user_event_attendances" with a count >= 1.
        Reloading "Salsa Social Friday" on Browser D shows "1 going" total (only
        Bob remains). Browser A's pill is back to "I'm going" (state cleared).

    # ── Large attendee list (pre-seeded) ────────────────────────
    - id: 16
      title: "Show all / collapse on a long attendee list"
      description: >
        On any signed-in browser (e.g. Browser D as Dev Admin), navigate to the
        "Cuban Night" event detail page (evt-share-003). The scenario pre-seeds
        12 public attendees on this event via db-events.yaml → attendances.
        Inspect the Who's going section.
      expected: >
        The Who's going section shows "12 going". The attendee list renders the
        first 10 names with avatars, followed by a "Show all 12" link in rose
        text. Click "Show all 12" → all 12 attendees are now listed and the link
        toggles to "Show less". Click "Show less" → list collapses back to the
        first 10. On the event-card avatar stack on the home page, the same
        event shows 3 avatars + "+9" overflow; clicking the stack navigates to
        the detail page anchored at #attendees and the section is scrolled into
        view.

    # ── Friends-tier (mutual-follow) audience ───────────────────
    - id: 17
      title: "Friends-tier RSVP: Bob is named only to mutual followers"
      description: >
        Make Bob and Carol mutual followers (Bob follows Carol from /u/carol,
        Carol follows Bob from /u/bob). On Browser C (Bob), open "Bachata
        Workshop" and click "I'm going". In the audience picker, tap
        👥 Friends and confirm. Then reload "Bachata Workshop" on Browser B
        (Carol — mutual follower) and on Browser D (Dev Admin — NOT a mutual
        follower).
      expected: >
        Browser B: Bob appears by name in the attendee list (Carol is a mutual
        follower, so the friends-tier audience admits her). Browser D: the
        attendee list shows "0 named" / empty-state for this event — Bob is
        counted in the total going number but the admin (no mutual follow)
        cannot see his name. Bob's pill on Browser C shows a users (👥)
        icon next to "Going ✓" reflecting the friends tier.
