# activity-digest-push cast. Bob has push_social_activity ON and is
# the user whose browser subscribes to push during the browser
# precondition step. Carol has push_social_activity OFF as a
# negative probe (user-level opt-out must suppress push even with a
# live subscription).
users:
  - email: admin@example.com
    name: Admin
    handle: admin
    account_visibility: public

  - email: alice@example.com
    name: Alice Rivera
    handle: alice
    account_visibility: public

  - email: bob@example.com
    name: Bob Martin
    handle: bob
    account_visibility: public
    email_social_activity_enabled: false
    push_social_activity_enabled: true

  # Negative probe.
  - email: carol@example.com
    name: Carol Nguyen
    handle: carol
    account_visibility: public
    email_social_activity_enabled: false
    push_social_activity_enabled: false
