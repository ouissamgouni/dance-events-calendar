# Pre-seeded events for the filter-by-social-interest scenario.
#
# evt-fsi-001..007, each tied to exactly one assertion in the test plan
# so toggling scope / kind / person selection stays unambiguous:
#
#   evt-fsi-001 (Salsa Social Friday)        → Alice goes (public)
#                                              → surfaces under "All" scope
#                                                only (alice is a one-way
#                                                followee, not a mutual
#                                                friend)
#   evt-fsi-002 (Bachata Workshop)           → Bob goes (public)
#                                              → surfaces under BOTH "All"
#                                                and "Friends" scope (bob
#                                                is a mutual friend)
#   evt-fsi-003 (Cuban Night)                → Carol goes, audience=friends
#                                              → MUST NOT surface under
#                                                either scope (viewer
#                                                follows carol one-way,
#                                                not mutual) until she
#                                                follows back
#   evt-fsi-004 (Bachata Beginners Bootcamp) → Dave goes (public)
#                                              → MUST NOT surface (stranger)
#   evt-fsi-005 (Salsa Tuesday Night)        → Eve goes (public)
#                                              → MUST NOT surface (eve
#                                                follows viewer, but viewer
#                                                does not follow her back)
#   evt-fsi-006 (Kizomba Sunday Brunch)      → Alice saves (public)
#                                              → surfaces under "All" scope
#                                                only, kind=saved/any
#   evt-fsi-007 (Rueda Wednesday)            → Bob saves (public)
#                                              → surfaces under BOTH
#                                                scopes, kind=saved/any
#   evt-fsi-008 (Kizomba Rooftop Mixer)      → Frank goes (public)
#                                              → surfaces under "All" scope
#                                                only (frank is a second
#                                                one-way followee)
#   evt-fsi-009 (Rueda Congress Grand Ball)  → Grace goes (public)
#                                              → surfaces under BOTH "All"
#                                                and "Friends" scope (grace
#                                                is a second mutual friend)
#
# evt-fsi-010..012 are catalog-only filler events with NO attendance —
# they never surface under any follows/friends scope. They exist purely
# to give every tag in every group (see scenarios/default/tags.yaml) a
# non-zero event_count, so the TagFilterPills per-group row has enough
# distinct pills to require horizontal scrolling when manually testing
# that UI (not tied to any test_plan.yaml assertion).
