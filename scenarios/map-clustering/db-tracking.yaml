# Pre-seeded EventView rows for the map-clustering scenario — gives the
# trending / popularity overlay something to chew on so the cluster
# fixture exercises BOTH the friend signal AND the orange ring at
# realistic densities. Same shape as scenarios/trending-events/
# db-tracking.yaml.
#
# Distribution (paired with the attendance/saves mix in db-events.yaml):
#   * evt-cluster-par-08 (Madrid Paris hero) — 20 views: combined with
#     5 friends going + 6 followed-not-friends going + 10 strangers
#     going + 10 strangers saving, its popularity_score easily wins
#     the top crown.
#   * evt-cluster-par-16 (Halles festival)   — 14 views
#   * evt-cluster-par-01 (Louvre sunset)     — 10 views
#   * evt-cluster-par-12 (Les Halles Friday) —  8 views
#   * evt-cluster-ber-01 (Alexanderplatz)    —  8 views
#   * evt-cluster-ber-08 (Holzmarkt fest)    — 12 views
#   * evt-cluster-mad-01 (Madrid headliner)  —  6 views
#   * evt-cluster-rom-01 (Rome Trastevere)   —  4 views
#   * evt-cluster-lis-01 (Lisbon Cais)       —  3 views
#   * evt-cluster-par-04 (Opéra Tuesday)     — 15 views with NO RSVPs
#     and no saves — the view-bait control. Validates that
#     `trending_floor_going: 1` suppresses it from the trending top-N
#     even though it has the second-highest view count, exactly like
#     evt-trend-004 in the trending-events scenario.
