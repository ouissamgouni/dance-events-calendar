test_plan:
  name: "Map clustering — pin-density exploration"
  description: >
    The product renders a Leaflet markercluster layer so dense cities do
    not collapse into an illegible stack of overlapping discs. This
    scenario seeds 30 events distributed as:

      * 16 events in central Paris (within ~700m of the Louvre)
      * 8 events in Berlin Mitte (~500m radius)
      * 6 outliers across Madrid / Rome / Lisbon / Amsterdam /
        Vienna / Prague

    so we have a reproducible fixture for the clustering layer and its
    pin-density acceptance checks.

  preconditions:
    - "Run with: task start:scenario SCENARIO=map-clustering"
    - >
      Same broader cast as the following-badge scenario is seeded
      (7 mutual friends of bob, 6 one-way followees, 20 strangers)
      plus the same follow graph. settings.yaml flips on
      `following_badge_enabled` so the Paris hero event surfaces the
      blue Following chip on its pin and the avatar stack in the
      popup — proving the cluster fixture also exercises the friend
      signals the cluster layer must preserve when expanding.
    - >
      Hero event evt-cluster-par-08 (Madeleine Salsa Saturday) seeds
      the full rich mix: 5 friends going + 2 friends saved + 6
      followed-not-friends going publicly + 10 strangers going + 10
      strangers saving. Lighter mixes are sprinkled on par-01, par-12,
      par-16, ber-01, ber-08, mad-01, rom-01, lis-01.
    - >
      Trending is also wired on (`trending_enabled: true`,
      `trending_floor_going: 1`, `trending_top_n: 5`,
      `trending_top_percent: 15`) and `db-tracking.yaml` seeds
      EventView rows mirroring the trending-events scenario:
      par-08 (20 views), par-16 (14), ber-08 (12), par-01 (10),
      par-12 / ber-01 (8 each), mad-01 (6), rom-01 (4), lis-01 (3),
      plus a view-bait control par-04 (15 views, 0 RSVPs, 0 saves).
    - "Unseen overlay flag remains at its default (off)."

  steps:
    - id: 1
      title: "Continent-level zoom shows three visually distinct clumps"
      description: >
        Open / signed out. Wait for the map to settle, then zoom out
        until France, Germany and Spain are all visible (roughly
        zoom level 4-5).
      expected: The Paris stack collapses into a single square blue cluster
        badge displaying "16"; Berlin shows "8"; outliers remain
        single pins. Cluster badges display the number of child events
        only; per-event trending, following, and unseen overlays appear
        after the cluster expands into individual pins.

    - id: 2
      title: "City-level zoom (Paris) shows sub-clusters"
      description: >
        Double-click on the Paris cluster (or zoom in until the map
        scale shows ~500m). Pin positions span roughly 700m around
        the Louvre.
      expected: Sub-clusters appear inside the Paris area at this zoom
        (e.g. one badge over Louvre/Palais-Royal grouping 4-5
        events, one over Les Halles grouping 3-4). Zooming one
        more step expands each sub-cluster.

    - id: 3
      title: "Street-level zoom resolves every pin individually"
      description: >
        Zoom to ~100m scale and pan across the cluster.
      expected: All cluster badges have expanded into individual pins; the page
        behaves like a normal marker map at this zoom level (clustering
        is purely a far-zoom helper). If two pins still overlap at the
        maximum zoom, clicking their cluster spiderfies the pins.

    - id: 4
      title: "Outliers always render as single pins"
      description: >
        Pan to Madrid, Rome, Lisbon, Amsterdam, Vienna, Prague — one
        event each.
      expected: >
        Each outlier renders as a single pin at every zoom level.

    - id: 5
      title: "List panel and map stay in sync as you pan"
      description: >
        With the list panel open on the left, pan the map to center
        only Berlin. The list should filter to the 8 Berlin events.
      expected: >
        `onBoundsChange` fires, the list panel re-queries with the
        new bounds, and only the 8 evt-cluster-ber-* events remain
        visible in the list. Confirms map-list coupling still works
        regardless of pin density.

    - id: 6
      title: "Following decorations are visible on the seeded pins"
      description: >
        Sign in as Bob. Trending and Following are both flipped on by
        settings.yaml (Unseen remains off). This step focuses on the
        blue Following chip — trending is asserted separately in
        step 8. Locate each pin with at least one friend or
        followed-not-friends RSVP and read its chip.
      expected: >
        Pins with following signal:
          * evt-cluster-par-08 (Madrid hero) — chip reads "11"
            (5 friends going + 6 followed-not-friends going public).
          * evt-cluster-par-01 — chip reads "3" (3 friends going).
          * evt-cluster-par-12 — chip reads "1" (1 friend going).
          * evt-cluster-par-16 — chip reads "4" (4 friends going).
          * evt-cluster-ber-01 — chip reads "5" (2 friends + 3
            followed-not-friends).
          * evt-cluster-mad-01 — chip reads "2".
          * evt-cluster-rom-01 — chip reads "3" (only followed-not-
            friends).
        Pins without following signal: evt-cluster-ber-08,
        evt-cluster-lis-01, all other par-* / ber-* with no seeded
        edges. Proves the cluster fixture isolates the *density*
        problem from the *signal-overlay* shape while still
        exercising both — the cluster layer MUST preserve these chips
        when individual pins expand from a cluster.

    - id: 7
      title: "Hero popup renders the unified AttendeeAvatarStack"
      description: >
        Click the pin for evt-cluster-par-08 (Paris hero).
      expected: >
        The popup body shows an `AttendeeAvatarStack` (avatars + "+N
        more" overflow) instead of any "<N> friend interested" text
        line — the same component used on event cards and in the
        following-badge scenario. The first 5 avatars carry blue
        rings (alice, emma, frank, gina, hugo); a small inline
        PeopleIcon prefixes the track. Followed-not-friends and
        strangers fill the overflow count but DO NOT add blue rings.

    - id: 8
      title: "Trending badge is drawn on the top-N pins"
      description: >
        Still as Bob, with `trending_enabled: true` and the seeded
        `db-tracking.yaml` views, identify which pins carry the
        trending image badge overlay. Compute the effective cap:
        `min(trending_top_n=5, ceil(visible*trending_top_percent/100))`
        — with 30 visible events and percent=15, ceil(30*0.15)=5, so
        both knobs land at 5.
      expected: >
        The 5 crowned pins are exactly:
          1. evt-cluster-par-08 (20 views + 21 going + 12 saves)
          2. evt-cluster-par-16 (14 views + 4 going)
          3. evt-cluster-ber-08 (12 views + 6 going + 1 friend save)
          4. evt-cluster-par-01 (10 views + 5 going)
          5. evt-cluster-ber-01 (8 views + 5 going)
        Each carries the trending image badge on the colored disc. All
        other pins render without the badge. Confirms tracking +
        attendance signals compose the same way they do in
        scenarios/trending-events.

    - id: 9
      title: "View-bait control is suppressed by trending_floor_going"
      description: >
        Locate evt-cluster-par-04 (Opéra Tuesday) on the map. It has
        15 seeded views — the SECOND-highest view count in the seed —
        but ZERO RSVPs and ZERO saves.
      expected: >
        Pin shows NO trending badge even though its raw view
        count is higher than several crowned pins. Proves
        `trending_floor_going: 1` correctly suppresses view-bait —
        same behavior as evt-trend-004 in trending-events. Flipping
        the floor to 0 in /admin/configuration and reloading should
        crown par-04 (regression check that the knob is wired).

    - id: 10
      title: "Following + Trending overlays co-exist on the hero pin"
      description: >
        Re-locate evt-cluster-par-08 (Paris hero) on the map.
      expected: >
        Hero pin renders BOTH overlays simultaneously: the trending
        image badge on the disc AND the blue Following chip with count
        "11" at the bottom-right. Validates the two decoration layers
        stack independently after cluster expansion.
