# Map-clustering exploration seed.
#
# Distribution:
#   * 16 events tightly packed in central Paris (within ~700m of Louvre)
#     so their pins overlap visibly at city-zoom and stack into an
#     unreadable mess at country-zoom.
#   * 8 events in Berlin Mitte (secondary cluster, ~500m radius).
#   * 6 outliers in Madrid / Rome / Lisbon / Amsterdam / Vienna / Prague
#     so the map has a continent-wide context.
#
# When you load /, zoom to fit Europe: you should see 3 visually
# distinct "blobs" plus 6 isolated pins. Today the blobs overlap into
# illegible discs. Once clustering ships, each blob should collapse
# into a single "N" badge that expands on zoom-in.
