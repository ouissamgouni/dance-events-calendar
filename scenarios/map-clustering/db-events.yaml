# --------------------------------------------------------------
# Attendances + saves — mirrors the following-badge scenario so the
# cluster fixture also exercises friend / followed-not-friends
# signals at realistic densities.
#
# Hero event: evt-cluster-par-08 (Madeleine Salsa Saturday, Paris)
#   5 friends going        (alice, emma, frank, gina, hugo)
#   2 friends saved        (nia, omar — audience=friends)
#   6 followed-not-friends going public
#                          (pablo, quinn, rita, samir, tara, ulysses)
#   10 strangers going     (s01..s10, share_audience: public)
#   10 strangers saving    (t01..t10, audience: public)
# Expected aggregate for Bob: following_friend_count = 11.
#
# Lighter mixes on a few other pins so the Paris/Berlin clusters
# show a mix of decorated and undecorated pins (proves a future
# cluster layer must NOT drop following decorations when expanding).
# --------------------------------------------------------------
