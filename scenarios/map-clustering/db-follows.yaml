# Follow graph mirrors the following-badge scenario so the cluster
# stress-test ALSO exercises the friend / followed-not-friends signals:
#   Mutual (friends of bob — surface in the friend signal):
#     alice <-> bob, emma <-> bob, frank <-> bob, gina <-> bob,
#     hugo <-> bob, nia <-> bob, omar <-> bob
#   One-way (bob -> them; public RSVPs feed the followed-not-friends
#   signal, but they're NOT mutual friends):
#     bob -> pablo, bob -> quinn, bob -> rita,
#     bob -> samir, bob -> tara, bob -> ulysses
follows:
  - { follower: alice, followee: bob }
  - { follower: bob, followee: alice }
  - { follower: emma, followee: bob }
  - { follower: bob, followee: emma }
  - { follower: frank, followee: bob }
  - { follower: bob, followee: frank }
