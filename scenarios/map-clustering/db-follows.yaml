  - { follower: hugo, followee: bob }
  - { follower: bob, followee: hugo }
  - { follower: nia, followee: bob }
  - { follower: bob, followee: nia }
  - { follower: omar, followee: bob }
  - { follower: bob, followee: omar }
  - { follower: bob, followee: pablo }
