base_week: 0

# Pre-seeded directly into the DB (bypasses calendar sync).
# Required because this scenario uses CALENDAR_SERVICE=mock, which causes
# mock-sync-events.yaml to be skipped — events would otherwise only appear
# after the mock sync pipeline ran.
events:
  - id: "evt-rating-001"
    calendar_id: "rating-cal-001"
    title: "Salsa Social — Rate Me!"
    description: >
      Test event for the rating feature. Submit a star rating, comment, and
      review tags.
    location: "Test Venue, Paris, France"
    latitude: 48.8566
    longitude: 2.3522
    start: "w0 Fri 21:00"
    end: "w0 Sat 01:00"
    price_is_free: true
    tags:
      - "format:social"
      - "dance-style:salsa"

  - id: "evt-rating-002"
    calendar_id: "rating-cal-001"
    title: "Bachata Workshop — Rate Me!"
    description: >
      Another test event for ratings. Try the Help-improve-this-event
      suggest-tags flow embedded in the rating modal.
    location: "Test Venue 2, Berlin, Germany"
    latitude: 52.5200
    longitude: 13.4050
    start: "w0 Sat 14:00"
    end: "w0 Sat 17:00"
    price_is_free: false
    price_min: 20
    price_currency: "EUR"
    tags:
      - "format:workshop"
      - "dance-style:bachata"

  - id: "evt-rating-003"
    calendar_id: "rating-cal-001"
    title: "Kizomba Class — No Reviews Yet"
    description: >
      Use this event to verify the empty-reviews state in the
      EventReviewsSection.
    location: "Test Venue 3, Madrid, Spain"
    latitude: 40.4200
    longitude: -3.7038
    start: "w0 Sun 19:00"
    end: "w0 Sun 21:00"
    price_is_free: false
    price_min: 12
    price_currency: "EUR"
    tags:
      - "format:class"
      - "dance-style:kizomba"

# Pre-existing pending tag suggestion to demo unlinked entries in the admin
# Feedback panel (alongside suggestions linked to ratings).
tag_suggestions:
  - event_id: "evt-rating-001"
    free_text: "live-band"
    status: "pending"
    device_id: "seed-device-rating"

# Pre-seeded EventRating rows so the test plan can verify behaviour without
# manually generating data. Mix of statuses and stars on evt-rating-001 to
# demonstrate aggregate, distribution, sort, filter and pagination.
ratings:
  # ── evt-rating-001: 7 approved + 1 pending + 1 rejected ─────────────────
  - event_id: "evt-rating-001"
    email: "alice@example.com"
    stars: 5
    comment: "Amazing night, top DJ and friendly crowd. Highly recommended."
    review_tag_slugs: ["review-tags:great-music", "review-tags:friendly-crowd"]
    status: "approved"
  - event_id: "evt-rating-001"
    email: "bruno@example.com"
    stars: 4
    comment: "Great atmosphere but a bit crowded after 11pm."
    review_tag_slugs: ["review-tags:crowded", "review-tags:good-venue"]
    status: "approved"
  - event_id: "evt-rating-001"
    email: "chloe@example.com"
    stars: 5
    comment: "Authentic Cuban vibe, loved every minute."
    review_tag_slugs: ["review-tags:authentic"]
    status: "approved"
  - event_id: "evt-rating-001"
    email: "dimitri@example.com"
    stars: 3
    comment: "Music was good but the venue is loud and small."
    review_tag_slugs: ["review-tags:loud"]
    status: "approved"
  - event_id: "evt-rating-001"
    email: "elena@example.com"
    stars: 4
    comment: "Beginner-friendly intro lesson before the social. Very welcoming."
    review_tag_slugs: ["review-tags:beginner-friendly"]
    status: "approved"
  - event_id: "evt-rating-001"
    email: "rater@example.com"
    stars: 5
    comment: "Best salsa social in town!"
    review_tag_slugs: ["review-tags:great-music"]
    status: "approved"
    is_anonymous: true
  - event_id: "evt-rating-001"
    email: "dev-user@example.com"
    stars: 4
    comment: "Solid evening. Drinks a bit pricey."
    review_tag_slugs: ["review-tags:overpriced"]
    status: "approved"
  - event_id: "evt-rating-001"
    email: "admin@example.com"
    stars: 2
    comment: "Sound system kept cutting out, hope it gets fixed for next time."
    status: "pending"
  # Rejected rating — not user-visible but visible to admin
  - event_id: "evt-rating-001"
    stars: 1
    comment: "spam spam spam buy crypto now"
    status: "rejected"
    admin_notes: "Spam content."

  # ── evt-rating-002: short list (3 approved, 1 pending) ──────────────────
  - event_id: "evt-rating-002"
    email: "alice@example.com"
    stars: 5
    comment: "Excellent workshop, learnt a lot of new patterns."
    review_tag_slugs: ["review-tags:beginner-friendly"]
    status: "approved"
  - event_id: "evt-rating-002"
    email: "bruno@example.com"
    stars: 4
    comment: "Good content but a bit pricey for the duration."
    review_tag_slugs: ["review-tags:overpriced"]
    status: "approved"
  - event_id: "evt-rating-002"
    email: "chloe@example.com"
    stars: 4
    comment: "Great teacher, friendly group."
    review_tag_slugs: ["review-tags:friendly-crowd"]
    status: "approved"
  - event_id: "evt-rating-002"
    email: "dimitri@example.com"
    stars: 3
    comment: "Decent workshop but room was crowded."
    status: "pending"
  # evt-rating-003: intentionally NO ratings to test the empty state.
