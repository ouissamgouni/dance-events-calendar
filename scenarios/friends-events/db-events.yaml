# Pre-seeded events for the friends-events scenario.
#
# Five events, each used by one specific assertion in the test plan so the
# matrix stays unambiguous when toggling chips:
#
#   evt-fe-001 (Salsa Social Friday)        → Alice goes  → "Friends going" must surface
#   evt-fe-002 (Bachata Workshop)           → Alice saves → "Friends saving" must surface
#   evt-fe-003 (Cuban Night)                → Carol goes  → MUST NOT surface for Bob
#                                             (Carol is one-way follower of Alice,
#                                              not Bob's friend)
#   evt-fe-004 (Bachata Beginners Bootcamp) → Dave goes   → MUST NOT surface for Bob
#                                             (stranger, no follow either way)
#   evt-fe-005 (Salsa Tuesday Night)        → Bob goes only (no friend) → MUST NOT
#                                             surface under Bob's own chip — the
#                                             filter is "events at least one of my
#                                             friends is involved with", not "events
#                                             I am involved with".
