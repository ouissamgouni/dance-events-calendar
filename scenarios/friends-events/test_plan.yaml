test_plan:
  name: "Friends Events — Explorer friend filter (Phase B)"
  description: >
    Verify the explorer friend filter (?friends_going / ?friends_saved /
    ?friend_handle on /api/events) end-to-end with a complete event seed.
    The scenario covers the critical product rules: only mutual friends'
    attendance counts, per-event audience opt-out (audience='private') is
    honoured, strangers' and one-way followers' attendance never leak, and
    the viewer's own attendance is excluded (the filter is "events at least
    one of my friends is involved with", not "events I am involved with").
  preconditions:
    - "Run with: task start:scenario SCENARIO=friends-events"
    - >
      The scenario pre-seeds five users (alice, bob, carol, dave, admin)
      and the same follow graph as friends-graph: alice<->bob mutual,
      carol->alice one-way, dave & admin isolated. Five distinct events are
      seeded (evt-fe-001..005), each used by exactly one assertion below.
    - "Use a fresh browser profile or incognito window per signed-in user."
    - >
      Cookie banner: accept "Personalization" so /api/auth/* and /api/social/*
      are not blocked by the consent gate.

  steps:
    # ── Setup attendance / saves on the seeded events ────────────
    - id: 1
      title: "Alice marks Salsa Social Friday as Going"
      description: >
        Sign in as Alice on Browser A (/login → "Sign in as Alice Rivera").
        Open /event/evt-fe-001 and click "I'm going". In the audience
        picker, pick 🌐 Public (so Bob — a mutual friend — will see her
        on the friends-going list).
      expected: >
        POST /api/events/evt-fe-001/attendance → 200; the button flips to
        "Going ✓" with an eye icon. A subsequent GET
        /api/events/evt-fe-001/attendance returns share_publicly=true and
        share_audience="public". This is the row that must SURFACE under
        Bob's "Friends going" chip in step 5.

    - id: 2
      title: "Alice saves Bachata Workshop"
      description: >
        Still on Browser A (Alice), open /event/evt-fe-002 and click the
        bookmark / "Save" button.
      expected: >
        POST /api/events/evt-fe-002/save → 200; the bookmark icon becomes
        filled. This row contributes to Bob's "Friends interested" union in
        step 6.

    - id: 3
      title: "Carol (one-way follower) marks Cuban Night as Going"
      description: >
        Open Browser B, /login → "Sign in as Carol Nguyen". Open
        /event/evt-fe-003 and click "I'm going". Pick 🌐 Public in the
        audience picker.
      expected: >
        Attendance row persists. Critically, Carol is NOT a friend of Bob
        (no follow either way) and only a one-way follower of Alice — so
        this row must NOT surface under Bob's chip in step 7.

    - id: 4
      title: "Dave (stranger) marks Bachata Beginners Bootcamp as Going; Bob marks his own"
      description: >
        Open Browser D, /login → "Sign in as Dave Smith", open
        /event/evt-fe-004 → "I'm going" (audience 🌐 Public). Then open
        Browser C, /login → "Sign in as Bob Martin", open
        /event/evt-fe-005 → "I'm going" (audience 🌐 Public).
      expected: >
        Both attendance rows persist. Dave is a complete stranger to Bob;
        evt-fe-004 must NOT surface in Bob's filtered list. Bob's own
        attendance on evt-fe-005 must also NOT surface — the chip is for
        FRIENDS' activity, not the viewer's own (the viewer already has
        /my-calendar for that). These two cases together prove the filter
        is strictly "mutual friend attended/saved", not "any signed-in user
        attended/saved".

    # ── Friend filter — happy paths ─────────────────────────────
    - id: 5
      title: "Bob's 'Friends → Interested' chip surfaces Alice's going + saved (union)"
      description: >
        On Browser C (Bob), open / (Home). Above the event list, locate
        the "Friends" row and click the "Interested" chip. Leave the friend
        dropdown on its default "All friends" value.
      expected: >
        Chip becomes active (filled blue). Network: GET
        /api/events?friends_going=1&friends_saved=1 is fired (alongside the
        usual date / location params). "Interested" is a single chip whose
        UI semantics match Facebook Events: it is the OR of going + saved,
        so the list re-renders with EXACTLY two rows: evt-fe-001 (Salsa
        Social Friday — Alice going) and evt-fe-002 (Bachata Workshop —
        Alice saved). Map markers update to match. Specifically NOT in the
        list: evt-fe-003 (Carol — one-way follower), evt-fe-004 (Dave —
        stranger), evt-fe-005 (Bob himself). Click the chip again to
        deactivate; the full list returns and the friend dropdown
        disappears.

    - id: 6
      title: "Friend dropdown lists only the viewer's mutual friends"
      description: >
        Still on Browser C (Bob), with the Interested chip ON, open the
        friend dropdown that appeared next to the chip.
      expected: >
        The dropdown lists exactly the viewer's mutual friends. For Bob in
        this scenario that is just "Alice Rivera (@alice)" (plus the
        default "All friends" entry). Carol is NOT in the list (she follows
        Alice but not Bob), Dave is NOT in the list (no follow edges to
        Bob). Network: a single GET /api/social/me/friends is fired the
        first time the chip is enabled and the result is reused while the
        chip stays on.

    - id: 7
      title: "Picking a friend in the dropdown scopes the list to that friend"
      description: >
        On Browser C (Bob), with the Interested chip ON, pick "Alice
        Rivera" from the friend dropdown.
      expected: >
        Network: GET
        /api/events?friends_going=1&friends_saved=1&friend_handle=alice.
        The list still renders evt-fe-001 and evt-fe-002 (Alice is the only
        contributing friend, so scoping changes nothing in this graph), but
        the dropdown selection is reflected in the network call. Switch the
        dropdown back to "All friends" to clear ``friend_handle``. Turning
        the Interested chip OFF also clears any selected friend.

    # ── Privacy: per-event audience opt-out ───────────────────────
    - id: 8
      title: "Per-event audience=Private hides the row from friends"
      description: >
        On Browser A (Alice), open /event/evt-fe-001 (her "Going" row from
        step 1), click the eye icon next to the Going pill, and switch the
        audience picker to 🔒 Private. Then on Browser C (Bob), with the
        "Interested" chip still active, refresh /.
      expected: >
        evt-fe-001 disappears from Bob's filtered list. The row is silently
        omitted (no 4xx, no error toast) because the friend-filter query
        only counts attendances whose audience admits the viewer (the
        viewer's own attendance is always excluded from this filter, and
        🔒 Private excludes everyone else). Switching Alice back to
        🌐 Public restores the row on Bob's next refresh — proving the
        filter reads live state, not a cached snapshot.

    - id: 8b
      title: "audience=Friends row shows only to mutual followers"
      description: >
        On Browser A (Alice), open /event/evt-fe-001, click the eye icon and
        switch the audience picker to 👥 Friends. On Browser C (Bob, a
        mutual friend of Alice) refresh /. Then on Browser B (Carol — a
        one-way follower, NOT a mutual friend) refresh /.
      expected: >
        Bob's filtered list still includes evt-fe-001 (Alice is sharing at
        the friends tier, and Bob is a mutual follower so he is admitted).
        Carol's filtered list does NOT include evt-fe-001 (one-way follow
        is not enough — the friends tier requires mutual follow).

    # ── Single-friend deep link / dropdown selection ──────────────
    - id: 9
      title: "?friend_handle deep link auto-selects the friend in the dropdown"
      description: >
        On Browser C (Bob), with the Interested chip ON and Alice selected
        in the dropdown (from step 7), copy the URL bar. It should contain
        ``friend_handle=alice``. Open that URL in a new tab on Browser C.
      expected: >
        The new tab loads with the Interested chip already ON and the
        dropdown already showing "Alice Rivera" selected. Same network
        call as step 7. This is the deep-link contract for sharing a
        "What is @alice up to?" view — the URL is the canonical
        representation of the picker state, not a hidden URL-only hack.

    - id: 10
      title: "?friend_handle for a non-friend returns empty (not 4xx)"
      description: >
        Still on Browser C (Bob), manually edit the URL to
        /?friend_handle=carol (Carol is NOT Bob's friend — there is no
        follow edge in either direction between bob and carol). The friend
        dropdown does not list Carol, so this can only be reached via the
        URL.
      expected: >
        The list renders the empty state ("No events match your filters").
        Network: GET /api/events?friend_handle=carol → 200 with an empty
        items array. Critically, the response is NOT 403 and NOT 404 — the
        privacy chokepoint dictates that asking about a non-friend looks
        identical to asking about a friend who has no activity. Hitting the
        same URL signed out (Browser A in incognito, no session) also
        returns 200 with an empty list.
