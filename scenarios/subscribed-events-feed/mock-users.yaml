# Mock users pre-seeded for the subscribed-events-feed scenario (Phase C).
#
# Roles:
# - bob is the SUBSCRIBER. He subscribes to alice + carol during the test
#   plan. His notification feed and "From subscriptions" MyCalendar section
#   are the SUT.
# - alice and carol are TARGETS with public calendar visibility so bob can
#   subscribe without a friendship edge.
# - dave is an UNRELATED user (no subscription). His Going attendance must
#   NOT surface in bob's feed — the negative control.
# - admin is required so ADMIN_EMAIL resolves to an existing user; admin
#   approves the suggestion in the suggested fan-out test.
