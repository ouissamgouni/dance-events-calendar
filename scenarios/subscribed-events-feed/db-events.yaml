# Pre-seeded events for the subscribed-events-feed scenario (Phase C).
#
# Four events, designed so each assertion exercises a distinct surface:
#
#   evt-sef-001 (Salsa Social Friday)        → alice goes share_publicly
#                                              BEFORE bob subscribes →
#                                              backfilled as a row in
#                                              the "From subscriptions"
#                                              MyCalendar section, but NO
#                                              notification (fan-out only
#                                              fires at write time, not
#                                              retroactively on subscribe).
#
#   evt-sef-002 (Bachata Workshop)           → empty pre-seed; alice marks
#                                              Going during the test plan
#                                              AFTER bob subscribes →
#                                              MUST surface BOTH as a feed
#                                              notification (kind=
#                                              subscription_going) AND in
#                                              the MyCalendar section.
#
#   evt-sef-003 (Cuban Night)                → carol goes share_publicly
#                                              after bob subscribes (same
#                                              rule as evt-sef-002 but for
#                                              the "filter by subscribed
#                                              calendar" picker test).
#
#   evt-sef-004 (Reggaeton Block Party)      → dave goes share_publicly
#                                              MUST NEVER surface (bob is
#                                              not subscribed to dave) —
#                                              this is the negative
#                                              control proving the feed
#                                              is gated by the
#                                              calendar_subscriptions
#                                              table, not just by Going +
#                                              share_publicly.
base_week: 0
events:
  - id: evt-sef-001
    calendar_id: salsa-cal-001
    title: Salsa Social Friday
    description: |
      Weekly social with DJ Mambo. Beginners welcome.
