attendances:
  # Pre-existing share_publicly Going from alice. Used to verify that
  # subscribing AFTER the fact backfills the MyCalendar "From
  # subscriptions" section (read-time aggregation) while NOT generating a
  # historical notification (notifications only fire at write time).
  - event_id: evt-sef-001
    email: alice@example.com
    share_publicly: true
