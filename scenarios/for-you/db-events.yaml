# Baseline + weekend-spread events for the for-you scenario.
#
# Design goals (see also the neighbouring following-badge + trending-events
# scenarios, which inspired the network graph and popularity fixture):
#
#   * 5 baseline events (evt-fy-001..005) — kept with their original IDs
#     and geographic spread (Paris, Madrid, Berlin, Milano, Brussels) so
#     the existing test_plan.yaml narrative still holds. They establish
#     the New-lens localStorage baseline (see useSeenEvents) — none of
#     them should ever show a New marker.
#
#   * 20 bulk events (evt-fy-bulk-01..-20) — Salsa / Bachata weekend
#     events (Fri / Sat / Sun) spread across the next ~7 weeks in and
#     around Paris. Each has a unique title, a short description, and a
#     realistic venue address. Together with the 5 baseline cards + the
#     synced card they push the "You might like" fetch past the server
#     batch size (limit=20), so the first fetch returns X-Has-More=true
#     and the rail shows a "+more" tile.
#
#   * evt-fy-bulk-20 (Grand Paris Salsa Marathon) is the popularity
#     hero — it sits this weekend (w0 Sat 22:00, small time-decay) with
#     6 public "going" RSVPs so its popularity_score dominates and it
#     is deterministically the FIRST card in "You might like".
#
#   * evt-fy-bulk-15 (Trocadéro Salsa Sunday) hosts a second
#     friend-audience RSVP from `friend`, so "Friends going" holds
#     ≥ 2 events (bulk-15 + evt-fy-004) and the ordering
#     (going_count + saved_count) DESC is unambiguous — bulk-15 first
#     thanks to the extra public goings from mutual friends.
#
# Coordinates all fall inside the DEFAULT_AREA_BBOX ("Europe & nearby")
# so the viewer sees them without touching the area preference.
base_week: 0
events:
  # ── Baseline (kept from previous scenario shape) ─────────────────
  - id: evt-fy-001
    calendar_id: salsa-cal-001
