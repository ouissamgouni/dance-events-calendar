test_plan:
  name: "For You page"
  description: >
    /for-you is a dedicated page (not part of the Explorer map) with
    four always-visible sections, top to bottom:
      1. Your next events — events you've saved or are going to.
      2. You might like — upcoming events matching your Interest
         Profile (dance styles + area, set in Settings → Preferences),
         ranked by popularity.
      3. Following & friends going — upcoming events anyone you follow
         (one-way or mutual) has RSVP'd to, ranked by combined
         going+saved commitment.
      4. Build your tribe — friend-of-friend suggestions to follow,
         shown only when there's at least one suggestion.
      5. New — the unseen subset of "You might like".
    Each section paginates independently: 5 cards show at first,
    "+ more" reveals 5 more already-fetched cards, and only once those
    run out does it fetch the next server page (hidden once the server
    confirms there's nothing left).

  preconditions:
    - "task start:scenario SCENARIO=for-you"
    - "viewer@example.com has a seeded Interest Profile (db-interest-profiles.yaml): Salsa + Bachata, default 'Europe & nearby' area."
    - "Follows (db-follows.yaml): viewer <-> friend/emma/frank/gina/hugo (mutual); viewer -> pablo/quinn/rita (one-way, no follow-back); emma+gina -> iris and frank -> jonas (friend-of-friend candidates, NOT followed by viewer); s01..s10 + stranger + admin have no follow relationship with viewer at all."
    - "Attendances/saves (db-attendances.yaml / db-saves.yaml) give evt-fy-bulk-20 the top popularity score and make evt-fy-bulk-15 the top 'Following & friends going' card."

  steps:
    - id: 1
      title: "Sign in and see all four sections populated"
      description: >
        Sign in as viewer@example.com and open /for-you.
      expected: >
        No cold-start screen — every signed-in user has an Interest
        Profile (one is auto-created on first sign-in if none exists),
        so "You might like" already has cards. All four sections render
        in order: "You might like", "Following & friends going", "Build
        your tribe", "New" (plus "Your next events" above them). A
        section's row is empty only if it genuinely has no matches.

    - id: 2
      title: "'You might like' matches the Interest Profile and ranks by popularity"
      description: >
        Inspect the "You might like" row
        (`data-testid="for-you-you-might-like"`).
      expected: >
        Only Salsa/Bachata events appear — evt-fy-003 (Kizomba) and
        evt-fy-004 (Zouk) are absent. evt-fy-bulk-20 ("Grand Paris Salsa
        Marathon (TOP)") is the FIRST card (highest popularity score).
        Each card shows a title, short date, location, up to 3 tag
        pills, and a small Save/Going icon pair in the top-right
        corner; clicking those icons toggles save/going without opening
        the event modal, while clicking anywhere else on the card opens
        it. Cards with enough public RSVPs show an orange "Trending"
        badge.

    - id: 3
      title: "Save/Going CTA removes the card from the lens"
      description: >
        On the first "You might like" card, click the Save icon, then
        reload /for-you.
      expected: >
        The event no longer appears in "You might like" (it moved to
        "Your next events"). Repeat with the Going icon on a different
        card — same result.

    - id: 4
      title: "'+ more' reveals cards, then paginates"
      description: >
        Scroll to the end of "You might like" and click "+ more"
        repeatedly.
      expected: >
        The first few clicks reveal 5 more already-fetched cards each
        time with NO network request (client-side reveal). Once the
        fetched batch (20 events) is exhausted, the next click fires a
        real `GET /api/events?...&offset=20&profiles=me` request and
        appends the results. "+ more" disappears once the server
        reports no more pages.

    - id: 5
      title: "'Following & friends going' includes ALL followees, not just mutual friends"
      description: >
        Inspect the "Following & friends going" row
        (`data-testid="for-you-following-friends-going"`).
      expected: >
        evt-fy-bulk-15 ("Trocadéro Salsa Sunday") is FIRST (highest
        going+saved commitment). evt-fy-004 ("Zouk Friends Meetup")
        also appears. Because one-way followees now count, evt-fy-001
        and evt-fy-002 (public RSVPs from pablo/quinn/rita) also
        appear. evt-fy-005 (RSVP'd only by `stranger`, whom viewer
        doesn't follow at all) never appears.

    - id: 6
      title: "'Build your tribe' suggests friend-of-friend accounts, ranked by mutual friends"
      description: >
        Inspect "Build your tribe"
        (`data-testid="for-you-build-your-tribe"`), then click "Follow"
        on the first card.
      expected: >
        Two cards appear in order: Iris Novak (@iris, 2 mutual friends
        — emma & gina) first, then Jonas Weber (@jonas, 1 mutual friend
        — frank). Following Iris removes her card immediately; Jonas's
        card remains since he's still a valid suggestion.

    - id: 7
      title: "Admin sync adds a new event, which surfaces under 'New'"
      description: >
        Sign in as admin@example.com, go to /admin/configuration, click
        "Sync Now". Sign back in as viewer@example.com (same browser
        profile as step 1) and open /for-you.
      expected: >
        Sync imports "Rooftop Salsa After Sync" (evt-fy-sync-001). The
        "New" row (`data-testid="for-you-new"`) shows exactly that
        event — it's also present in "You might like" (New is always a
        subset), and no pre-existing event appears under "New".

    - id: 8
      title: "Empty states: no followees yet, and how to check the 'You might like' empty state"
      description: >
        Sign in as one of the isolated seeded users (e.g.
        stranger@example.com or s01@example.com — neither follows nor
        is followed by anyone) and open /for-you.
      expected: >
        "Following & friends going" shows "You're not following anyone
        yet." with a "Build your tribe" button linking to /discover
        (instead of a generic empty message). To see the "You might
        like" empty state (a prompt linking to Settings →
        Preferences), narrow that user's Interest Profile in Settings →
        Preferences to an area/dance-style combination with zero
        matches.
