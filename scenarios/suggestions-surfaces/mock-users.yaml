# Suggestions surfaces scenario.
#
# Cast:
#   - newbie: fresh user for onboarding follow suggestions.
#   - viewer: mutual friends with alice/bob/carol; should see FoF suggestions.
#   - loner: zero graph; should see Discover curator fallback only.
#   - alice/bob/carol: viewer's mutual friends, used as suggestion witnesses.
#   - pop1/pop2/pop3: FoF candidates ranked by mutual-friend count.
#   - privatepop: friends-only profile that remains suggestable.
#   - hiddenpop: explicit suggestion opt-out; must never be shown.
#   - salsa-hub: verified organizer for onboarding ranking.
#   - curator-paris/curator-bachata: admin-managed fallback/top-up candidates.
#   - curator-hidden: admin-managed but opted out of suggestions.
#   - admin: site admin control, excluded by backend discovery helpers.
users:
  - email: newbie@example.com
    name: Nora Newbie
    handle: newbie
    account_visibility: public
  - email: viewer@example.com
    name: Vera Viewer
    handle: viewer
    account_visibility: public
  - email: loner@example.com
    name: Leo Loner
    handle: loner
    account_visibility: public
  - email: alice@example.com
    name: Alice Rivera
    handle: alice
    account_visibility: public
  - email: bob@example.com
    name: Bob Martin
    handle: bob
    account_visibility: public
  - email: carol@example.com
    name: Carol Nguyen
    handle: carol
    account_visibility: public
  - email: popular1@example.com
    name: Popular One
    handle: pop1
    account_visibility: public
  - email: popular2@example.com
    name: Popular Two
    handle: pop2
    account_visibility: public
  - email: popular3@example.com
    name: Popular Three
    handle: pop3
    account_visibility: public
  - email: privatepop@example.com
    name: Private Popular
    handle: privatepop
    account_visibility: friends
  - email: hiddenpop@example.com
    name: Hidden Popular
    handle: hiddenpop
    account_visibility: public
    show_in_suggestions: false
  - email: salsa-hub@example.com
    name: Salsa Hub
    handle: salsahub
    account_visibility: public
    is_verified_organizer: true
  - email: curator-paris@example.com
    name: Paris Salsa Curator
    handle: curator-paris
    account_visibility: public
    is_admin_managed: true
    managed_label: Paris Salsa Curator
    bio: Hand-picked salsa and bachata nights across Paris.
  - email: curator-bachata@example.com
    name: Bachata Curator
    handle: curator-bachata
    account_visibility: public
    is_admin_managed: true
    managed_label: Bachata Curator
    bio: Editorial bachata calendar for social dancers.
  - email: curator-hidden@example.com
    name: Hidden Curator
    handle: curator-hidden
    account_visibility: public
    is_admin_managed: true
    show_in_suggestions: false
    managed_label: Hidden Curator
    bio: Opted out of suggestion surfaces.
  - email: admin@example.com
    name: Dev Admin
    handle: admin
    account_visibility: public
