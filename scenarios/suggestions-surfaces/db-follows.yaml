# Follow graph for the suggestions surfaces scenario.
#
# viewer is mutual friends with alice/bob/carol. Those friends follow the
# candidate accounts with descending overlap:
#   pop1: followed by alice + bob + carol (3 mutual witnesses)
#   pop2: followed by alice + bob (2 mutual witnesses)
#   pop3: followed by alice (1 mutual witness)
#   privatepop: followed by alice (1 mutual witness; friends-only but suggestable)
#   hiddenpop: followed by alice + bob (opted out; must be excluded)
#
# newbie has no graph. The popular tail below also gives onboarding a
# deterministic most-followed fallback after the verified organizer and
# admin-managed curator candidates.
#
# The expected ordered Discover suggestion set for viewer is:
#   pop1, pop2, pop3, privatepop, curator-bachata, curator-paris
# where curators are the zero-score fallback/top-up candidates.
follows:
  - follower: viewer
    followee: alice
  - follower: alice
    followee: viewer
  - follower: viewer
    followee: bob
  - follower: bob
    followee: viewer
  - follower: viewer
    followee: carol
  - follower: carol
    followee: viewer
  - follower: alice
    followee: pop1
  - follower: alice
    followee: pop2
  - follower: alice
    followee: pop3
  - follower: alice
    followee: privatepop
  - follower: alice
    followee: hiddenpop
  - follower: bob
    followee: pop1
  - follower: bob
    followee: pop2
  - follower: bob
    followee: hiddenpop
  - follower: carol
    followee: pop1
  - follower: admin
    followee: salsahub
  - follower: admin
    followee: curator-bachata
