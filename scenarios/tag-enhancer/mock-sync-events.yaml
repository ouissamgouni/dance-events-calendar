- id: sync-evt-001
  calendar_id: salsa-cal-001
  title: Salsa Bootcamp Sunday Brunch
  description: |
    Beginner-friendly salsa bootcamp with brunch. Indoor venue, free entry before noon.
    The dance floor is open from the first beat to the last.
    All skill levels are welcome — no partner or prior experience needed.
    Expect a warm, inclusive crowd of local and visiting dancers.
    The venue features a full bar, cloakroom, and water stations throughout.
    Dress smart-casual; smooth-soled dance shoes strongly recommended.
    A beginner taster class runs at the start of the evening — free of charge.
    Photography may take place; participants may appear in promotional material.
    Public transport is recommended; parking is limited near the venue.
    Bring a bottle of water and a positive attitude — that's all you need.
    Follow the organiser's social pages for last-minute updates and playlists.
  location: Casa Cubana, Madrid, Spain
  latitude: 40.4168
  longitude: -3.7038
  start: w1 Sun 11:00
  end: w1 Sun 14:00
  price_is_free: true
