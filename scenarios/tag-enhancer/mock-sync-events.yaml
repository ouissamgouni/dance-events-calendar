# Events delivered by the mock calendar service on sync. Kept tiny so the
# sync-step in the test plan stays fast and focused: each event is designed
# to trigger one obvious heuristic match so the post-sync TagSuggestion rows
# are predictable.
#
# These are NOT pre-seeded into the DB; they only appear after the admin
# triggers a manual sync (or the scheduler ticks).

base_week: 0

events:
  - id: "sync-evt-001"
    calendar_id: "salsa-cal-001"
    title: "Salsa Bootcamp Sunday Brunch"
    description: >
      Beginner-friendly salsa bootcamp with brunch. Indoor venue, free entry
      before noon.
    location: "Casa Cubana, Madrid, Spain"
    latitude: 40.4168
    longitude: -3.7038
    start: "w1 Sun 11:00"
    end: "w1 Sun 14:00"
    price_is_free: true
    # Expected post-sync auto suggestions: salsa, bootcamp, beginner, indoor, free-entry.

  - id: "sync-evt-002"
    calendar_id: "kizomba-cal-003"
    title: "Urban Kiz Open-Air Social"
    description: >
      Late-night urban kiz social in the park with a Lisbon DJ.
    location: "Parque Eduardo VII, Lisbon, Portugal"
    latitude: 38.7300
    longitude: -9.15
    start: "w1 Fri 22:00"
    end: "w1 Sat 02:00"
    price_is_free: false
    price_min: 5
    price_currency: "EUR"
    # Expected post-sync auto suggestions: kizomba (urban kiz), social, dj, outdoor (open-air).
