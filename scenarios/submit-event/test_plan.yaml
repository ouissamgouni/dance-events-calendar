# Event Suggestions — QA Test Plan
# ===================================
# Validates the full event suggestion workflow: the stepped collapsible
# public submission form (with required tags, non-blocking geocode
# warning, price/promo split, Going toggle), signed-in vs. anonymous
# visibility, admin review, approve/reject, and notification fan-out to
# friends.

test_plan:
  name: "Event Suggestions — Full Workflow QA"
  description: >
    End-to-end test of the event suggestion feature: the stepped "Suggest an
    Event" form, immediate visibility for signed-in submitters (pending
    review) vs. anonymous submitters (invisible until approved), admin
    review/approve/reject, rejection hard-block, and social_activity
    notification fan-out to friends when a signed-in submitter's event goes
    live with them marked "going".

  steps:
    - id: 1
      title: "Home page loads with Suggest button"
      description: >
        Open the home page. Verify events load and the "Suggest an Event" button
        is visible in the toolbar area.
      expected: >
        Calendar/explorer view renders with seed events. A rose-coloured
        "Suggest an Event" button appears near the view mode toggle.
      verification: "Button is visible and clickable"

    - id: 2
      title: "Suggest modal opens as a stepped, collapsible form"
      description: >
        Click "Suggest an Event" while signed out. Verify the modal opens with
        collapsible sections: Name/dates/location, Description, Links, Tags,
        Price, Promo code, RSVP and contact. Only the active section is
        expanded; there are no numbered steps, no "Back" buttons, and no
        "Edit" buttons — clicking a collapsed section's header opens it.
      expected: >
        Sections render collapsed except the first ("Name, dates, location").
        Clicking any collapsed section header expands it; clicking it again
        (or another section) collapses/expands accordingly.
      verification: "Sections toggle open on header click; no Back/Edit buttons present"

    - id: 3
      title: "Submit empty basics section shows a warning, not a hard block"
      description: >
        Click Next on the Name/dates/location section without filling anything.
      expected: >
        A warning message (amber background/text) appears at the bottom of the
        section explaining title/dates/location are required. The section
        stays open.
      verification: "Warning renders in the section's own footer, not a modal-wide banner"

    - id: 4
      title: "Location without a validated geocode is a warning, not a blocker"
      description: >
        Fill title/dates. Type a location but do NOT select a suggestion from
        the autocomplete dropdown. Click Next.
      expected: >
        A non-blocking amber warning appears ("We couldn't verify this
        address…"), but clicking Next still advances to the Description
        section since the address text itself is non-empty.
      verification: "Section advances despite unresolved geocode; warning is advisory only"

    - id: 5
      title: "Collapsed basics section shows name + location + dates preview"
      description: >
        After advancing past the basics section, inspect its collapsed header.
      expected: >
        The collapsed header shows the event title, plus a single line with a
        truncated location preview (city/country if identifiable) and the
        formatted date/time range, and a green checkmark to the left of the
        title (since the section is valid).
      verification: "Collapsed summary line shows location + dates together; checkmark icon visible"

    - id: 6
      title: "Description section preview truncates to 2 lines"
      description: >
        Enter a long, multi-paragraph description and advance to Links.
      expected: >
        The collapsed Description section shows only a 2-line clamped preview
        of the text (no scrollbar, ellipsis-style overflow).
      verification: "Description preview never exceeds 2 visual lines"

    - id: 7
      title: "Link URL field is pre-filled with https://"
      description: >
        Open the Links section.
      expected: >
        The URL input already contains "https://" so the user only needs to
        type the rest of the address.
      verification: "Input default value is 'https://'"

    - id: 8
      title: "Required tags block Next; collapsed tags show pill previews"
      description: >
        Advance to Tags without selecting a dance-style or reach tag, click
        Next (warning shown), then select "Salsa" and "Local" and advance.
      expected: >
        A warning appears until both required tag groups have a selection.
        Once advanced, the collapsed Tags section shows colored pill previews
        reusing the same pill style as the tag picker.
      verification: "Warning clears once required tags selected; collapsed pills render"

    - id: 9
      title: "Price section is compact and inputs sit on one line"
      description: >
        Open the Price section, uncheck "Free event".
      expected: >
        Min, Max, and Currency inputs are narrow and sit side-by-side on one
        row (including on mobile viewport widths).
      verification: "Min/Max/Currency inputs share a single flex row at 375px width"

    - id: 10
      title: "Promo code has its own section"
      description: >
        Advance past Price.
      expected: >
        A separate "Promo code" section appears (distinct from Price) with
        promo code, promo URL, and promo description fields.
      verification: "Promo code section exists independently of Price"

    - id: 11
      title: "Going audience selector is compact on mobile"
      description: >
        Sign in as Dev User (dev-user@example.com). Open the RSVP section.
      expected: >
        The "Mark me going by default" checkbox and the audience selector
        (Friends/Public/Private) sit on one row; the selector is narrow enough
        to avoid wrapping at mobile widths (375px).
      verification: "Going checkbox + audience select share one row without overflow"

    - id: 12
      title: "Signed-in submission is immediately live (pending review)"
      description: >
        As Dev User, fill out the whole form for "Salsa Open Air" with Going
        checked (audience: Friends) and submit.
      expected: >
        Success screen reads "Your event is live and under review." Navigating
        back to Home shows the event immediately in the calendar/explorer view,
        even though it is still pending admin approval.
      verification: "Event appears on Home immediately for the signed-in submitter's own submission"

    - id: 13
      title: "Friend fan-out notification on signed-in Going submission"
      description: >
        Jamie (who follows Dev User) checks their in-app notifications after
        Dev User's step-12 submission goes live with Going=friends.
      expected: >
        Jamie receives a social_activity in-app notification referencing Dev
        User going to "Salsa Open Air", the same fan-out mechanism used for
        regular attendance toggles.
      verification: "Notification row created for follower Jamie via the notification scheduler"

    - id: 14
      title: "Anonymous submission is NOT visible until approved"
      description: >
        Sign out. Submit a second suggestion ("Bachata Night") anonymously,
        leaving Going unavailable (no RSVP section audience for anon users).
      expected: >
        Success screen reads "Thank you! Your suggestion is under review."
        (not the "is live" message). Navigating Home does NOT show "Bachata
        Night" anywhere, since anonymous submissions never create a live
        event before admin approval.
      verification: "No CachedEvent/UI entry exists for the anonymous suggestion pre-approval"

    - id: 15
      title: "Admin login"
      description: >
        Use the /login dev sign-in to access the admin panel ("Sign in as Admin"
        button if seeded, otherwise type ADMIN_EMAIL in the input).
      expected: >
        Admin page loads with calendar sources, settings, feature flags.
      verification: "Admin page renders with action bar"

    - id: 16
      title: "Suggestions panel shows pending items"
      description: >
        Click the "Suggestions" button in the admin action bar.
      expected: >
        Slide-out panel opens. Both pending suggestions ("Salsa Open Air" and
        "Bachata Night") are listed with amber pending badges.
      verification: "Panel shows 2 suggestions with amber pending badges"

    - id: 17
      title: "Review modal shows details, tags, price/promo, and metadata"
      description: >
        Click "Salsa Open Air" in the panel.
      expected: >
        Review modal shows all event fields, the selected tags, price/promo
        details, and submitter metadata (IP, timezone, screen size, etc.).
      verification: "All fields, tags, price/promo, and metadata section visible"

    - id: 18
      title: "Approve signed-in submission to Movida calendar"
      description: >
        Select "Movida" from the calendar dropdown. Click "Approve".
      expected: >
        Status badge changes to green "approved". The already-live CachedEvent
        is confirmed/kept associated with the approved suggestion.
      verification: "Status approved; event remains visible on Home"

    - id: 19
      title: "Approve anonymous submission — event becomes visible"
      description: >
        Click "Bachata Night" (the anonymous suggestion). Approve it to the
        Bachata Events calendar.
      expected: >
        Status changes to green "approved". Navigating Home now shows
        "Bachata Night" for the first time (it was invisible before approval).
      verification: "Anonymous event appears on Home only after approval"

    - id: 20
      title: "Reject hard-blocks re-import"
      description: >
        Submit a third anonymous suggestion duplicating an existing event
        title. In Admin → Suggestions, reject it with notes "Duplicate event".
      expected: >
        Status changes to red "rejected" with notes saved. The event stays
        hidden and is blocked from being recreated by a later sync/import.
      verification: "Status rejected; BlockedEvent-style suppression prevents reimport"

    - id: 21
      title: "Status filter tabs work"
      description: >
        Use the filter tabs at the top of the Suggestions panel.
      expected: >
        All: 3 suggestions. Pending: 0. Approved: 2. Rejected: 1. Counts in tab
        labels match.
      verification: "Filter tabs correctly filter and show counts"
