test_plan:
  name: "Interest Filter — Following scope (one-way OK)"
  description: >
    Verify the explorer interest filter at `interest_source=follows` —
    the broader scope that surfaces activity from anyone the viewer
    follows, not just mutual friends. This is the headline use case for
    the rework: the old chip was friends-only, which left brand-new
    accounts with empty filtered lists even after following a dozen
    organisers. The new chip works the moment the viewer follows
    anyone.

    Privacy invariants still apply per-row: an audience='friends'
    attendance is hidden from one-way followers (mutual-only), and the
    viewer's own attendance is excluded. The friends-only sub-scope
    (`interest_source=friends`) is covered by scenarios/interest-filter-friends.

  preconditions:
    - "Run with: task start:scenario SCENARIO=interest-filter-following"
    - >
      Pre-seeded users: viewer, alice, bob, carol, dave, eve, admin.
      Follow graph (all one-way): viewer → alice, viewer → bob, viewer
      → carol; eve → viewer (reverse direction control); dave isolated.
      Six events evt-fi-001..006 each tied to one assertion.
    - "Use a fresh browser profile or incognito window per signed-in user."
    - >
      Cookie banner: accept "Personalization" so /api/auth/* and
      /api/social/* are not blocked by the consent gate.

  steps:
    # ── Setup attendance/saves on the seeded events ──────────────
    - id: 1
      title: "Alice goes (public), Bob saves (public), Carol goes (friends-only)"
      description: >
        Sign in as Alice on Browser A and mark evt-fi-001 (Salsa Social
        Friday) as Going with audience 🌐 Public. Sign in as Bob on
        Browser B and click Save on evt-fi-002 (Bachata Workshop) —
        the save defaults to audience 🌐 Public. Sign in as Carol on
        Browser C, open evt-fi-003 (Cuban Night) and mark Going, then
        in the audience picker pick 👥 Friends.
      expected: >
        Three attendance / save rows persist with the audiences
        described. evt-fi-001 + evt-fi-002 will surface for viewer
        (broader follows scope, public audience); evt-fi-003 will be
        the key negative — viewer follows Carol but is NOT a mutual
        friend, so the friends-audience row must remain hidden.

    - id: 2
      title: "Dave (stranger) goes; Eve (reverse follower) goes; Alice saves a 6th event"
      description: >
        Sign in as Dave on Browser D, mark evt-fi-004 (Bachata
        Beginners Bootcamp) Going with 🌐 Public audience. Sign in as
        Eve on Browser E, mark evt-fi-005 (Salsa Tuesday Night) Going
        with 🌐 Public audience. Finally, sign back in as Alice on
        Browser A and click Save on evt-fi-006 (Kizomba Sunday Brunch).
      expected: >
        All three rows persist. Dave's row is the stranger control
        (must never surface). Eve's row tests the direction invariant:
        eve follows viewer, but viewer does NOT follow eve, so eve is
        not in viewer's followees and her row must NOT surface.
        Alice's evt-fi-006 save is used by the kind-pill assertions.

    # ── Happy path: follows scope (all 3 followees) ──────────────
    - id: 3
      title: "Viewer's 'Following' chip surfaces all followees' public activity"
      description: >
        Sign in as Viewer on Browser F, open / (Home). Above the event
        list, locate the "Following" row and click the "Following"
        chip. Leave scope at the default "All" (which maps to
        interest_source=follows) and kind at "Any".
      expected: >
        Chip becomes active. Network: GET
        /api/events?interest_source=follows is fired (interest_kind
        omitted because the default "Any" means OR of going + saved).
        The list re-renders with EXACTLY three rows: evt-fi-001 (Alice
        going), evt-fi-002 (Bob saved), evt-fi-006 (Alice saved). Map
        markers update to match. Specifically NOT in the list:
        evt-fi-003 (Carol's friends-only row — viewer is not mutual),
        evt-fi-004 (Dave — stranger), evt-fi-005 (Eve — follows viewer
        but viewer does not follow her). This is the core value: under
        the OLD friends-only chip, viewer would have seen ZERO rows;
        the new follows scope surfaces three.

    - id: 4
      title: "Kind pill 'Going' excludes saves"
      description: >
        Still as Viewer with the Following chip active and scope
        "All", click the "Going" kind pill.
      expected: >
        Network: GET
        /api/events?interest_source=follows&interest_kind=going. The
        list narrows to one row: evt-fi-001 (Alice going). evt-fi-002
        and evt-fi-006 (both saves) disappear. Click "Saved" — the
        list flips to evt-fi-002 + evt-fi-006 and evt-fi-001
        disappears. Click "Any" — all three rows return. Proves the
        kind pill round-trips correctly.

    # ── Privacy: friends-audience hidden from one-way followers ──
    - id: 5
      title: "audience=friends row from a one-way followee stays hidden"
      description: >
        Still as Viewer with the Following chip active. Confirm
        evt-fi-003 (Cuban Night, Carol going friends-only) is NOT in
        the filtered list. Then have Carol follow viewer back on
        Browser C (open /u/viewer and click Follow) so viewer ⇄ carol
        becomes mutual. Refresh viewer's home.
      expected: >
        Before the back-follow: evt-fi-003 absent. After Carol follows
        back (now mutual = friends), evt-fi-003 appears in viewer's
        filtered list. Proves audience='friends' is gated by mutual
        follow at row read time, regardless of the explorer scope.
        Have Carol unfollow viewer at the end of the step so the next
        steps see the original one-way graph.

    # ── Friends-only sub-scope cross-check ───────────────────────
    - id: 6
      title: "Switching scope to 'Friends only' empties the list"
      description: >
        Still as Viewer with the Following chip active, click the
        "Friends only" scope pill.
      expected: >
        Network: GET /api/events?interest_source=friends. The list
        renders the empty state. Viewer has no mutual followers in
        this scenario's graph, so the friends-only scope is empty by
        construction. Click "All" to return to the follows scope; the
        three rows from step 3 come back. Proves the scope pill is a
        functional switch, not a cosmetic label.

    # ── Person picker (shared primitive UX) ──────────────────────
    - id: 7
      title: "Person picker defaults to followees, friends-first ordering"
      description: >
        Still as Viewer with the Following chip active and scope set
        back to "All", click "+ Pick a person".
      expected: >
        The picker popover opens. Network: GET
        /api/social/me/following — returns alice, bob, carol in
        friends-first order (none are friends in this graph, so the
        order falls back to recency / handle). Each row is decorated
        with a small "Following" badge (not "Friend"). A second
        batched GET /api/social/users/interest-summary?handles=alice,
        bob,carol enriches each card with visibility-filtered upcoming
        counts ("Alice: 1 going · 1 saved", "Bob: 1 saved", "Carol:
        0 going · 0 saved" because carol's only row is friends-only
        and hidden from viewer).

    - id: 8
      title: "Picker search falls back to global user search"
      description: >
        With the picker open, type "dav" in the search box.
      expected: >
        After the 250 ms debounce, network fires GET
        /api/social/search/users?q=dav (because the query length ≥ 2
        switches the source). Dave appears in the results with a
        "Follow" button in the trailing slot (he is NOT followed by
        viewer). Clicking "Follow" optimistically marks the row and
        fires POST /api/social/users/dave/follow. Subsequently picking
        Dave fires GET
        /api/events?interest_source=follows&interest_user_handle=dave
        and surfaces evt-fi-004. Clearing the picker pill returns to
        the three-row list from step 3 plus evt-fi-004 (dave is now a
        followee).

    # ── Anonymous viewer ──────────────────────────────────────────
    - id: 9
      title: "Anonymous viewer gets sign-in nudge, not a 500"
      description: >
        Sign out (or open incognito on the scenario port). Open /
        and click the "Following" chip.
      expected: >
        The chip activates but is visually disabled (cursor:
        not-allowed) and an inline "Sign in to see picks from people
        you follow." link replaces the scope/kind pills. Network:
        the explorer does NOT fire GET
        /api/events?interest_source=follows (the chip is gated on
        signed-in state in the UI), or if it does, the response is
        200 with an empty items array. No 401 / 403 / 500.
