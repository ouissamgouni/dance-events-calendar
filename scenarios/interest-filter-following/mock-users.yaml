# Mock users pre-seeded for the interest-filter-following scenario.
#
# The graph is deliberately one-way heavy so the assertions can prove the
# new `interest_source=follows` semantic (any followee counts, not just
# mutual friends).
#
# - viewer  → alice, bob, carol  (viewer is the explorer user; she
#   follows three people, none of whom follow her back, so none of them
#   are her "friends"). This is the critical case the new feature
#   addresses: under the old friends-only chip, viewer's filtered
#   explorer would always be empty.
# - dave    is a stranger (no follows) — control.
# - eve     follows viewer one-way (the reverse of the viewer→others edges
#   above) so we can prove eve does NOT contribute to viewer's filter
#   (the graph direction matters: it's viewer's followees, not viewer's
#   followers).
# - admin   is included only because ADMIN_EMAIL must resolve.
users:
  - email: viewer@example.com
    name: Vera Viewer
    handle: viewer
  - email: alice@example.com
    name: Alice Rivera
    handle: alice
  - email: bob@example.com
    name: Bob Martin
    handle: bob
  - email: carol@example.com
    name: Carol Nguyen
    handle: carol
  - email: dave@example.com
    name: Dave Smith
    handle: dave
  - email: eve@example.com
    name: Eve Esposito
    handle: eve
  - email: admin@example.com # matches ADMIN_EMAIL → admin badge
    name: Dev Admin
    handle: admin
