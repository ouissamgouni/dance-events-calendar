# Pre-seeded events for the interest-filter-following scenario.
#
# Six events, each tied to one assertion in the test plan:
#
#   evt-fi-001 (Salsa Social Friday)        → Alice goes (public)
#                                              → MUST surface for viewer
#                                                under interest_source=follows
#                                                (was hidden under the old
#                                                 friends-only filter — Alice
#                                                 does not follow viewer back)
#   evt-fi-002 (Bachata Workshop)           → Bob saves (public)
#                                              → MUST surface (saved counts)
#   evt-fi-003 (Cuban Night)                → Carol goes share_audience=friends
#                                              → MUST NOT surface for viewer
#                                                (carol & viewer are not
#                                                 mutual — the audience gate
#                                                 still applies even though
#                                                 viewer follows carol)
#   evt-fi-004 (Bachata Beginners Bootcamp) → Dave goes (public)
#                                              → MUST NOT surface (stranger)
#   evt-fi-005 (Salsa Tuesday Night)        → Eve goes (public)
#                                              → MUST NOT surface for viewer
#                                                (eve follows viewer but
#                                                 viewer does NOT follow eve;
#                                                 the filter is by viewer's
#                                                 followees, not followers)
#   evt-fi-006 (Kizomba Sunday Brunch)      → Alice saves (public) — used
#                                              for the kind=going filter
#                                              assertion (must be excluded
#                                              when kind=going, included
#                                              when kind=saved or kind=any)
