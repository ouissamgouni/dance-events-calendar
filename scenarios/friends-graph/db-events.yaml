# Pre-seeded events + attendances for the friends-graph scenario.
#
# The follow/profile/visibility flow doesn't strictly need events to assert
# its own contracts, but in practice the test plan is much easier to walk
# through when each signed-in user has something to look at on their
# /my-calendar page (otherwise the empty-state CTA hides the
# Subscribers panel and makes step 11/12 confusing). We seed five distinct
# events and pre-mark a few "I'm going" attendances so each scenario user
# already has a non-empty calendar at first sign-in.
#
# Distribution (intentionally asymmetric so the test plan can spot which
# user it's looking at):
#   - alice → going to evt-fg-001 + evt-fg-002 (2 events)
#   - bob   → going to evt-fg-003                (1 event)
#   - dave  → going to evt-fg-004 + evt-fg-005 (2 events; dave has the
#            "public" calendar so any signed-in viewer can see his page)
#   - carol → no pre-seeded attendance (she gets purged in step 14, so
#            attendance rows would just need to cascade away — kept clean
#            to keep that assertion focused on the social-edge cleanup).
#
# All attendances are seeded with share_publicly=true so Phase B's friend
# filter (covered in friends-events) sees them through; the friends-graph
# plan itself doesn't toggle this flag.
base_week: 0
events:
  - id: evt-fg-001
    calendar_id: salsa-cal-001
    title: Salsa Social Friday
    description: |
      Weekly social with DJ Mambo. Beginners welcome.
    location: Dance Studio, 10 Rue de Rivoli, Paris, France
    latitude: 48.8566
    longitude: 2.3522
    start: w0 Fri 21:00
    end: w0 Sat 01:00
    price_is_free: true
