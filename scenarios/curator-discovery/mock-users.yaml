# Curator discovery fallback scenario.
#
# Cast:
#   - viewer: signed-in user with zero follows/subscriptions at start.
#   - subscriber: spare public user for manual subscription experiments.
#   - curator-paris / curator-bachata: admin-managed public curator accounts.
#   - curator-hidden: admin-managed but opted out of suggestions.
#   - ordinary: non-curator control that must not appear in curator suggestions.
#   - admin: site admin account.
users:
  - email: viewer@example.com
    name: Val Zero
    handle: viewer
    account_visibility: public
  - email: subscriber@example.com
    name: Sara Subscriber
    handle: subscriber
    account_visibility: public
  - email: curator-paris@example.com
    name: Paris Salsa Curator
    handle: curator-paris
    account_visibility: public
    is_admin_managed: true
    managed_label: Paris Salsa Curator
    bio: Hand-picked salsa and bachata nights across Paris.
  - email: curator-bachata@example.com
    name: Bachata Curator
    handle: curator-bachata
    account_visibility: public
    is_admin_managed: true
    managed_label: Bachata Curator
    bio: Editorial bachata calendar for social dancers.
  - email: curator-hidden@example.com
    name: Hidden Curator
    handle: curator-hidden
    account_visibility: public
    is_admin_managed: true
    show_in_suggestions: false
    managed_label: Hidden Curator
    bio: Opted out of suggestion surfaces.
  - email: ordinary@example.com
    name: Ordinary Organizer
    handle: ordinary
    account_visibility: public
    is_verified_organizer: true
  - email: admin@example.com
    name: Dev Admin
    handle: admin
    account_visibility: public
