test_plan:
  name: "Discovery Suggestions Parity"
  description: >
    Defines the product rule for people discovery suggestions: the
    Suggestions tab in Account -> My network and the default suggestions
    shown on /discover should use the same candidate set, ordering, and
    exclusions for a signed-in viewer. The scenario catches drift between
    the account-network surface and the broader Discover people page.

  preconditions:
    - "Run with: task start:scenario SCENARIO=discovery-suggestions-parity"
    - >
      Cast: viewer has mutual friends alice, bob, and carol. Their follow
      overlap creates FoF candidates pop1, pop2, and pop3. Two admin-managed
      curators provide fallback/top-up suggestions. loner has no graph.
    - >
      If the onboarding gate appears after signing in as viewer or loner,
      click Skip/Done once. This scenario is about discovery parity, not
      onboarding.
    - >
      Cookie banner: accept Personalization so /api/auth/* and /api/social/*
      calls are not blocked by consent.

  steps:
    - id: 1
      title: "My network Suggestions establishes the canonical set"
      description: >
        Sign in as Vera Viewer. Open /account#network and select the
        Suggestions tab.
      expected: >
        The UI calls GET /api/social/me/suggestions. The rendered suggestion
        handles, in order, are pop1, pop2, pop3, curator-bachata,
        curator-paris. pop1 shows "Followed by @alice + 2 more", pop2 shows
        "Followed by @alice + 1 more", and pop3 shows "Followed by @alice".
        Curator rows carry the curator badge and show no mutual-friend
        preview. viewer, alice, bob, carol, and admin are not suggested.

    - id: 2
      title: "/discover default Suggestions matches My network"
      description: >
        With Vera Viewer still signed in, open /discover with an empty search
        box.
      expected: >
        The default suggestions shown on /discover match the canonical set
        from step 1: pop1, pop2, pop3, curator-bachata, curator-paris, with
        the same ordering and exclusions. It is acceptable for /discover to
        group curator rows under a separate "Curated calendars" heading, but
        the combined candidate set must be identical to Account -> My network
        -> Suggestions. /discover must not show only curators when FoF
        candidates exist.

    - id: 3
      title: "Following a suggestion removes it from both surfaces"
      description: >
        From Account -> My network -> Suggestions, click Follow on pop1.
        Then reload /account#network and /discover.
      expected: >
        POST /api/social/users/pop1/follow succeeds. Both surfaces remove
        pop1 from suggestions and now show pop2, pop3, curator-bachata,
        curator-paris. This proves both surfaces share the same
        already-followed exclusion semantics.

    - id: 4
      title: "Zero-graph viewer gets the same curator fallback on both surfaces"
      description: >
        Sign out, then sign in as Leo Loner. Open /account#network ->
        Suggestions, then /discover with an empty search box.
      expected: >
        Because loner has no mutual friends and no outgoing follows, both
        surfaces show the same curator fallback set: curator-bachata and
        curator-paris. They do not show pop1, pop2, pop3, ordinary users, or
        admin. If product later chooses to hide empty-network account
        suggestions, /discover should follow the same rule instead of
        diverging.

    - id: 5
      title: "Search results remain separate from suggestions parity"
      description: >
        On /discover as Vera Viewer, type "pop" in the search box.
      expected: >
        The page switches from default suggestions to explicit search results
        backed by GET /api/social/search/users?q=pop. Search may return pop1,
        pop2, and pop3 by name/handle, independent of the suggestions ranking.
        Clearing the query returns to the parity-controlled default
        suggestions from step 2.
