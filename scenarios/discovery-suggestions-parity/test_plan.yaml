test_plan:
  name: "Discovery Suggestions Parity"
  description: >
    Defines the product rule for people discovery suggestions: Account ->
    My network -> Suggestions is the pure friend-of-friend graph, while the
    default /discover Suggestions section starts with that same graph and may
    top up with curated accounts. The scenario catches the prod-like drift
    where /discover showed only curators even when follow-graph candidates
    existed.

  preconditions:
    - "Run with: task start:scenario SCENARIO=discovery-suggestions-parity"
    - >
      Cast: viewer has mutual friends alice, bob, and carol. Their follow
      overlap creates FoF candidates pop1, pop2, pop3, and friends-only
      privatepop. hiddenpop is followed by the same network but has
      `show_in_suggestions: false` and must be excluded. Two admin-managed
      curators provide fallback/top-up suggestions. loner has no graph.
    - >
      If the onboarding gate appears after signing in as viewer or loner,
      click Skip/Done once. This scenario is about discovery parity, not
      onboarding.
    - >
      Cookie banner: accept Personalization so /api/auth/* and /api/social/*
      calls are not blocked by consent.

  steps:
    - id: 1
      title: "My network Suggestions establishes the canonical set"
      description: >
        Sign in as Vera Viewer. Open /account#network and select the
        Suggestions tab.
      expected: >
        The UI calls GET /api/social/me/suggestions. The rendered suggestion
        handles, in order, are pop1, pop2, pop3, privatepop. pop1 shows
        "Followed by @alice + 2 more", pop2 shows "Followed by @alice + 1
        more", and pop3/privatepop each show "Followed by @alice".
        viewer, alice, bob, carol, admin, and hiddenpop are not suggested.

    - id: 2
      title: "/discover default Suggestions starts with the network graph"
      description: >
        With Vera Viewer still signed in, open /discover with an empty search
        box.
      expected: >
        The page renders a default section titled "Suggestions" backed by
        GET /api/social/discover/suggested?limit=12. The first rows are the
        network candidates from step 1 in the same order: pop1, pop2, pop3,
        privatepop. Curator top-up rows may follow as curator-bachata and
        curator-paris. Every row has a blue Follow button. /discover must not
        show only curators when FoF candidates exist, and hiddenpop must not
        appear.

    - id: 3
      title: "Following a suggestion removes it from both surfaces"
      description: >
        From Account -> My network -> Suggestions, click Follow on pop1.
        Then reload /account#network and /discover.
      expected: >
        POST /api/social/users/pop1/follow succeeds. Both surfaces remove
        pop1 from suggestions. Account -> My network now shows pop2, pop3,
        privatepop; /discover now starts with pop2, pop3, privatepop and then
        any curator top-up rows. This proves both surfaces share the same
        already-followed exclusion semantics.

    - id: 4
      title: "Zero-graph viewer gets Discover curator fallback"
      description: >
        Sign out, then sign in as Leo Loner. Open /account#network ->
        Suggestions, then /discover with an empty search box.
      expected: >
        Because loner has no mutual friends and no outgoing follows, Account
        -> My network -> Suggestions is empty. /discover still renders the
        default "Suggestions" section with the curator fallback set:
        curator-bachata and curator-paris, each with a Follow button. It does
        not show pop1, pop2, pop3, privatepop, hiddenpop, ordinary users, or
        admin.

    - id: 5
      title: "Search results remain separate from suggestions parity"
      description: >
        On /discover as Vera Viewer, type "pop" in the search box.
      expected: >
        The page switches from default suggestions to explicit search results
        backed by GET /api/social/search/users?q=pop. Search may return pop1,
        pop2, and pop3 by name/handle, independent of the suggestions ranking.
        Clearing the query returns to the parity-controlled default
        suggestions from step 2.
