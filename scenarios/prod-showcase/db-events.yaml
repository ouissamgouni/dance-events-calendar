    description:
      "Event: https://facebook.com/events/s/london-salsa-marathonfest-5-ye/835127609309044/\n\n.....\U0001F389LSM 5 YEAR ANNIVERSARY 2026\U0001F389.....\n.\n❤️ NEW VENUE: PORCHESTER HALL\n-- The 5th Anniversary Upgrade --\nThe Venue is the Statement: Dance in the breathtaking grandeur of Porchester Hall, London’s most iconic Grade II Listed setting. The venue is the upgrade that signals our commitment to you.\n.\n❤️ EXTRAS:\nAs its our 5 YEAR ANNIVERSARY:\nThe Event is going to run differently this year:\n- While we're keeping same social hours, we're adding:\nWORKSHOPS & 4 SHOWS \n- 2 SURPRISES\nZero Distractions: Expect pure Dance focus. \nCapacity is strictly limited. Secure your pass now to be part of the Triumph and ensure you get the best price before the monthly price increase.\n\U0001F483AMZING LONEUP OF ARTISTS\U0001F57A\n\U0001F49C GRUPO ALAFIA \n\U0001F49C SUPER MARIO\n\U0001F49C NATASHA CHUMA\n\U0001F49C KAT & EDDIE & ESENCIALIBRE \n\U0001F49C MOE FLEX\n\U0001F49C FADI\
      \ K\n\U0001F49C ANDREEA ARION\n\U0001F49C SAM MR.SLEEK \nMORE TBC....\n\U0001F3A7 AMAZING LINEUP OF DJ's: \U0001F3A7\n\U0001F9E1 DJ: WILLY (NL)\n\U0001F9E1 DJ: JULIAN THE DUKE (UK)\n\U0001F9E1 DJ: PATRICK EL CLASICO (GVA)\n\U0001F9E1 DJ: MISSY (BTS)\n\U0001F9E1 DJ: SAM SLEEK (UK)\n\U0001F9E1 SURPRIS DJ (Guess the DJ) ;)\n.\n\U0001F483 THEMED NIGHTS (OPTIONAL)\U0001F483\n \nFRIDAY: (YOU SUGGEST A THEME)\n\n\U0001F478\U0001F934SATURDAY: DRESS TO IMPRESS/ GLAM \nConcept: The centerpiece evening. Sequins, elegant dresses, sharp suits, bold accessories — everyone brings their A‑game.\n.\n\U0001FA74 SUNDAY: MISMATCH MADNESS (Chaotic Fun)\n - Concept: chaos/crazy clashing colours, patterns, or mismatched items, smart/sports... be creative\n \n\U0001F3E8 HOTELS: \n- 154 hotels within (2-15 minutes walk)\n\U0001F68A TRANSPORT:\n- Royal Oak (3 minutes), Bayswater station (3 minutes), Queensway (6 minutes), Paddington (12 minutes).\n- 24h Buses.\n\n\U0001F9E1 PRE-PARTY (Thursday 243rd). AFTER-PARTY\
      \ (Monday 27th) \n- Coming soon\n\n\U0001F9E1 FREE SNACKS and Water/Coffee/Tea\n\n\U0001F9E1\U0001F60D More to be announced soon.. watch this space..\n. \nPASSES: \nwww.LondondSalsaMarathon.com\nFRAME:\nhttps://twb.nz/londonsalsamarathon26 \n.\n#LondonSalsaMarathon #lsm #london #salsa #mambo #sammrsleek  #chachacha #mrsleek"
