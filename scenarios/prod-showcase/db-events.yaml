  description: "Event: https://facebook.com/events/s/paris-salsa-marathon-2026/1577414196613079/\n\nHello everyone,\nHope everything's good for you !\n\nWelcome to the 5th edition of Paris Salsa Marathon,\nWe're excited to announce the anniversary of Paris Salsa MarathON2,\nSeptember 18,19,20th 2026.\n\nIt's a private event for those who dance salsa porto ON2 or ON1.\nFirst come, First served, get your chance and book your full Pass.\nWe will manage the rate leaders / followers.\nParis Salsa Marathon is an humanitarian, caritative, sport and cultural association.\n\nVenue of the marathon Hotel : NOVOTEL PARIS-EST\n01, Avenue de la République, BAGNOLET, 93170\nMETRO : GALLIENI\nParking available,\n609 rooms available,\n\nDancing til breakfast time, nice woodendance flor,\nGreat sound system with wonderfull music, amazing DJS,\n\nNo show, social dance with deep emotions.\nAt the same time, we would like to celebrate the diversity of nationalities and cultures with this event.\n\nWe invite\
    \ the international community to our magical city of Paris. Dance, eat plenty, and connect with old and new friends.\nYou'll dance to music brought to you by Europe's most talented DJs, share many dances with incredibly skilled salseros and salseras, and eat our local fine cuisine that your heart desires, also vegeterian food will be available.\n\nAnd of course, you will have all the famous Parisian sites closeby to visit if you so desire, including the Eiffel Tower, the Sacré Coeur, the Champs Elysées, the Louvre Museum, and our Notre Dame.\n\nwebsite : http://parissalsamarathon2.com/\n\nTickets : https://www.billetweb.fr/paris-salsa-marathon-2026\n\nDress code : All Colors you can !\n\n----------- PROGRAM ------------\n\n------ Friday September 18th -----\n\nNOVOTEL Paris Est\n\n7PM : Get your full Pass to the venue.\n7PM - 5AM : Salsa non-stop,\n8PM : Dinner 8PM - 10PM\n\n----- Saturday September 19th -----\n\nNOVOTEL Paris Est\n\n1:30PM : Get your pass to the venue,\n1:30PM - 5AM\
