  description: "Évènement : https://facebook.com/events/s/porto-salsa-weekend-2026/1702938200689969/\n\n5 YEARS OF PASSION, ONE ICONIC WEEKEND ! \n​\nWhat started as a vision has become a tradition. Welcome to the 5th Edition of Porto Salsa Weekend.\n\nSince our very first edition, our mission has always been the same, to grow, to improve, and to create an experience that brings dancers together in the most authentic and unforgettable way. Year after year, we’ve listened, refined, elevated always pushing the energy higher and the experience further.\n\nThis is not just another salsa weekend. It’s a celebration of passion, connection, and community. SOCIALS and PARTIES only pure dancing, pure atmosphere, pure Porto vibes.\n\nGet ready to feel the magic of salsa in the vibrant city of Porto, where dancers and music lovers from around the world gather to share the same rhythm. Against the breathtaking backdrop of this beautiful city, every beat tells a story and every dance creates a memory.\n\
    \nWhether you’ve been with us since the beginning or you’re joining for the first time, this 5th edition promises something special deeper connections, stronger energy, and moments you’ll carry long after the music fades.\n\nThis is more than an event. This is Porto Salsa Weekend and we’re just getting started."
