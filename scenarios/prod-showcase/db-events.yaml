    title: Brussels Retro Salsa Fest 3
    description: "Évènement : fb://event/1056258916708646


      This is a celebration of the roots and essence of salsa.


      We don’t chase numbers. We create moments. With an intimate crowd of skilled dancers, a warm and welcoming indoor dance floor, and vintage soul in the air, this fest is made for those who truly love the dance.


      + Chill on our rooftop lounge with a view—but hit the floor inside where the magic happens

      + Savor homemade food and signature cocktails crafted by our top bartender

      + Connect with international guests and passionate dancers from around the world

      + Enjoy curated music sets that honor the golden era of salsa

      + Hosted with heart, designed with care, built for community

      + And above all, driven by our mission to keep real salsa culture alive


      Join us, and feel what salsa is really about."
