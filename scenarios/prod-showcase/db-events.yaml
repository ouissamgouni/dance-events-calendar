  title: Amsterdam Int. Salsa Marathon
  description: 'Event: https://facebook.com/events/s/amsterdam-int-salsa-marathon/2349206255501050/



    💃 The Amsterdam International Salsa Marathon is all about one thing

    pure nonstop social dancing.


    🔥 From Friday till Monday, we dance for hours without interruption, guided by an amazing lineup of international DJs who know exactly how to keep the energy flowing from the first song to the last.


    🕺 There are no workshops and no schedules to follow. Just music, connection and social dancing all weekend long.


    🎧 DJ lineup

    DJ Willy (NL)

    DJ Rumbero (DE)

    DJ Michelle (DE)

    DJ Ryad (NL)

    DJ Vito (NL)

    DJ Alex Gee (NL)

    DJ Betho (NL)

    DJ Ares (NL)

    DJ Phily (NL)


    🏢 The marathon takes place at Candance Studio, a beautiful venue with a high quality wooden dance floor, perfect for long and comfortable dancing sessions.


