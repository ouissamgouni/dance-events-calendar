  description: 'Event: https://facebook.com/events/s/riviera-latin-fest-2026/1463109518448070/


    🎉 Riviera Latin Fest 2026 ! Mandelieu, Côte d’Azur, France 🇫🇷🔥

    🇬🇧 ENGLISH BELOW 🇬🇧


    Après une première édition magique, Rivera Latin Fest est de retour ! Rejoignez-nous du 13 au 19 juillet 2026 à Mandelieu sur la Côte d’Azur 🌴☀️

    Viens vibrer aux rythmes Salsa et Bachata sous le soleil, pour des vacances de rêve dans un lieu paradisiaque les pieds dans l’eau !


    Attendez-vous à des artistes de renommée mondiale, des workshops d’exception, des soirées inoubliables et toute l’énergie que vous avez aimé lors de la première édition — le tout dans l’une des plus belles régions d’Europe.


