      \ Ferrigno & Ansima\n- Dimitris & Yolena\n- Samuel FunFlow\n- Willy & Jessy\n- Margo & Nando\n- Wiktoria Kozłowska \n\n\U0001F3A7 SALSA DJs:\n- DJ Mauri\n- DJ Dmitri\n- DJ Sezar\n- DJ Alexio\n- DJ Mishow\n\n\n\U0001F7E3 BACHATA\n\n- Pablo y Raquel\n- Gaby y Estefy\n- Klau y Ros\n- Michael y Mayra\n- Claudio & Aleksandra\n- Monika & Daniel\n\n\U0001F3A7 BACHATA DJs:\n- DJ Clau\n- DJ MomoLatino\n- DJ Morcilla\n\n\n\U0001F7E2 CUBAN\n\n- Maykel Fonts\n- Seo Fernandez & Eneris Mulgado\n- Cuban Flex\n- Osbanis & Aneta\n- Barbara Jimenez\n- Ayoub Mouslim\n- Edyta Edy Kwaśna\n- Julio Molina\n- Rey Ceballo\n- Eddy Aguero\n- Adriano Brizuela\n\n\U0001F3A7 CUBAN DJs:\n- DJ Javier de la Rosa\n- DJ Leo D'Cuba\n- DJ Eddy Aguero\n\n\U0001F3A5\U0001F4F8 MEDIA TEAM\nMISTABU\nSTEVE STARMAMBO\nDANCING AROUND THE WORLD\nASYA LEVKO\nLUKA KIVELA\n\n\U0001F3A4LIVE MUSIC BY ONE AND ONLY \nNic N’taya ❗️❗️❗️❗️❗️\n\n\U0001F4A5 THE VENUE - SOUND GARDEN HOTEL\n\n\U0001F4CD Warsaw, Poland\n- Just 1 km from Warsaw\
      \ Chopin Airport\n- Comfortable hotel rooms on site\n- Multiple workshop rooms\n- Large party spaces & dance floors\n- Dance, sleep, repeat.. all in one place!\n\n\n\U0001F39F️PASSES are now available - VIP Passes start from 170 EUR!\n\U0001F39F Grab yours NOW - https://elsolfestival.pl/en/payment/ \n\n\n\U0001F3E0 ACCOMODATION\nBook your room in Sound Gardel Hotel to be right in the center of the action - https://elsolfestival.pl/en/hotels/ \n\n\n\U0001F449 Follow us on Instagram for all the juicy updates, sneak peeks and the news coming your way in the next few weeks:\nhttps://www.instagram.com/elsolfestivals/\n\n\nCan’t wait for another one.\nWe are legends, we are elSol! ✨"
