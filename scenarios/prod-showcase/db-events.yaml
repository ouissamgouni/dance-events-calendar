      \U0001D5FF\U0001D600\U0001D601\U0001D5EE\U0001D5FB\U0001D5F1\U0001D5F6\U0001D5FB\U0001D5F4.\n\nProgram\n\U0001F449 Friday 10.7. at 9 p.m. to 4 a.m\n\U0001F449Saturday 11.7. - afternoon social at 2pm to 6pm\n\U0001F449 Saturday eveninig Party from 10 pm to 4 am\n\U0001F449 Sunday 12.7. - afternoon social at 2pm to 6pm\nSergio, Dmitri, Gašper and Mark will be with you.\n\U0001F449We will take care of refreshments so that you don't get tired\n\U0001F449We are accepting applications until 8.7. Fill the form in the link https://forms.gle/fxEx4tehHasYHJ6C6\n\U0001F449The price of the event is €60 with pre-registration at the link.\nOn the day of the event - weekend pass €70, single party €30.\n\U0001F449We will stop the sale when the number of participants exceeds 150. We will also check the gender balance during the sale.\nInfo to email info@dancelife.si and phone +386 70 910 900\nDance Studio Dancelife, Šmartinska cesta 106, Ljubljana\nWelcome!\n\n\U0001F4A5Dvodnevni Salsa dogodek za ljubitelje\
      \ vročih ritmov in dobre glasbe v Plesnem Studiu Dancelife na Šmartinski cesti 106, v Ljubljani.\nČe je možno, se prijavite v paru. \n\U0001F4A5 Prijave zbiramo do 8.7, - link : https://forms.gle/fxEx4tehHasYHJ6C6\n\U0001F449 Petek 10.7. ob 21h do 4h\n\U0001F449Sobota 11.7. - afternoon social ob 14h do 18h\n\U0001F449Sobotni večerni Party ob 22h do 4h\n\U0001F449Nedelja 12.7. - afternoon social ob 14h do 18h\nZ vami bodo Sergio, Dmitri, Gašper in Mark.\n\U0001F449Da ne boste omagali bomo poskrbeli za prigrizke\n\U0001F449Prijave zbiramo do 8.7. Cena dogodka je 60€ s predprijavo ob izpolnitvi formularja v linku. Single party - 30€.\nNa dan dogodka - weekend 60€, single party 30€.\nInfo na mail info@dancelife.si in telefon +386 70 910 900\nPlesni Studio Dancelife, Šmartinska cesta 106, Ljubljana"
