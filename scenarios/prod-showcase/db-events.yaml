  description: "Event: https://facebook.com/events/s/mambo-training-week-2026-03-09/960640166862102/\n\nTrzecia edycja wydarzenia Mambo Training Week przed nami! \U0001F31F\n\nSalsa Libre i Edyta Czagowiec po raz kolejny przygotowali wyjątkowe wydarzenie dla miłośników mambo!\n\nOd 3 sierpnia do 9 sierpnia czekają na Was 6 dni intensywnych, ustrukturyzowanych zajęć z Waszymi ulubionymi, lokalnymi oraz międzynarodowymi instruktorami, a także impreza z półgodzinnym spektaklem mambo i najlepszym poziomem social dance w Warszawie!\n\nMambo Trening Week realizowany będzie na poziomie średnio zaawansowanym.\n\n\U0001F49C Artyści 2026 \U0001F49C\nEdyta Czagowiec (Polska/Holandia)\nAlicia Velasco (Hiszpania)\nVincenzo & Maria (Grecja)\nJavier Escobar (NY)\nJose Diaz (USA/Holandia)\nEwa „Żaba” Makowczynska (PL)\n\n➡️ O wydarzeniu\nProgram i charakter zajęć wzorowane są na MamboTeam by Edyta, czyli nie zabraknie fakultetów ogólnorozwojowych, przygotowania motorycznego, musicality, ekspresji i wiele\
    \ innych niezbędnych elementów rozwoju każdego salsero.\n____\nWarsztatom towarzyszy MTW Gala Party ze spektaklem tanecznym w reżyserii Edyty Czagowiec, z udziałem grup choreograficznych oraz zaproszonych artystów!\n\nSobotnia Gala jest biletowana osobno (pass na warsztaty nie obejmuje wejścia na galę) – wejściówki możesz kupić tutaj\n\nNiezależnie od tego czy Twoim głównym celem jest występ na scenie, czy po prostu bycie lepszym salsero na parkiecie imprezowym – ten event doda Ci zastrzyk energii, techniki i inspiracji!\n____\n➡️Lokalizacja\nWarsztaty odbywają się w Warszawie:\n\n03.08 – 06.08 (pon-czw): 18:00-20:00\n\U0001F4CD Salsa Libre, ul. Żelazna 59 (2 piętro)\n\n07.08 (pt) 18:00-21:00\n\U0001F4CD Salsa Libre, ul. Żelazna 59 (2 piętro)\n\n08.08 (sob) 11:00-17:00 (warsztaty) z godzinną przerwą + impreza\n\U0001F4CD Klub Medyka, ul. Oczki 1A.\n\n09.08 (nd)\n12:30-13:30 Stretching: \U0001F4CD Salsa Libre, ul. Żelazna 59 (2 piętro) \nod 13:30 po zajęciach Brunch: \U0001F4CD Coco Lounge\n\
    \n➡️ Rodzaje passów i ceny\nCeny wzrastają wraz z ubywaniem ilości dostępnych miejsc:\n\n✨ Week-day pass –  warsztaty poniedziałek-czwartek włącznie.\nCeny: 410zł (1 pass), 430zł (1 pass), 470zł (3 passy), 520zł (4 passy), 590zł (3 passy)\n\n✨ Full week pass –  warsztaty poniedziałek-niedziela włącznie.\n\n✨ Saturday pass –  warsztaty sobota + niedzielny afternoon social i stretching\n\n✨ Weekend pass –  warsztaty w piątek, sobotę oraz niedzielny afternoon social i stretching\n\nWybierz swój pass: https://salsalibre.pl/mambo-training-week-2026/\n\n\nUWAGA! Ilość miejsc ograniczona – sprzedaż biletów do wyczerpania miejsc. Płatność wyłącznie online (również w dniu eventu, jeśli zostaną miejsca).\n\n\U0001F6A8 UWAGA! Passy na warsztaty nie obejmują wstępu na Galę."
