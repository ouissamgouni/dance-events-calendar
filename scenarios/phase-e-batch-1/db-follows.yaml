# Pre-seeded follow graph for the phase-e-batch-1 scenario.
#
# Goal: at sign-in, viewer has zero mutuals (E2 hint should fire) but
# already has incoming follows (E1 follow-back surface) and incoming
# follows from prospective friends so that following them back during
# the test plan promotes them to mutual (E6 toast + E10 pill recompute).
#
# Edges:
#   alpha   -> viewer        (one-way; viewer follows back in E6 step)
#   beta    -> viewer        (one-way; viewer follows back in E6 step)
#   gamma   -> viewer        (one-way; viewer follows back in E9 step)
#   delta   -> viewer        (one-way; viewer follows back in E9 step)
#   dave    -> viewer        (one-way; stays one-way → exercises E1 button)
#   alpha   -> oscar         (so once viewer↔alpha is mutual, E10 pill = 1)
#   beta    -> oscar         (so once viewer↔beta is mutual, E10 pill = 2)
follows:
  - follower: alpha
    followee: viewer
  - follower: beta
    followee: viewer
  - follower: gamma
    followee: viewer
  - follower: delta
    followee: viewer
  - follower: dave
    followee: viewer
  - follower: alpha
    followee: oscar
  - follower: beta
    followee: oscar
