# Pre-seeded users for Phase E (friendship adoption) — Batch 1.
#
# This scenario exercises:
#   E1 — Follow-back button on new_follower notifications
#   E2 — Zero-friends warning on AudiencePicker
#   E6 — New-friend toast (when a follow becomes mutual)
#   E9 — Friends leaderboard (Most active tab in Network panel)
#   E10 — "N of your friends follow this organizer" pill on profiles
#
# Cast:
#   - viewer       — the persona under test (0 mutuals at sign-in → exercises E2)
#   - alpha,beta,delta,gamma — pre-seeded as one-way followers OF viewer.
#       viewer follows back during the test plan to manufacture a fresh
#       new_friend notification (E6 toast).
#   - dave         — pre-seeded follower of viewer with no return follow:
#       gives a pending new_follower notification with is_following=false
#       so the Follow-back button (E1) is exercised on first sign-in.
#   - oscar        — verified organizer; some friends already follow him
#       so the E10 mutual-friends pill renders as soon as viewer becomes
#       mutual with alpha/beta.
users:
  - email: viewer@example.com
    name: Viewer Persona
    handle: viewer
    account_visibility: public
  - email: alpha@example.com
    name: Alpha Garcia
    handle: alpha
    account_visibility: public
  - email: beta@example.com
    name: Beta Lopez
    handle: beta
    account_visibility: public
  - email: gamma@example.com
    name: Gamma Wong
    handle: gamma
    account_visibility: public
  - email: delta@example.com
    name: Delta Khan
    handle: delta
    account_visibility: public
  - email: dave@example.com
    name: Dave Pending
    handle: dave
    account_visibility: public
  - email: oscar@example.com
    name: Oscar Promoter
    handle: oscar
    account_visibility: public
    is_verified_organizer: true
  - email: admin@example.com
    name: Dev Admin
    handle: admin
